<html lang="ko"><head>

<style>
:root{--blue:#1F4E79;--blue2:#2c6bb3;--red:#C00000;--green:#2E6B30;--gold:#8a6a00;--gray:#5b6472;--bg:#eef1f6;--line:#dce3ec}
*{box-sizing:border-box}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif;margin:0;background:var(--bg);color:#1c2430;line-height:1.62;-webkit-text-size-adjust:100%}
a{color:var(--blue2)}
header{background:linear-gradient(120deg,#173a5c,#255a92);color:#fff;padding:13px 18px;position:sticky;top:0;z-index:30;box-shadow:0 2px 10px rgba(0,0,0,.18)}
.htop{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
header h1{margin:0;font-size:17px;font-weight:800;letter-spacing:-.3px}
header .slog{font-size:12px;opacity:.9}
.live{margin-left:auto;background:#c00000;color:#fff;border-radius:20px;padding:5px 13px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;white-space:nowrap}
.live .dot{width:8px;height:8px;background:#fff;border-radius:50%;animation:bl 1.1s infinite}
@keyframes bl{50%{opacity:.25}}
nav{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}
nav button{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:7px 13px;font-size:13px;font-weight:700;cursor:pointer;transition:.12s}
nav button:hover{background:rgba(255,255,255,.24)}
nav button.on{background:#fff;color:var(--blue)}
.layout{display:flex;max-width:1240px;margin:0 auto;gap:14px;padding:14px;align-items:flex-start}
.main{flex:1;min-width:0}
.kwpanel{width:320px;flex-shrink:0;position:sticky;top:104px;max-height:calc(100vh-118px);overflow-y:auto;background:#fff;border-radius:12px;box-shadow:0 2px 10px rgba(31,78,121,.13);padding:0;border:1px solid #d9e3ef}
.kwpanel .kwhead{position:sticky;top:0;background:linear-gradient(120deg,#1f4e79,#2c6bb3);color:#fff;padding:11px 14px 12px;border-radius:12px 12px 0 0;z-index:2}
.kwpanel .kwhead h3{margin:0 0 3px;font-size:14px;font-weight:800;display:flex;align-items:center;gap:6px}
.kwpanel .kwhead .sub{font-size:11px;opacity:.9}
.kwbody{padding:12px 13px}
#kwsearch{width:100%;padding:9px 11px;font-size:13px;border:2px solid var(--blue);border-radius:9px;margin:10px 0 4px;background:rgba(255,255,255,.96)}
.kwgroup{margin-bottom:13px}
.kwgroup .gt{font-size:12px;font-weight:800;color:#2b3444;margin:0 2px 6px;padding-bottom:3px;border-bottom:1px dashed #d4e0ee}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{background:#eef3f9;color:var(--blue);border:1px solid #cfdcec;border-radius:15px;padding:5px 11px;font-size:13px;font-weight:600;cursor:pointer;user-select:none;transition:.1s;line-height:1.2}
.chip:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.chip:hover .n{opacity:.85;color:#fff}
.chip.on{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 1px 4px rgba(31,78,121,.35)}
.chip .n{opacity:.55;font-size:11px;margin-left:4px;font-weight:700}
.chip.on .n{opacity:.9}
.chip.all{background:#c00000;color:#fff;border-color:#c00000;font-weight:800}
.chip.hot{background:#fff3f3;border-color:#e6b8b8;color:#b02020}
.chip.hot:hover{background:#c00000;color:#fff;border-color:#c00000}
.morekw{font-size:12px;color:var(--blue2);cursor:pointer;margin-top:7px;display:inline-block;font-weight:700}
.card{background:#fff;border-radius:12px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden}
.qhead{padding:12px 15px;cursor:pointer;display:flex;gap:9px;align-items:flex-start;background:#eef3f9}
.qhead:hover{background:#e3ecf6}
.mtag{font-size:10px;font-weight:700;background:var(--blue);color:#fff;border-radius:7px;padding:2px 7px;white-space:nowrap;margin-top:2px}
.mtag.live{background:#c00000}
.qtxt{font-weight:800;font-size:14px;color:#16324e;flex:1}
.arrow{color:var(--blue);font-size:12px;margin-top:3px;transition:.15s}
.card.open .arrow{transform:rotate(90deg)}
.editbtn{font-size:13px;cursor:pointer;opacity:.45;margin-top:1px;transition:.1s;user-select:none}
.editbtn:hover{opacity:1;transform:scale(1.15)}
.toolbar{display:flex;gap:8px;align-items:center;margin-top:9px;flex-wrap:wrap}
.tbtn{background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer}
.tbtn:hover{background:rgba(255,255,255,.3)}
.tbtn.ghost{background:transparent}
.editnotice{display:none;align-items:center;gap:5px;background:#ffd84d;color:#4a3800;border-radius:8px;padding:4px 10px;font-size:11.5px;font-weight:800}
.editov{position:fixed;inset:0;background:rgba(10,20,35,.55);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:40px 14px;overflow-y:auto}
.editbox{background:#fff;border-radius:14px;width:100%;max-width:640px;padding:20px 22px;box-shadow:0 12px 40px rgba(0,0,0,.35)}
.editbox h3{margin:0 0 12px;font-size:16px;color:var(--blue);display:flex;align-items:center;gap:8px}
.editbox h3 span{font-size:11px;background:var(--blue);color:#fff;border-radius:7px;padding:2px 8px;font-weight:700}
.editbox label{display:block;font-size:12px;font-weight:800;color:#2b3444;margin:12px 0 4px}
.editbox textarea{width:100%;border:1.5px solid #cfdcec;border-radius:8px;padding:9px 11px;font-size:13.5px;font-family:inherit;line-height:1.55;resize:vertical}
.editbox textarea:focus{outline:none;border-color:var(--blue)}
.ebtns{display:flex;align-items:center;gap:9px;margin-top:15px;flex-wrap:wrap}
.ebtns button{border:none;border-radius:8px;padding:9px 18px;font-size:13.5px;font-weight:800;cursor:pointer}
.ebtns .save{background:var(--blue);color:#fff}
.ebtns .cancel{background:#e7ecf2;color:#333}
.ebtns .ehint{font-size:11px;color:var(--gray);flex:1;min-width:180px}
.body{display:none;padding:13px 17px;border-top:1px solid var(--line)}
.card.open .body{display:block}
.lbl{font-weight:800;font-size:12px;margin:12px 0 5px;letter-spacing:-.2px}
.lbl.g{color:var(--green)}.lbl.b{color:var(--blue)}.lbl.r{color:var(--red)}
.script p{margin:6px 0;font-size:13.5px}
.quote{background:#f4f7fb;border-left:3px solid var(--blue);padding:8px 12px;margin:6px 0;font-size:13px;color:#16324e}
.quote b{color:var(--blue);font-size:11px;display:block;margin-top:4px;font-weight:700}
.warn{color:var(--red);font-size:12px;background:#fdf2f2;border-radius:7px;padding:8px 11px;margin:8px 0;border-left:3px solid var(--red)}
.note{font-size:11.5px;color:var(--gray);background:#f7f8fa;border-radius:7px;padding:7px 10px;margin-top:8px}
.tagrow{display:flex;flex-wrap:wrap;gap:4px;margin-top:9px}
.tagrow .t{font-size:10.5px;background:#eaf0f7;color:var(--blue);border-radius:10px;padding:2px 8px;cursor:pointer}
.tagrow .t:hover{background:var(--blue);color:#fff}
.sec-h{font-size:15px;font-weight:800;color:var(--blue);margin:16px 2px 8px;padding-bottom:5px;border-bottom:2px solid var(--blue);display:flex;align-items:center;gap:7px}
.count{font-size:12px;color:var(--gray);margin:4px 2px 12px}
.hero{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:16px 18px;margin-bottom:13px}
.hero h2{margin:0 0 4px;font-size:17px;color:var(--blue)}
.hero p{margin:5px 0;font-size:13px;color:#333}
.pill{display:inline-block;background:#eef3f9;color:var(--blue);border-radius:20px;padding:3px 11px;font-size:12px;margin:3px 4px 0 0;font-weight:700}
.sl{background:#f4f7fb;border-left:4px solid var(--gold);padding:9px 13px;margin:7px 0;font-size:14px;font-weight:700;color:#3a2f00;border-radius:0 8px 8px 0}
/* timeline */
.tl{position:relative;padding-left:20px}
.tl:before{content:"";position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:var(--line)}
.tlitem{position:relative;margin-bottom:11px;background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.07);padding:11px 14px;cursor:pointer;transition:.12s}
.tlitem:hover{box-shadow:0 2px 9px rgba(0,0,0,.13);transform:translateX(2px)}
.tlitem:before{content:"";position:absolute;left:-16.5px;top:15px;width:11px;height:11px;background:var(--blue);border:2px solid #fff;border-radius:50%;box-shadow:0 0 0 2px var(--line)}
.tlitem.hot:before{background:#c00000;box-shadow:0 0 0 2px #f3c0c0}
.tldate{font-size:12px;font-weight:800;color:var(--blue);display:inline-block;min-width:38px}
.tlcat{font-size:10px;background:#eef3f9;color:var(--blue);border-radius:8px;padding:1px 7px;margin-left:4px;font-weight:700}
.tltitle{font-size:13.5px;font-weight:700;color:#16324e;margin:4px 0 3px}
.tlsumm{font-size:12px;color:var(--gray)}
.artlink{display:block;background:#fff;border-radius:9px;box-shadow:0 1px 3px rgba(0,0,0,.07);padding:10px 13px;margin-bottom:8px;text-decoration:none;color:inherit;border-left:3px solid var(--blue2)}
.artlink:hover{box-shadow:0 2px 8px rgba(0,0,0,.12)}
.artlink .m{font-size:10.5px;color:#fff;background:var(--blue2);border-radius:7px;padding:1px 7px;font-weight:700}
.artlink .tt{font-size:13px;font-weight:700;margin:4px 0 2px;color:#16324e}
.artlink .ss{font-size:11.5px;color:var(--gray)}
.empty{text-align:center;color:var(--gray);padding:30px;font-size:13px}
mark{background:#ffe88a;padding:0 1px}
.hint{font-size:12px;color:var(--gray);background:#fff;border-radius:9px;padding:9px 13px;margin-bottom:12px;border-left:3px solid var(--blue2)}
@media(max-width:860px){.layout{flex-direction:column-reverse}.kwpanel{width:100%;position:static;max-height:none}}
</style></head>

전히 차단해야 합니다. 얼굴만 젊은 사람을 앞줄에 세우는 게 아니라, 결정권을 넘기는 것 — 그게 진짜 세대교체입니다."], "quotes": [["김보미 (최신 워딩)", "지역에서는 국회의원이 왕입니다. 말 잘 듣는 청년만 클 수 있습니다."], ["김보미 (최신 워딩)", "진정한 세대교체는 공천에서 국회의원의 입김을 완전히 차단하는 것입니다."]], "notes": ["세대교체=나이가 아니라 '결정권 이전'. 국회의원 왕 서사가 가장 강력한 실감 사례."]}, {"no": 904, "media": "뉴스바사삭", "part": "뉴스바사삭", "label": "오늘 방송", "q": "4. '개혁'을 앞세운 젊은 정치인들이 세대 갈라치기나 스스로 기득권화로 실망을 사기도 했습니다. 김보미도 '검증된 대안'인지 의구심이 있는데요?", "tags": ["자질론", "검증", "강진", "계파없음", "뉴스바사삭"], "script": ["나이는 서른여섯이지만 입당한 지 13년 됐습니다. 군의원을 두 번 하고 의장도 지냈습니다. 누가 끌어준 것도 아니고, 어느 계파에 소속된 것도 아닙니다. 오직 군민만 보고 정치했습니다.", "대한민국에 유력 정치인이 끌어주지 않고, 스스로 온갖 고난을 이기면서 이 자리까지 온 청년 정치인이 있으면 한번 소개해 주십시오.", "표적 징계도, 제명도, 수사도 겪었습니다. 100건이 넘는 허위 보도와 싸워 손해배상 승소까지 받아냈습니다. 그런데도 제가 아직 기죽지 않고 정치를 하고 당대표에 도전하고 있다는 것, 그 자체가 제가 검증된 대안이라는 증거입니다."], "quotes": [["김보미 (최신 워딩)", "끌어주는 사람 없이 스스로 고난을 이기고 여기까지 온 청년 정치인이 있으면 소개해 주십시오."], ["김보미 (최신 워딩)", "아직도 기죽지 않고 도전한다는 것, 그게 검증된 대안이라는 증거입니다."]], "notes": ["'검증'을 경력이 아니라 '생존 서사'로 증명. 수난기(징계·제명·수사·승소)로 뒷받침."]}, {"no": 905, "media": "뉴스바사삭", "part": "뉴스바사삭", "label": "오늘 방송", "q": "5. 재산, 부친의 선거 출마 이력을 거론하며 '지역 유지' 프레임으로 해석하려는 움직임이 있습니다. 입장을 밝혀주시죠.", "tags": ["재산", "검증", "기탁금", "흥신소정치", "뉴스바사삭"], "script": ["저는 1천만 원 기탁금이 없어서 등록 당일 다섯 군데에서 빌렸습니다. 올해 신고 재산은 채무가 늘어 마이너스 9,178만 원, 빚밖에 없습니다.", "아버지는 오래전 군의원에 출마하셨던 분이고 지금은 공방을 운영하십니다. 그게 '지역 유지'입니까?", "그냥 자기가 지지하는 후보를 비판하니까 아무 말 대잔치를 하는 겁니다. 사진 한 장, 서류 한 줄로 사람을 재단하는 흥신소 정치는 이제 그만해야 합니다."], "quotes": [["김보미 (최신 워딩)", "기탁금 1천만 원이 없어서 등록 당일 다섯 군데서 빌렸습니다. 제 재산은 빚밖에 없습니다."], ["김보미 (최신 워딩)", "자기 지지 후보를 비판하니까 아무 말 대잔치를 하는 것입니다."]], "notes": ["숫자(마이너스 9,178만·다섯 군데)로 즉시 반박 → '아무말 대잔치' 규정 → 흥신소 정치 프레임."]}, {"no": 906, "media": "뉴스바사삭", "part": "뉴스바사삭", "label": "오늘 방송", "q": "6. 이낙연 전 총리 측근으로 알려진 이진련 전 대구시의원과 찍힌 사진 등이 논란이 됐습니다. 어떻게 돌파하실 계획입니까?", "tags": ["계파", "이낙연계", "흥신소정치", "세작", "족보정치", "뉴스바사삭"], "script": ["그런 식으로 따진다면 김민석 후보와 사진 찍은 사람은 다 친석파고, 정청래 후보와 사진 찍은 사람은 다 친청파겠네요. 사진 한 장으로 계파를 판정하는 것, 그게 바로 흥신소 정치입니다.", "제가 민주당에 입당한 지 13년입니다. 그동안 당대표가 수도 없이 바뀌었습니다. 회사로 치면 사장이 수차례 바뀐 건데, 그럼 저는 도대체 무슨 계파입니까? 실제로 저는 추미애 대표 때 공천받고, 이낙연 대표 때 제명되고, 이재명 대표 때 복당했습니다.", "정말 황당한 건 이겁니다. 청년은 족보에 끼워 주지도 않으면서, 이제 와서 족보를 새로 발급해 주고 있습니다. 벽을 치고 못 들어오게 막아 놓고서는, 사진 한 장 나오면 '누구 파냐'고 묻습니다.", "저는 계파가 없어서 챙길 사람도 없습니다. 그래서 제가 민주당 개혁을 거침없이 할 수 있는 유일한 후보입니다."], "quotes": [["김보미 (최신 워딩)", "입당 13년, 당대표는 수도 없이 바뀌었습니다. 사장이 수차례 바뀌었는데 저는 무슨 계파입니까?"], ["김보미 (최신 워딩)", "청년은 족보에 끼워 주지도 않으면서, 이제 와서 족보를 새로 발급해 주고 있습니다. 황당합니다."], ["김보미 (최신 워딩)", "사진 한 장으로 계파를 판정하는 것, 그게 바로 흥신소 정치입니다."]], "notes": ["보강판: 사장 교체 비유(13년간 대표 교체) + '족보 신규 발급' 역설 + 흥신소 정치 + 3代 대표 이력 + '계파 없음=개혁 적임' 마무리."]}, {"no": 907, "media": "뉴스바사삭", "part": "뉴스바사삭", "label": "오늘 방송", "q": "7. 송영길 후보 자격 문제로 박지현 전 위원장을 소환하셨는데, '불가피한 복당'과 '신규 입당'은 달라 비교가 무리라는 지적도 있습니다. 문제의식이 여전히 유효합니까?", "tags": ["송영길김용", "박지현", "공정", "돈봉투", "고함사건", "뉴스바사삭"], "script": ["당헌·당규 조문을 떠나서 보시죠. 어떤 청년은 '자격이 있는지 회의를 열어 결정해 달라'고 했는데 접수조차 안 받았습니다. 어떤 686은 자격이 안 되니까 밤 10시 반에 긴급회의를 열어 등록할 길을 열어 줬습니다. 이게 본질입니다.", "등록이 시작되고 나서 규정을 고치는 시험이나 면접이 세상에 어디 있습니까? 예외를 인정하려면 최소한 등록 접수 전에 했어야죠. 솔직히 말하면 '나를 어찌하랴' 하고 아무 준비도 안 하신 겁니다. 본인의 준비 부족으로 생긴 문제를 왜 남 탓, 당 탓을 합니까.", "그리고 송영길 후보는 이미 당대표를 한 번 하셨습니다. 그때 청년정치를 위해, 공정을 위해, 당내 민주주의를 위해 무엇을 하셨습니까? 낡은 돈봉투 정치 논란의 책임을 지고 성찰하셔야 할 분이 두 번째 당대표를 하겠다는 것 자체가 청년들 눈엔 불공정의 끝판왕으로 보입니다."], "quotes": [["김보미 (최신 워딩)", "청년은 회의를 열어달라 해도 접수조차 거부당했고, 686은 밤 10시 반 긴급회의로 길이 열렸습니다."], ["김보미 (최신 워딩)", "등록 시작하고 나서 규정을 고치는 시험이나 면접이 어디 있습니까?"]], "notes": ["복당/신규입당 반론을 '절차의 본질'로 재프레임. 시험·면접 비유가 대중적."], "warn": "돈봉투 관련: '법원 무죄 판단'은 사실이므로 '유죄' 단정 금지 — '논란의 책임·성찰' 수준으로. 인격 표현('게으르다' 등)은 방송에서 순화."}, {"no": 908, "media": "뉴스바사삭", "part": "뉴스바사삭", "label": "오늘 방송", "q": "8. 줄곧 '공정'을 강조하셨는데, '룰'이 공정의 최고 기준이냐는 지적도 나옵니다.", "tags": ["공정", "룰", "송영길김용", "경선혁신", "강진공천", "기탁금", "중앙위원투표", "뉴스바사삭"], "script": ["룰이 공정의 최고 기준은 아닙니다. 하지만 최소한의 기준입니다. 그런데 우리 민주당의 룰은 '단, 이러이러한 경우 예외로 한다', '단, 달리 정할 수 있다'가 너무 많습니다. 누굴 떨어뜨리고 싶으면 얼마든지 떨어뜨리고, 자격이 안 되는 사람도 붙이고 싶으면 얼마든지 붙일 수 있는 구조입니다.", "이번 전당대회만 봐도 사례가 넘칩니다. 당규상 경선에 영향을 주는 규칙은 최소 30일 전에 확정해야 하는데, 선거를 코앞에 두고 예비경선에 중앙위원 투표를 반영하는 방식으로 룰을 바꿨습니다. 제가 국회 소통관 기자회견에서 지적했던 그대로입니다. 기탁금은 선거 직전에 올렸다가 등록이 끝난 뒤에야 찔끔 깎았습니다. 송영길 후보 자격은 밤 10시 반 긴급 최고위로 예외를 열어줬습니다.", "지난 지방선거도 마찬가지입니다. 저에게는 당헌·당규에도 없는 새 지침을 만들어 기어이 15%를 감산했고, 전과 5범 후보는 감산 없이 공천했습니다. 게임 도중에, 심판이, 특정 선수를 위해 규칙을 바꾸는 겁니다.", "이번 사태를 두고 어느 민주당 의원께서 '민주당은 룰이 없다'고 하셨는데, 딱 그 말이 맞습니다. 그래서 제 1호 공약이 경선 규칙 6개월 전 확정, '달리 정할 수 있다' 단서조항 전부 삭제, '고무줄 규칙' 완전 폐지입니다."], "quotes": [["김보미 (최신 워딩)", "룰은 공정의 최고 기준은 아니지만, 최소한의 기준입니다. 민주당엔 그 최소한도 없습니다."], ["김보미 (최신 워딩)", "30일 전에 확정해야 할 규칙을 선거 코앞에 중앙위원 투표 방식으로 바꿨습니다. 게임 도중 심판이 규칙을 바꾸는 겁니다."], ["김보미 (최신 워딩)", "저에겐 없는 지침을 만들어 15% 감산, 전과 5범은 무감산 공천 — 이게 민주당의 룰입니다."]], "notes": ["사례 4종 세트: ①중앙위원 투표 룰 변경(30일 규정 위반·기자회견 지적) ②기탁금 인상→사후 감액 ③송영길 밤10시반 구제 ④강진 15% 감산. '게임 도중 심판이 규칙 변경' 비유로 압축."]}, {"no": 909, "media": "뉴스바사삭", "part": "뉴스바사삭", "label": "오늘 방송", "q": "9. 지방의회 의장으로서 쌓은 실질적 성과는 무엇이고, 그 리더십이 중앙에서도 통한다고 자신하십니까?", "tags": ["강진", "예산", "나라살림돋보기", "리더십", "지방의원", "맘다니", "뉴스바사삭"], "script": ["먼저 여쭙고 싶습니다. 지방의회는 중앙의 축소판 아닙니까? 예산 심의하고, 행정 감사하고, 조례 만들고, 주민을 대변합니다. 국회가 하는 일을 규모만 작게 다 합니다. 오히려 지방의회 경험도 없이 중앙정치를 하시는 분들이 허다합니다.", "해외를 보십시오. 유럽의 총리·장관들은 대부분 지방의원부터 시작해 단계를 밟아 올라옵니다. 지방부터 정치인을 양성하는 게 세계의 상식입니다. 미국 뉴욕시장 맘다니를 보십시오 — 저보다 동생뻘입니다. 그 나이에 세계 최대 도시를 이끕니다. 30대가 못할 게 뭐가 있습니까?", "제 성과로 말씀드리면, 강진에서 '일문일답 군정질문'을 사상 처음 도입했고, 낭비예산 108억 원을 삭감했으며, 행정사무감사 시정요구 195건을 냈습니다. 업무추진비 전면 공개, 본회의 실시간 생중계, 전남 최초 육아수당(자녀당 월 60만 원)까지 만들어냈습니다.", "그리고 '나라살림 돋보기'라는 도구를 직접 만들었습니다. 243개 지자체와 중앙정부 예산을 누구나 3초 만에 확인하는 서비스입니다. 말이 아니라 시스템을 만드는 것 — 이게 제가 일하는 방식이고, 중앙이라고 다르지 않습니다."], "quotes": [["김보미 (최신 워딩)", "지방의회는 중앙의 축소판입니다. 오히려 지방의회 경험도 없이 중앙정치 하는 분들이 허다합니다."], ["김보미 (최신 워딩)", "뉴욕시장 맘다니는 저보다 동생뻘입니다. 30대가 못할 게 뭐가 있습니까?"], ["김보미", "말이 아니라 시스템을 만듭니다. 낭비예산 108억 삭감, 시정요구 195건이 제 이력서입니다."]], "notes": ["보강판: ①지방의회=중앙의 축소판 반문 ②경험 없는 중앙정치인 역공 ③해외사례(유럽 단계 양성+뉴욕 맘다니 동생뻘) ④성과 숫자 ⑤나라살림돋보기. '자격 질문'을 '역량 증명'으로 전환."]}, {"no": 910, "media": "뉴스바사삭", "part": "뉴스바사삭", "label": "오늘 방송", "q": "10. 후보님이 만들고 싶은 '미래형 민주당'의 청사진, 핵심 키워드 3가지로 정리해 주신다면?", "tags": ["공정", "민주주의", "청년", "5무정당", "모병제", "청년취업보장제", "신천지", "뉴스바사삭"], "script": ["첫째, '공정한 민주당'입니다. 지난 강진군수 경선은 불공정의 극치였습니다. 저에게는 당헌·당규에도 없는 새 지침을 만들어 기어이 15%를 감산했고, 전과 5범 후보는 감산 없이 공천을 줬습니다. 경선 규칙을 전면 혁신해 실력과 정책으로 공정하게 경쟁하는 정당을 만들겠습니다.", "둘째, '민주정당 민주당'입니다. 가짜·불법 당원이 후보를 뽑고, 선거인 수도 득표수도 공개하지 않으면서 이걸 1인1표, 당원주권이라 자랑합니다. 신천지 조직 유입 의혹도 그냥 넘어가려 합니다. 경선 룰은 6개월 전 확정하고, 불법·유령 당원 모두 정리하고, 경선 결과는 100% 공개하겠습니다.", "셋째, '청년정당 민주당'입니다. 지역에선 국회의원이 왕이고, 말 안 듣는 청년은 씨를 말립니다. 청년취업보장제를 당 핵심 정책으로 도입하고, 청년위원회가 청년 정책 결정권을 갖게 하겠습니다. 남녀 모두 단기 기초군사훈련을 받게 하고 징병제는 단계적 모병제로 바꾸는 공약도 발표했습니다. 군 복무자는 가산점과 보상을 받도록 하겠습니다."], "quotes": [["김보미 (최신 워딩)", "공정한 민주당, 민주정당 민주당, 청년정당 민주당 — 이 세 가지가 제 청사진입니다."], ["김보미 (최신 워딩)", "남녀 모두 기초군사훈련, 징병제는 단계적 모병제로 — 군 복무자는 가산점과 보상을 받게 하겠습니다."]], "notes": ["3키워드 구조 필수(공정/민주/청년). 모병제·기초군사훈련·청년취업보장제 신규 공약 홍보 기회."], "warn": "신천지 언급은 '의혹이 사실이라면' 단서 유지 — 단정 금지. 검증 요구 프레임."}, {"no": 911, "media": "뉴스바사삭", "part": "뉴스바사삭", "label": "오늘 방송", "q": "11. 민주당의 분열을 걱정하는 분들이 많습니다. 어떤 생각을 갖고 계신지요.", "tags": ["통합", "정청래", "이재명", "친명친청", "재집권", "뉴스바사삭"], "script": ["대통령께서 통합을 원하고 계시고, 누가 당선되든 새 대표도 겉으로는 통합을 내세울 겁니다. 지금은 당권을 두고 피 튀기게 경쟁해서 그렇지, 전당대회가 끝나면 다시 통합의 길로 간다고 봅니다.", "다만 정청래 후보가 되면 사정이 달라질 수 있다고 봅니다. 지금까지 그래왔던 것처럼 집권 여당 대표가 아니라 '집권 야당 대표'처럼 사사건건 정부와 엇박자를 낸다면 분열상이 심각해질 수 있습니다.", "저는 이 말씀을 드리고 싶습니다. 모두 소인배처럼 당권과 대권에만 빠져 허덕이는 정치가 아니라, 국가와 국민을 보고 정치를 했으면 좋겠습니다. 재집권에 실패하면 다시 계엄입니다. 친명·친청 힘을 합치는 것은 기본이고, 모든 민주진보세력이 합쳐야 합니다."], "quotes": [["김보미 (최신 워딩)", "집권 여당 대표가 '집권 야당 대표'처럼 정부와 엇박자를 내면 분열은 심각해집니다."], ["김보미 (최신 워딩)", "당권과 대권에 허덕이는 소인배 정치가 아니라 국가와 국민을 보고 정치합시다."]], "notes": ["통합 전망 + 정청래 리스크 지적 + '소인배 정치' 규정. 아름다운 퇴장 성명의 통합론으로 마무리."]}, {"no": 601, "media": "광주KBS무등의아침", "part": "무등의아침", "label": "내일 생방송", "q": "후보님, 청취자 가운데 생소한 분들이 많습니다. 본인이 어떤 정치인인지 소개해 주십시오.", "tags": ["소개", "출마이유", "강진", "풀뿌리", "세대교체", "유일한후보", "무등의아침"], "script": ["저는 전남 강진에서 정치를 시작한 올해 서른여섯 살 김보미입니다. 13년 동안 민주당에서 활동했고, 전국 최연소 기초의회 의장도 지냈습니다.", "서울에서 국회의원 보좌관이나 중앙당 당직으로 정치를 시작한 것이 아니라, 강진에서 주민들의 민원을 해결하고 예산을 따내고, 농민과 자영업자의 어려움을 듣는 풀뿌리 정치를 했습니다.", "새벽에는 농민을 만나고, 낮에는 시장에서 상인을 만나고, 밤에는 주민들의 민원 전화를 받으며 정치가 무엇인지 배웠습니다. 그래서 저는 정치를 줄대기 기술, 권력의 기술이 아니라 '생활을 바꾸는 기술'이라고 생각합니다.", "이번 당대표 선거도 같은 마음으로 출마했습니다. 민주당은 죽기 직전입니다. 이번에도 686 세 명으로 당대표 본경선을 치르면 민주당은 총선·대선에서 이기기 힘듭니다.", "개혁은 아무나 할 수 있는 것이 아닙니다. 챙겨줄 사람이 많은 기득권은 걸리적거리는 것이 많아 개혁이 힘듭니다. 신세 진 국회의원도 없고, 챙겨 주어야 할 사람도 없는 김보미가 가장 확실하게 당 개혁을 할 수 있습니다."], "quotes": [["김보미 (무등의아침 준비)", "정치는 줄대기 기술, 권력의 기술이 아니라 생활을 바꾸는 기술입니다."], ["김보미 (무등의아침 준비)", "신세 진 국회의원도 없고 챙겨 줄 사람도 없는 김보미가 가장 확실하게 당 개혁을 할 수 있습니다."]], "notes": ["첫 질문=자기소개. 강진 풀뿌리 서사 → 세대교체·개혁 적임자로 자연스럽게 연결."]}, {"no": 602, "media": "광주KBS무등의아침", "part": "무등의아침", "label": "내일 생방송", "q": "출마 이후 X를 개설했는데 이재명 대통령이 하루 만에 팔로우했습니다. 어떠셨습니까?", "tags": ["이재명", "X팔로우", "기탁금", "공영제", "경청", "무등의아침"], "script": ["정말 놀랐습니다. 처음에는 저도 믿기지 않았습니다. 대통령이 말씀은 안 하셔도 지켜보고 있구나 하는 생각이 들었습니다. 많이 감사한 마음이었습니다.", "개인적으로는 큰 영광이죠. 하지만 저는 그것을 저 개인에 대한 격려라기보다 '청년 정치에 대한 응원'이라고 받아들였습니다.", "이재명 대통령께서는 청년들의 경제 사정을 고려해 당내 경선 기탁금 문제도 제기하셨습니다. 그래서 당에서 일부 조정했지 않습니까?", "우리나라는 선거공영제를 하고 있어 출마한 후보가 기탁금을 내지 않습니다. 그런데 당에서는 아직도 기탁금을 받고 있습니다. 기탁금은 깎아줄 것이 아니라 없애야 합니다.", "민주당에 돈이 남아돕니다. 정당보조금 꼬박꼬박 받고 선거 때는 선거보조금도 받습니다. 그러면서 당내 경선에는 한 푼도 보태줄 수 없으니 출마하는 사람이 다 내라고 하고, 선거 때마다 올립니다. 입시원서 장사하는 대학들과 똑같은 행태입니다. 앞서가는 것은 없고 늘 뒤처져 있는 것이 민주당입니다."], "quotes": [["김보미 (무등의아침 준비)", "저 개인에 대한 격려라기보다 청년 정치에 대한 응원이라고 받아들였습니다."], ["김보미 (무등의아침 준비)", "기탁금은 깎아줄 것이 아니라 없애야 합니다. 민주당에 돈이 남아도는데 왜 출마자에게 다 내라고 합니까."]], "notes": ["X팔로우는 '낙점'이 아니라 '청년정치 응원'으로 프레이밍. 자연스럽게 기탁금·공영제로 연결."]}, {"no": 603, "media": "광주KBS무등의아침", "part": "무등의아침", "label": "내일 생방송", "q": "현역 국회의원도 아니고 조직도 계파도 없는 원외 후보인데 왜 출마하셨습니까?", "tags": ["출마이유", "5무정당", "세대교체", "김어준", "정청래", "꼰대", "2030", "무등의아침"], "script": ["많은 분들이 같은 질문을 하십니다. '누구 떨어뜨리려고 나왔냐'고요. 저는 제가 당선되기 위해 나왔습니다. 그리고 지금 민주당이 위기입니다. 공정도, 미래도, 청년도, 민주주의도 다 없습니다.", "민주당이 지금처럼 내로남불 정당, 불공정 아이콘, 686 꼰대 정당으로 가면 2030 다 떠나고 총선·대선 다 집니다. 저라도 나와서 세대교체를 말하고 청년정치를 살려야 한다고 외쳐야 한다고 생각했습니다.", "제가 '선거 패배 책임지고 물러나야 할 정청래 후보가 왜 또 나왔냐'고 비 증해야 합니다. 아무 공약도 없고 선거운동도 안 하고, 조직 동원해 억지로 입당시키고 휴대폰 전화만 기다리는 공천 — 여기에 민주주의와 공정한 경쟁은 없습니다.", "그래서 저는 호남 정치의 독립을 선언했습니다. 서울 여의도에 줄 대는 정치가 아니라, 호남이 호남의 정치인을 직접 키우는 정치로 바꿔야 합니다. 서울 정치인들은 호남의 피눈물을 모릅니다. 호남의 공천을 혁신해야 민주당이 삽니다."], "quotes": [["김보미 (무등의아침 준비)", "뿌리 호남의 공천이 제일 엉망입니다. 그 피해자 중 한 사람이 접니다."], ["김보미 (무등의아침 준비)", "호남은 공천이 곧 당선입니다. 이런 곳일수록 토론회로 후보를 검증해야 합니다."], ["김보미 (호남 독립선언)", "서울 여의도에 줄 대는 정치가 아니라, 호남이 호남의 정치인을 직접 키워야 합니다."]], "notes": ["호남 로컬 이슈. 본인=불공정 경선 피해자 서사 + 호남 독립선언 연결. 토론회 부재 강조."]}, {"no": 608, "media": "광주KBS무등의아침", "part": "무등의아침", "label": "내일 생방송", "q": "이번에 선출되는 당대표는 2028년 총선 공천을 책임집니다. 호남 공천 시스템을 어떻게 바꾸시겠습니까?", "tags": ["공천", "유리상자", "득표수공개", "경선혁신", "공정", "1인1표", "무등의아침"], "script": ["세 가지 원칙을 반드시 세우겠습니다. 첫째, '예측 가능한 공천'입니다. 경선 규칙은 선거 직전에 바꾸면 안 됩니다. 최소 6개월 전에 확정해 누구나 같은 조건에서 준비할 수 있어야 합니다. 특정인을 봐주려 규칙이 바뀌는 순간 공정은 무너집니다.", "둘째, '투명한 공천'입니다. 민주당은 지금도 경선 결과를 공개하지 않습니다. 저 역시 강진 경선에서 제가 몇 표를 얻었는지, 투표율이 얼마였는지 모릅니다. 출마한 후보가 자기 득표도 모르는 선거가 민주주의입니까? 특정 국회의원의 사주를 받은 당직자가 조작하지 않는다는 보장이 있습니까?", "셋째, '경쟁력 중심 공천'입니다. 시험 보고 토론회·연설회를 해서 실력을 검증해야 합니다. 누구한테 줄 섰느냐가 아니라 누가 실력이 있느냐로 평가하는 체계를 갖추겠습니다.", "실력 대신 충성도, 정책 대신 계파가 중심인 현재의 공천 시스템이 바뀌지 않으면 민주당은 신뢰를 회복할 수 없습니다."], "quotes": [["김보미 (무등의아침 준비)", "공천 3원칙: 예측 가능한 공천, 투명한 공천, 경쟁력 중심 공천."], ["김보미 (무등의아침 준비)", "출마한 후보가 자기 득표도 모르는 선거가 민주주의입니까?"]], "notes": ["정책 대안 문항. '공천 3원칙'을 숫자로 또렷하게. 유리상자 경선 공약과 직결."]}, {"no": 609, "media": "광주KBS무등의아침", "part": "무등의아침", "label": "내일 생방송", "q": "당대표의 물리적 나이만으로 세대교체를 주장하는 게 아니라 민주당의 체질을 바꿔야 할 텐데요. 2030 지지 이탈을 막으려면 민주당의 체질을 어떻게 바꿔야 합니까?", "tags": ["2030", "무당층", "공정", "청년결정권", "청년최고위원", "기탁금", "무등의아침"], "script": ["청년들이 민주당을 떠난 가장 큰 이유는 정책이 부족해서가 아니라 공정을 잃었기 때문입니다. 또 청년에게 기회가 없는 기득권 정당으로 전락했기 때문입니다.", "청년 정치를 확대하겠다면서 청년최고위원을 거부했고, 청년에게 기회를 준다면서 기탁금을 올렸습니다. 이런 모습이 '민주당은 청년을 말하지만 청년을 이용한다'는 확신을 청년들에게 심어주었습니다.", "청년에게 공간을 마련해 주어야 합니다. 청년최고위원제를 도입하고, 청년위원회가 당의 청년정책을 결정하게 하고, 무엇보다 당대표가 김보미가 되어야 합니다."], "quotes": [["김보미 (무등의아침 준비)", "청년이 떠난 건 정책이 부족해서가 아니라 공정을 잃었기 때문입니다."], ["김보미 (무등의아침 준비)", "민주당은 청년을 말하지만 청년을 이용합니다."]], "notes": ["체질 개선 문항. 청년최고위원 거부·기탁금 인상이 '이용'의 증거. 청년결정권 공약으로 마무리."]}, {"no": 610, "media": "광주KBS무등의아침", "part": "무등의아침", "label": "내일 생방송", "q": "이번 전당대회에서 청년최고위원 선출이 무산됐습니다. 어떻게 보셨습니까?", "tags": ["청년최고위원", "계파", "책임정치", "무등의아침"], "script": ["2030이 떠나 선거에 참패하고서도 정신을 못 차린 겁니다. 민주당은 사전에 반성과 책임을 지워버린 정당입니다.", "최고위원 한 자리 준다고 민주당이 청년정당이 됩니까? 그건 최소한의 요구였는데, 그것마저 '자기 사람 심겠다'는 계파정치의 희생물이 되었습니다. 한심한 일이지요."], "quotes": [["김보미 (무등의아침 준비)", "최고위원 한 자리 준다고 청년정당이 됩니까? 그 최소한의 요구마저 계파정치의 희생물이 됐습니다."]], "notes": ["짧고 단호하게. 청년최고위원 부결=계파정치 민낯."]}, {"no": 611, "media": "광주KBS무등의아침", "part": "무등의아침", "label": "내일 생방송", "q": "기탁금도 논란이 많았습니다. 결국 2천만 원을 감액했는데 어떻게 보십니까?", "tags": ["기탁금", "기탁금감액", "공영제", "내로남불", "무등의아침"], "script": ["무슨 배추값 깎아주는 것도 아니고, 한심한 일입니다. 대선·총선·지선 나가면 나라에서 선거비용 대주는데, 민주당 경선은 왜 예비후보까지 악착같이 자기 돈 내서 선거하라고 합니까? 이것도 내로남불입니다. 민주당은 내로남불이 아닌 게 하나도 없는 것 같습니다.", "기탁금 깎아줬다고 다 된 게 아닙니다. 청년은 돈이 없으면 출마하기 어렵고, 조직이 없으면 경쟁하기 어렵고, 계파가 없으면 알려질 기회조차 얻기 어렵습니다. 최소한 돈 문제라도 해결해 줘야 합니다.", "민주당에 돈이 남아돕니다. 그러면서 기탁금을 받습니다. 저는 당대표가 되면 당내 경선에도 선거공영제를 도입하겠습니다. 기탁금을 싹 없애겠습니다."], "quotes": [["김보미 (무등의아침 준비)", "무슨 배추값 깎아주는 것도 아니고 — 기탁금은 깎을 게 아니라 없애야 합니다."], ["김보미 (무등의아침 준비)", "당대표가 되면 당내 경선에도 선거공영제를 도입해 기탁금을 싹 없애겠습니다."]], "notes": ["'배추값' 비유가 라디오에서 강렬. 찔끔 감액 비판 → 당직선거 공영제 대안."]}, {"no": 612, "media": "광주KBS무등의아침", "part": "무등의아침", "label": "내일 생방송", "q": "검찰 보완수사권 폐지 관련입니다. 여고생 살해범 사건 이후 존폐 논란이 확산 중입니다. 민주당은 의총에서 결론을 못 냈는데 후보님 입장은?", "tags": ["보완수사권", "검찰개혁", "피해자보호", "무등의아침"], "script": ["(기존 검찰개혁 스탠스 유지 — '완성하자'는 톤)", "검찰개혁, 안 하자는 게 아니라 완성하자는 겁니다. 칼은 뺏어도 좋습니다. 그러나 선까지 자를 일은 아닙니다. 검·경이 서로 견제하는 제도여야 합니다 — 정치검찰도, 경찰 독주도 안 됩니다.", "무엇보다 피해자 보호 공백은 절대 안 됩니다. 여성단체가 우려하는 지점이 바로 그것입니다. 속도보다 방향, 그리고 국민 안전이 먼저입니다."], "quotes": [["김보미 (준비 워딩)", "칼은 뺏어도 좋습니다. 그러나 선까지 자를 일은 아닙니다. 피해자 보호 공백은 절대 안 됩니다."]], "warn": "질문안에 '(알아서 하던대로)'로 표기된 문항. 기존 검찰개혁 입장 그대로. 즉답 대신 '완성·피해자보호' 균형 화법.", "notes": ["원 질문안엔 답변 비워둠(하던 대로). 기존 보완수사권 이슈카드 스탠스 그대로 사용."]}, {"no": 613, "media": "광주KBS무등의아침", "part": "무등의아침", "label": "내일 생방송", "q": "전남·광주에서 가장 뜨거운 이슈가 반도체 산업단지 조성입니다. 당대표가 되면 당 차원에서 어떤 노력을 하시겠습니까?", "tags": ["메가프로젝트", "반도체800조", "정청래", "호남", "AI", "균형발전", "농업", "무등의아침"], "script": ["우선 백제시대 이후 최대 프로젝트인 800조 반도체 투자를 '자기정치'에 이용하는 정청래 후보를 꺾는 것이 급선무입니다.", "'전북 소외론'으로 전북·전남을 갈라치고, '문재인 대통령 공'이라며 친문·친명을 갈라치는 정청래 후보는 반도체 클러스터 절대 성공 못 시킵니다. 당대표 시절에도 정부가 요구한 개혁법안을 27%밖에 통과시켜 주지 않았습니다. 대통령과 엇박자만 내고 자기정치만 하는 사람이 무슨 3대 메가프로젝트를 성사시키겠습니까?", "저는 800조 반도체 투자를 호남에 맞게 하나하나 뒷받침하겠습니다. 수도권과 똑같은 클러스터를 하나 더 만드는 방식은 현실적이지 않습니다. 광주·전남은 잘하는 분야를 세계 최고 수준으로 만드는 전략이 필요합니다.", "광주는 AI 국가시범도시로 지정돼 있고 국가 AI데이터센터를 갖췄습니다. 전남은 풍부한 재생에너지와 넓은 산업용지가 있습니다. 두 지역이 힘을 합치면 수도권과 '경쟁'하는 게 아니라 대한민국 AI 반도체 생태계를 '완성'하는 역할을 할 수 있습니다.", "AI 반도체 설계(팹리스), AI 서버·데이터센터, 전력반도체, 에너지반도체, 패키징 — 광주·전남이 충분히 경쟁력을 가질 분야입니다. AI 시대엔 공장만이 아니라 데이터센터·전력·재생에너지 공급 능력이 함께 갖춰져야 하는데, 광주·전남은 그 조건을 갖춘 몇 안 되는 지역입니다.", "저는 정부의 국가 AI 전략과 광주·전남의 미래산업 전략을 연결하겠습니다. 우리 호남 청년들이 공무원 시험을 준비하는 게 아니라 AI와 첨단산업에서 꿈을 키울 수 있도록 하겠습니다."], "quotes": [["김보미 (무등의아침 준비)", "800조 반도체를 자기정치에 이용하는 정청래 후보를 꺾는 것이 급선무입니다."], ["김보미 (무등의아침 준비)", "광주·전남이 힘을 합치면 수도권과 경쟁이 아니라 대한민국 AI 반도체 생태계를 완성할 수 있습니다."], ["김보미 (무등의아침 준비)", "호남 청년이 공무원 시험이 아니라 AI·첨단산업에서 꿈을 키우게 하겠습니다."]], "notes": ["지역 핵심 문항. 정청래 '갈라치기' 비판 → 광주(AI)·전남(재생에너지) 결합 '생태계 완성' 비전. 구체 산업 나열로 실력 증명."]}, {"no": 614, "media": "광주KBS무등의아침", "part": "무등의아침", "label": "내일 생방송", "q": "전남·광주 통합특별시가 7월 1일 출범했습니다. 서부권 단체장들은 무안 청사 기능 강화를 요구합니다. 어떻게 보십니까?", "tags": ["통합특별시", "무안청사", "균형발전", "지방소멸", "농업", "호남", "무등의아침"], "script": ["통합이 성공하려면 반드시 지켜야 할 원칙이 있습니다. 한쪽이 커지고 다른 한쪽이 작아지면 안 되고, '함께 커지는 통합'이어야 합니다.", "그래서 서부권 단체장들이 말씀하시는 무안 청사 기능 강화 요구는 충분히 타당한 문제 제기라고 생각합니다.", "서부권 주민들이 가장 걱정하는 건 청사 건물의 위치가 아닙니다. '전남이 광주에 흡수되고 전남은 더 낙후되는 것 아닌가' 하는 점입니다. 반도체 공장이 광주 군공항 부지로 결정됐는데, 무안 청사 기능마저 약화되면 광주 쏠림은 더 심해집니다.", "이 불안을 해소하지 못하면 통합은 완성되기 어렵습니다. 그래서 무안 청사 기능을 더 강화해야 합니다. 농업·수산, 해양, 섬 정책, 균형발전, 지방소멸 대응처럼 전남의 미래를 책임지는 핵심 기능은 무안 청사에 집중 배치하는 것이 맞습니다."], "quotes": [["김보미 (무등의아침 준비)", "한쪽이 커지고 다른 쪽이 작아지면 안 됩니다. 함께 커지는 통합이어야 합니다. 저는 추미애 대표 시절 공천받고, 이낙연 대표 시절 제명됐고, 이재명 대표 시절 복당했습니다. 그런 제가 도대체 누구의 계파가 돼야 합니까? 저는 계파가 없어서 챙길 사람도 없습니다. 그래서 거침없이 개혁할 수 있는 유일한 후보입니다.", "개혁은 아무나 못 합니다. 신세 진 사람, 챙길 사람이 많은 기득권은 걸리적거려서 개혁을 못 합니다. 쫄지 않고 국민을 대변하겠습니다."], "quotes": [["김보미", "제 재산은 채무가 늘어 마이너스 9,178만 원입니다."], ["김보미", "추미애 대표 때 공천받고, 이낙연 대표 때 제명되고, 이재명 대표 때 복당한 제가 누구의 계파가 돼야 합니까?"], ["김보미", "저는 챙길 사람이 없어서 거침없이 개혁할 수 있는 유일한 후보입니다."], ["참고 워딩 (자질·경험·나이 질문 공용)", "지방의회는 중앙의 축소판입니다. 오히려 지방의회 경험도 없이 중앙정치 하는 분들이 허다합니다. 유럽은 지방의원부터 정치인을 양성합니다. 뉴욕시장 맘다니는 저보다 동생뻘입니다 — 30대가 못할 게 뭐가 있습니까?"]], "notes": ["재산/계파 방어를 공격으로 전환('계파 없음=개혁 적임'). 마이너스 9,178만·3代 대표 이력은 확정 워딩."]}, {"no": 704, "media": "바삭한인터뷰", "part": "바삭한인터뷰", "label": "바삭", "q": "2-1. 386 감사하지만 이제는 멋진 이별하자 — 민주당 세대교체를 주장하십니다.", "tags": ["세대교체", "86용퇴", "화염병짱돌", "AI", "아름다운퇴장"], "script": ["386 세대, 깊이 존경합니다. 최루탄 맞고 감옥 가시며 청춘을 민주주의에 바치셨습니다. 제가 비판할 자유조차 그분들이 만들어 주신 겁니다. 그렇다고 대한민국 정치를 40년, 50년 독점할 권한까지 있는 건 아닙니다.", "바로 그렇기에 정중히 세대교체를 요청드립니다. 민주주의는 권력을 얻는 것으로 끝나지 않습니다. 권력을 다음 세대에게 넘겨줄 때 완성됩니다. AI 시대엔 짱돌과 화염병이 아니라 데이터와 기술을 이해하는 정치가 필요합니다.", "686을 지나 786, 886까지 갈 것이 아니라 이제는 멋진 이별을 준비하실 때입니다. 선배님들의 역사는 기념비가 되어야지, 다음 세대를 차단하는 성벽이 되어선 안 됩니다.", "밀어내려는 게 아닙니다. 가장 위대한 계승, 가장 아름다운 퇴장을 제가 준비해 드리겠습니다. 그것이 선배님들의 역사를 더 빛나게 하고, 민주당이 재집권하는 길입니다."], "quotes": [["김보미", "민주주의는 권력을 얻는 게 아니라, 다음 세대에게 넘겨줄 때 완성됩니다."], ["김보미", "선배님들의 역사는 기념비가 되어야지, 다음 세대를 차단하는 성벽이 되어선 안 됩니다."], ["김보미", "가장 위대한 계승, 가장 아름다운 퇴장을 제가 준비해 드리겠습니다."]], "notes": ["7.21 '아름다운 퇴장' 성명 톤으로 갱신. 존경→민주주의 완성 논리→성벽 비유→'가장 아름다운 퇴장'."]}, {"no": 705, "media": "바삭한인터뷰", "part": "바삭한인터뷰", "label": "바삭", "q": "3. '그 자리 하나가 아까워서 결정을 못 내리냐'고 하셨는데, 결국 선출직 청년최고위원 도입이 좌초됐습니다. 왜 이런 일이 벌어진다고 보시나요?", "tags": ["청년최고위원", "계파", "책임정치", "들러리"], "script": ["2030이 떠나 선거에 참패하고서도 정신을 못 차린 겁니다. 청년최고위원 한 자리, 그게 뭐라고 그걸 아까워서 아직도 결정을 못 합니까? 이런 민주당으로 어떻게 미래를 만듭니까? 청년이 없는데 미래가 있을 턱이 있습니까?", "전준위가 전원일치로 결의한 것을 최고위가 뒤집었습니다. 심지어 '선호투표제와 거래됐다'는 말까지 나옵니다. 청년의 자리가 계파의 협상 카드로 쓰인 겁니다.", "결국 민주당은 청년을 '말'로만 하고 '자리'는 안 주는 것입니다. 청년을 주체로 보지 않고 얼굴마담·들러리로만 쓰는 낡은 관성입니다. 저는 취임 당일 1호 안건으로 발의해 30일 안에 청년최고위원제를 완성하겠습니다."], "quotes": [["김보미", "그 자리 하나가 뭐라고 그게 아까워서 결정을 못 합니까? 청년이 없는데 미래가 있을 턱이 있습니까?"], ["김보미", "청년의 자리가 계파의 협상 카드로 쓰였습니다."]], "notes": ["연설 워딩('그게 뭐라고') 재사용. 계파 거래 의혹 + 취임 1호 안건 약속으로 대안 제시."]}, {"no": 706, "media": "바삭한인터뷰", "part": "바삭한인터뷰", "label": "바삭", "q": "3-1. 이번 지선에서 민주당이 청년에게 외면받은 가장 큰 원인은? 2030 표심을 가져올 대안은?", "tags": ["2030", "무당층", "공정", "청년결정권", "청년", "기탁금"], "script": ["청년이 민주당을 떠난 건 정책이 부족해서가 아니라 '공정'을 잃었기 때문입니다. 청년에게는 원칙을 들이대고, 기득권에게는 특혜를 줍니다. 이런 불공정이 반복되는데 어느 청년이 민주당을 믿겠습니까?", "청년을 확대한다면서 청년최고위원을 거부하고, 청년에게 기회를 준다면서 기탁금을 올립니다. 청년들은 압니다. 민주당이 청년을 '말'하지만 청년을 '이용'한다는 것을요.", "대안은 분명합니다. 청년에게 '말할 자리'가 아니라 '결정할 권한'을 줘야 합니다. 청년 예산 의결권 10%, 청년위원회의 청년정책 결정권, 청년정치펀드와 낙선 청년 재도전 안전망. 그리고 무엇보다 당대표가 김보미가 되는 것, 그 자체가 가장 강력한 메시지입니다."], "quotes": [["김보미", "청년이 떠난 건 정책이 부족해서가 아니라 공정을 잃었기 때문입니다."], ["김보미", "청년에게 필요한 건 '말할 자리'가 아니라 '결정할 권한'입니다."]], "notes": ["원인=공정 상실. 대안=청년 결정권(예산 10%·정책결정권). '이용당한다'는 청년 정서 대변."]}, {"no": 707, "media": "바삭한인터뷰", "part": "바삭한인터뷰", "label": "바삭", "q": "4. 김보미닷컴에 공약과 로드맵이 있습니다. '진짜 1인 1표'가 눈에 띄고, 스웨덴 정치 축제 알메달렌을 한국형으로 하겠다는 공약도 있던데요?", "tags": ["1인1표", "유령당원", "유리상자", "청년결정권", "한국형알메달렌", "공약", "당비", "경선혁신"], "script": ["'진짜 1인 1표'가 왜 필요한가. 지금 민주당은 유령당원·대리당원이 후보를 뽑고, 선거 결과도 공개하지 않습니다. 당원이 내가 뽑은 후보가 몇 표를 받았는지도 모릅니다. 이건 1인 1표가 아니라 '가짜 1인 1표'입니다.", "그래서 저는 재창당 11대 공약으로 답을 냈습니다. 당원명부를 행안부 주민등록과 대조해 가짜·불법당원을 정리하고, 경선 결과는 100% 공개하겠습니다. 30년째 월 1천원 내는 당비를 월 1만원으로 올리고 6개월 이상 낸 당원만 권리당원으로 인정하겠습니다. 남들은 갖지 못한 후보 선출권을 갖는데 1만원은 큰돈이 아닙니다.", "여기에 1·2순위 표를 모두 살리는 선호투표제를 제도화하고, 경선 규칙은 6개월 전에 확정해 '사람 보고 바꾸는 고무줄 규칙'을 없애겠습니다.", "한국형 알메달렌은 그 연장선입니다. 스웨덴 알메달렌처럼 여야·시민·언론이 정책으로 축제처럼 토론하는 자리를 만들겠습니다. 민주당을 '싸움의 정당'이 아니라 '토론의 정당'으로 바꾸는 것, 그게 제 25개 약속과 11대 재창당 공약의 핵심입니다."], "quotes": [["김보미", "가짜·불법당원 정리하고 경선 결과는 100% 공개. 당비도 월 1만원으로 올려 진짜 당원주권을 세우겠습니다."], ["김보미", "민주당을 '싸움의 정당'이 아니라 '토론의 정당'으로 바꾸겠습니다. 그게 한국형 알메달렌입니다."]], "notes": ["11대 재창당 공약 반영: 당원명부 검증·결과 100% 공개·당비 1만원·선호투표·경선룰 6개월 전 확정. 알메달렌=토론정당."]}, {"no": 708, "media": "바삭한인터뷰", "part": "바삭한인터뷰", "label": "바삭", "q": "5. 박지현 전 위원장을 소환했습니다. '청년 박지현은 안 되고 686 송영길은 되나, 이게 공정인가.' 송영길 후보 자격 예외 인정을 '비정상의 극치'라 비판했는데요?", "tags": ["송영길김용", "박지현", "공정", "돈봉투", "레드카드", "가처분"], "script": ["4년 전 청년 박지현은 입당 6개월이 안 됐다는 이유로 후보 신청서류 접수조차 거부당했습니다. 예외조항이 있으니 논의라도 해달라는 요구마저 묵살됐습니다. 그런데 바로 얼마 전 밤 10시 30분, 최고위는 똑같은 사유로 탈락 위기의 686 송영길 후보를 구제하려고 긴급 회의를 열었습니다.", "제가 지적하는 건 송영길이라는 '사람'이 아니라 '과정의 불공정'입니다. 그분이 잘난 사람이든 아니든 잣대는 같아야 합니다. 싫어서 자르고 싶으면 최소한 당헌·당규 절차라도 지켰어야죠. 청년에겐 원칙, 기득권에겐 특혜 — 이게 양두구육, 이율배반이 아니면 무엇입니까.", "아무리 손흥민이라도 결정적인 반칙을 하면 레드카드를 받습니다. 규칙보다 사람이 우선하는 순간 민주주의는 무너집니다. 당헌을 위반한 채 강행하면 저는 가처분을 포함해 대응하겠습니다."], "quotes": [["김보미", "제가 지적한 건 사람이 아니라 '과정의 불공정'입니다. 잘나든 못나든 잣대는 같아야 합니다."], ["김보미", "청년에겐 원칙, 기득권에겐 특혜 — 양두구육이 아니면 무엇입니까."], ["김보미", "아무리 손흥민이라도 결정적 반칙을 하면 레드카드를 받습니다."]], "notes": ["'사람이 아니라 과정' 방어 필수(송영길 신격화 프레임 차단). 손흥민 레드카드·양두구육 확정 워딩. 가처분 언급."]}, {"no": 709, "media": "바삭한인터뷰", "part": "바삭한인터뷰", "label": "바삭", "q": "6. 당대표·최고위원 기탁금 인상도 논란입니다. 예비 2천만 원, 본경선 시 당대표는 8천만 원 추가. 준비하면서 부담되셨을 텐데요?", "tags": ["기탁금", "기탁금감액", "공영제", "투개표비용", "내로남불"], "script": ["솔직히 부담이 컸습니다. 저는 등록 당일, 없는 돈을 다섯 군데서 빌렸습니다. 39세 이하 청년은 50%를 감면받아도 본경선 진출 시 5천만 원을 내야 합니다. 직전 전대보다 3천만 원이 더 든 겁니다.", "무슨 배추값 깎듯 '2천만 원 깎아주자' 할 문제가 아닙니다. 대선·총선·지선은 나라가 선거비용을 대주는데, 왜 당내 경선은 예비후보에게까지 악착같이 자기 돈을 내라고 합니까? 민주당에 돈이 남아도는데도 말이죠. 이것도 내로남불입니다.", "이재명 대통령도 '당 재정이 어려운 것도 아니니 종전 수준으로 되돌리자'고 하셨습니다. 오죽하면 대통령이 나서겠습니까. 답은 찔끔 감액이 아니라 당직선거 공영제입니다. 저는 당대표가 되면 당내 경선 기탁금을 아예 없애겠습니다."], "quotes": [["김보미", "등록 당일, 없는 돈을 다섯 군데서 빌렸습니다."], ["김보미", "무슨 배추값 깎듯 할 문제가 아닙니다. 기탁금은 깎을 게 아니라 없애야 합니다."]], "notes": ["'다섯 군데서 빌렸다'는 확정 서사. 배추값 비유·당직선거 공영제로 마무리."]}, {"no": 710, "media": "바삭한인터뷰", "part": "바삭한인터뷰", "label": "바삭", "q": "7. 당대표라면 청년뿐 아니라 장년·노년층 지지도 받아야 합니다. '이것만큼은 내가 압도적으로 잘한다' 자부하는 능력이 있다면?", "tags": ["강진", "풀뿌리", "리더십", "유일한후보"], "script": ["'바닥 민심'입니다. 저는 강진에서 어르신들의 최애입니다. 의장에 당선되고 가장 먼저 찾아뵌 분이 노인회장님이셨습니다. 강진에선 저를 그냥 '우리 보미'라고 부르십니다.", "강진은 주민 셋 중 한 명 이상이 65세가 넘는 초고령 지역입니다. 저는 새벽엔 농민을, 낮엔 시장 상인을, 밤엔 어르신들의 민원 전화를 받으며 8년을 보냈습니다. 정치를 책상이 아니라 논둑과 경로당에서 배웠습니다.", "젊다고 청년만 대변하는 게 아닙니다. 저는 세대를 잇는 사람입니다. 어르신의 삶을 알고 청년의 절망도 압니다. 지금도 강진 어르신들이 방송 보시고 연락 주시고 응원해 주십니다. 그게 제 가장 큰 자산입니다."], "quotes": [["김보미", "저는 강진 어르신들의 최애입니다. 다들 저를 '우리 보미'라고 부르십니다."], ["김보미", "정치를 책상이 아니라 논둑과 경로당에서 배웠습니다."]], "notes": ["능력=바닥 민심/세대 통합. 초고령 지역 수치는 방송 전 KOSIS로 정확한 % 확인 권장."], "warn": "강진군 고령 비율 정확한 수치(예: 약 37%)는 방송 전 KOSIS·행안부 통계로 최종 확인 후 사용. 확신 없으면 '셋 중 한 명 이상'으로."}, {"no": 711, "media": "바삭한인터뷰", "part": "바삭한인터뷰", "label": "바삭", "q": "8. 여론조사꽃 조사에서 김민석 22.4%, 정청래 20.5%, 송영길 8.2%, 고민정 2.5%, 김보미 0.6%였습니다. 이름을 꼭 선택지에 넣어달라 하셨는데, 결과 받아보고 어땠나요?", "tags": ["여론조사", "김어준", "무당층", "2030", "돌풍"], "script": ["먼저, 제 이름을 선택지에 넣어주신 것만으로 감사합니다. 처음엔 그 이름조차 없었으니까요. 숫자만 보면 0.6%지만, 저는 그 안에서 '돌풍'의 신호를 봅니다.", "전화 응답에선 0.6%였지만 무선 RDD 조사에선 2.9%였습니다. 그리고 결정적인 네 가지가 있습니다. 첫째, 송영길·고민정·김보미가 모두 같은 한 자리 수입니다. 둘째, 민주당 핵심 진보층에선 고민정 후보와 3.9% 동률입니다. 셋째, 18~29세 청년 남성에서 6.5%로 전체 3위입니다. 넷째, 무당층에선 '김보미' 아니면 '없음', 둘 중 하나였습니다.", "이게 무슨 뜻입니까. 기존 민주당이 못 가져오던 20대 남성과 정치 무관심층을 끌어올 '외연 확장 카드'가 누구인지, 데이터가 증명한 겁니다. 저는 흑역사 파묘나 네거티브는 하지 않겠다고 했습니다. 숫자는 작아도 방향은 분명합니다."], "quotes": [["김보미", "0.6%지만 무당층에선 '김보미' 아니면 '없음' 둘 중 하나였습니다. 사라진 표를 데려올 사람은 접니다."], ["김보미", "20대 남성 6.5%, 전체 3위. 외연 확장 카드가 누구인지 데이터가 증명했습니다."]], "notes": ["작은 숫자를 4개 근거로 '돌풍'으로 재해석. 무선 RDD 2.9% 병기. 무당층·20대 남성이 핵심."]}, {"no": 712, "media": "바삭한인터뷰", "part": "바삭한인터뷰", "label": "바삭", "q": "8-1. 17일 '김어준의 뉴스공장'에 출연했습니다. '흠씬 두들겨 맞고 왔다'는 후기를 남겼는데, 아쉬웠던 점은?", "tags": ["김어준", "뉴스공장", "이생망중꺾마", "노무현2%", "꼰대"], "script": ["솔직히 흠씬 두들겨 맞고 왔습니다. '정청래 떨어뜨리러 나온 거 아니냐'는 집요한 질문에 제 진심이 자꾸 왜곡되는 것 같아 저도 모르게 말려들었습니다. 노련하게 대처하지 못한 건 제 부족함입니다.", "다만 '당선이 현실적으로 어렵지 않냐'는 질문엔 이렇게 답했습니다. 월드컵 우승 못 하면 출전하지 말고, 서울대 못 가면 공부하지 말아야 합니까? 중요한 건 꺾이지 않는 마음입니다. 너무 꼰대 마인드로 보시는 것 아니냐고 말씀드렸습니다.", "그리고 비판해 주신 분들 말씀도 겸허히 받겠습니다. 그분들 다수가 민주당을 사랑하는 분들이니까요. 두들겨 맞아도 저는 꺾이지 않습니다."], "quotes": [["김보미", "월드컵 우승 못 하면 출전하지 말고, 서울대 못 가면 공부하지 말아야 합니까?"], ["김보미", "두들겨 맞아도 꺾이지 않습니다. 중요한 건 꺾이지 않는 마음입니다."]], "notes": ["자기반성(말려든 것 인정) + 명언(월드컵/서울대)으로 반등. '꼰대' 1회만, 수용 화법과 균형."], "warn": "'꼰대' 표현은 캠프 지침상 과용 금지. 이 답변에서 1회만 쓰고, 비판 수용 멘트로 마무리."}, {"no": 713, "media": "바삭한인터뷰", "part": "바삭한인터뷰", "label": "바삭", "q": "8-2. 당대표 출마 이후 친명·친청계 양쪽에서 공격받고 있습니다. 심경은?", "tags": ["문자폭탄", "계파", "이생망중꺾마", "내부총질"], "script": ["양쪽에서 문자폭탄이 옵니다. 그런데 저는 이걸 오히려 훈장이라고 생각합니다. 어느 한쪽 계파의 사람이었다면 한쪽에서만 맞았겠죠. 양쪽에서 맞는다는 건 제가 정말 어느 계파에도 속하지 않은 증거니까요.", "'내부 총질'이라고 하십니다. 하지만 곪은 곳을 도려내자는 게 총질입니까? 아프니까 개혁입니다. 저는 미워서가 아니라 민주당을 살리고 싶어서 쓴소리를 합니다.", "무엇보다 페이스북과 제보센터엔 '함께하겠다', '응원한다'는 글이 훨씬 더 많습니다. 화산처럼 터져 나오는 그 목소리가 제 힘입니다. 저는 그분들 보고 갑니다."], "quotes": [["김보미", "양쪽에서 맞는다는 건, 제가 정말 어느 계파에도 속하지 않았다는 증거입니다."], ["김보미", "곪은 곳을 도려내자는 게 총질입니까? 미워서가 아니라 살리고 싶어서 하는 쓴소리입니다."]], "notes": ["양쪽 공격을 '무계파의 증거'로 전환. 응원 여론이 더 많다는 점 강조."]}, {"no": 714, "media": "바삭한인터뷰", "part": "바삭한인터뷰", "label": "바삭", "q": "9. 내일 3인으로 압축됩니다. 당선되면 386·기성 정치인들과 함께해야 하는데, 어떻게 설득하고 당을 이끌 생각인가요?", "tags": ["세대교체", "싱어게인", "통합", "3선배제", "족보정치", "친명친청"], "script": ["세대교체가 386을 다 내쫓자는 게 아닙니다. 저는 민주당을 '싱어게인' 같은 정당으로 만들고 싶습니다. 어른과 청년이 한 무대에서 때로는 겨루고 때로는 연합하며, 실력으로 멋지게 경쟁하는 정당요.", "다만 자발적으로 나갈 사람은 없으니 제도가 필요합니다. 저는 동일 선거구에서 연달아든 건너뛰든 합계 3회 이상은 공천하지 않는 '동일 선거구 3선 금지'를 제도화하겠습니다. 강제로 쫓아내는 게 아니라, 후배에게 길을 열도록 제도로 교체를 담보하는 겁니다.", "그리고 선배님들께 간곡히 부탁드립니다. 그만 싸우십시오. 적통 논쟁·족보 캐기 멈추고 친명·친청 힘을 합쳐야 합니다. 재집권에 실패하면 다시 계엄이고 극우의 천국입니다.", "누구나 수긍하는 룰과 함께 검증하는 시간, 그 공정한 시스템만 갖추면 선배들도 동의하실 겁니다. 저는 싸우러 온 게 아니라 건설하러 왔습니다. 존경받는 이별과 존중받는 등장, 그 다리를 놓겠습니다."], "quotes": [["김보미", "동일 선거구 3회 이상은 공천하지 않겠습니다. 강제가 아니라 제도로 후배에게 길을 여는 겁니다."], ["김보미", "그만 싸우십시오. 재집권에 실패하면 다시 계엄입니다. 친명·친청 힘을 합쳐야 합니다."]], "notes": ["11대 공약(동일선거구 3선 금지) + 아름다운 퇴장 성명(족보 중단·친명친청 통합·재집권 실패=계엄) 반영."]}, {"no": 715, "media": "바삭한인터뷰", "part": "바삭한인터뷰", "label": "바삭", "q": "9-1. 지금 상황에서 김 후보와 가장 잘 통하고, 민주당 문제를 제대로 짚고 2030과 잘 소통할 것 같은 정치인 한 명을 고른다면?", "tags": ["토론회", "이재명", "소통", "완주"], "script": ["솔직히 딱 한 명을 고르기가 어렵습니다. 저는 함께 뛰는 네 분 후보 모두와 통할 수 있다고 생각합니다. 그런데 지금은 경쟁이 워낙 치열해서 서로 마주 앉아 이야기 나눌 시간도, 토론할 기회도 없습니다. 그게 참 아쉽습니다.", "제가 계속 토론회를 요청하는 이유가 그것입니다. 토론이라도 있었으면 서로의 진심을 확인하고 더 잘 소통할 수 있었을 텐데요. 의견이 다르면 목소리가 높아지고 언쟁이 벌어지기도 하지만, 그것도 소통입니다. 풀기만 잘하면 됩니다.", "그래서 저는 전당대회가 끝난 뒤에라도 다섯 후보가 계속 소통했으면 좋겠습니다. 굳이 방향을 말하자면, 청년의 절박함을 가장 잘 아는 분은 역시 이재명 대통령이라고 생각합니다."], "quotes": [["김보미", "네 분 모두와 통할 수 있습니다. 다만 토론할 기회조차 없어 아쉽습니다."], ["김보미", "의견이 다르면 언쟁도 벌어지지만 그것도 소통입니다. 풀기만 잘하면 됩니다."]], "notes": ["특정인 저격 대신 '토론 부재' 강조로 전환(캠프 방침). 마지막에 이재명을 부드럽게 언급."]}, {"no": 716, "media": "바삭한인터뷰", "part": "바삭한인터뷰", "label": "바삭", "q": "10. 김보미 후보의 정치인 롤모델이 있는지 궁금합니다.", "tags": ["김대중", "지방자치", "청년결정권", "호남"], "script": ["김대중 대통령입니다. 이유는 두 가지입니다.", "첫째, 김대중 대통령은 '미스터 지방자치'셨습니다. 지방자치가 곧 풀뿌리 민주주의라는 것을 평생 강조하셨죠. 강진에서 기초의원으로 시작한 저에게 그 정신은 교과서였습니다.", "둘째, 청년을 알아본 위대한 멘토셨습니다. 30여 년 전, 서른두 살의 김민석 의원을 과감히 영입하신 분이 김대중 대통령입니다. 청년의 가능성을 알아보고 정치로 이끌어 지금까지 오래 정치하게 만드셨습니다. 그 시절 민주당은 가장 젊고 역동적이었고 2030 지지율도 가장 높았습니다.", "지방자치와 청년, 제가 걷는 두 길이 모두 김대중 대통령에게서 왔습니다. 저는 그 도전과 포용의 적통을 잇고 싶습니다."], "quotes": [["김보미", "김대중 대통령입니다. '미스터 지방자치'이자, 서른두 살 김민석을 알아본 청년의 멘토셨으니까요."]], "notes": ["롤모델=김대중. 이유 2개(지방자치+청년발굴)를 또렷하게. '적통은 혈통이 아니라 도전 정신' 연결 가능."]}, {"no": 717, "media": "바삭한인터뷰", "part": "바삭한인터뷰", "label": "바삭", "q": "11. 마지막으로, 10년 뒤·20년 뒤 어떤 '정치인 김보미'의 모습일지 말씀해주신다면?", "tags": ["재창당", "세대교체", "청년", "클로징", "계란과바위"], "script": ["저는 제가 당대표가 되든 안 되든, '김보미가 길을 열었다'는 말을 듣는 정치인이 되고 싶습니다. 청년이 민주당에서 도전하는 게 무모한 일이 아니라 자연스러운 일이 되도록 만드는 것, 그게 제 소명입니다.", "10년 뒤, 20년 뒤엔 제가 오늘 했던 이 이야기가 더는 특별하지 않은 날이 왔으면 합니다. 청년이 당연히 결정하고, 공천이 당연히 공정하고, 경선 결과가 당연히 공개되는 그런 민주당 말입니다.", "저는 죽어도, 다음 세대는 살아야 하지 않겠습니까. 이번 생엔 계란으로 바위를 깨보겠습니다. 싸울 줄만 아는 정치가 아니라 건설할 줄 아는 정치, 그 씨앗을 심는 정치인 김보미로 기억되고 싶습니다."], "quotes": [["김보미", "당대표가 되든 안 되든, '김보미가 길을 열었다'는 말을 듣는 정치인이 되고 싶습니다."], ["김보미", "저는 죽어도 다음 세대는 살아야 하지 않겠습니까. 싸우는 정치가 아니라 건설하는 정치를 심겠습니다."]], "notes": ["클로징. '길을 열었다' 서사 + 슬로건(죽어도 다음 세대는·계란으로 바위)으로 감정 마무리."]}, {"no": 501, "part": 8, "q": "어제 합동연설회가 끝났습니다. 현역 중진들과 경쟁 중인데, 현장에서 느낀 분위기는 어땠습니까?", "tags": ["합동연설회", "기탁금", "짧은경선", "동영상촬영회", "토론회부재", "투표시작"], "script": ["솔직히 다리가 떨렸습니다. 30년 넘게 정치를 해 오신 중진 선배님들 사이에 서른여섯 평당원이 섰으니까요. 그런데 연설이 시작되니 오히려 또렷해졌습니다. 선배님들은 과거를 말씀하시고, 저는 미래를 말했습니다.", "다만 후보의 한 사람으로서 아쉬움이 큽니다. 이번 경선은 기탁금은 잔뜩 올려놓고, 정작 후보를 검증할 자리는 없습니다. 토론회 한 번이 없습니다. 당원들 앞에서 대면 연설을 하는 자리도 없이, 달랑 동영상 촬영회 한 번이 전부입니다. 선거운동 기간도 너무 짧고요. 그런데 오늘부터 벌써 투표가 시작됐습니다. 후보가 누구인지, 무엇을 하겠다는지 당원들이 충분히 알기도 전에 표를 달라는 겁니다.", "이런 경선은 이미 이름이 알려진 기득권에게만 유리합니다. 신인과 청년에게는 알릴 기회 자체를 주지 않는 것이죠. 이것부터 바꿔야 합니다. 그래서 제가 어제 연설에서 '민주화운동은 존중받아야 하지만 정치를 40년, 50년 독점할 권리는 없다'고 말씀드렸고, 그 영상이 100만 조회를 넘었습니다. 바뀌어야 한다는 국민의 갈증이 그만큼 크다는 뜻입니다."], "quotes": [["7.20 합동연설회 연설문(최종)", "달랑 동영상 하나 찍고 연설이랍시고, 토론회 한 번·대면 연설 한 번 없는 경선 — 2030 다 떠날 거고 총선 대선 반드시 진다"], ["일정(7.21)", "예비경선 투표 7.21~23 — 검증 자리 없이 투표부터 시작"]], "notes": ["◆ 녹화: 7.21(화) 16:20 사전녹화(16:00 메이크업), KBS광주총국 2층 뉴스스튜디오, 방송 19:00 뉴스7 [정치맥] 약 7분, 담당 박성혜 작가", "분위기 질문이지만 '짧은 경선·토론회 부재·동영상 한 번·오늘 투표 시작' 아쉬움으로 자연 전환", "기탁금 상세는 T5에서 다시 — 여기선 '올려놓고 검증 자리는 없다'까지만"], "warn": null, "media": "KBS광주TV", "label": "T1"}, {"no": 502, "part": 8, "q": "오늘 서울시의회 간담회 정견발표에서 송영길 후보로부터 고함을 들었다는 글을 SNS에 올리셨는데, 상황을 설명해주신다면요?", "tags": ["고함사건", "송영길", "공정", "사과요구"], "script": ["네, 오늘 아침 서울시의회 의장실 접견 자리였습니다. 의장님과 의원님들, 직원분들까지 계신 공개된 자리에서 송영길 후보께서 제 페이스북 글을 두고 고함을 치셨습니다. 다른 분들이 계시니 별도로 통화하자고 정중히 부탁드렸는데도 호통은 계속됐습니다.", "제 글은 송영길 후보 개인을 비난한 것이 아닙니다. 손흥민 선수라도 반칙하면 레드카드를 받듯이, 면접이 시작된 뒤에 자격 요건을 바꾸는 '과정의 불공정'을 지적한 것입니다. 그런데 돌아온 답은 '내가 검찰개혁 하다 이렇게 고생했는데, 나 이런 사람이야'였습니다. 공정을 물었더니 훈장이 돌아온 겁니다.", "섭섭하실 수는 있습니다. 그러나 여러 사람 앞에서 고함치며 윽박지르는 것은 인격무시 행위입니다. 그래서 정견발표에서 공개적으로 사과를 요청드렸지만 끝내 사과는 없었습니다. 이러니까 청년들이 꼰대라고 하는 것입니다. 저도 당대표 후보입니다. 존중해 주시기 바랍니다."], "quotes": [], "notes": ["TV용 — 감정 아닌 팩트 순서: 장소·배석 → 통화 요청 묵살 → 지적의 본질(과정) → 돌아온 말 → 공개 사과 요구·불발", "'뻔뻔함' 등 최고 수위 표현은 TV에서 자제 — '인격무시 행위'까지"], "warn": "송영길 개인 인신 비난 금지. 표정은 담담하게 — 피해 호소가 아니라 기록 톤.", "media": "KBS광주TV", "label": "T2"}, {"no": 503, "part": 8, "q": "전직 기초의원이라는 조건에서 당대표 출마가 쉽지 않은 선택이었을 텐데요. 그럼에도 출마를 결심한 이유가 있을까요?", "tags": ["출마이유", "지역개혁", "호남정치개혁", "시스템개혁", "공약", "재창당"], "script": ["저는 우리 지역을 바꾸고 싶어서 정치를 시작했습니다. 그런데 13년을 해 보니 알겠더군요. 지역을 바꾸려면 먼저 민주당이 바뀌어야 합니다. 공천이 곧 당선인 호남에서, 낡은 공천 시스템을 그대로 두고는 지역도 청년도 살릴 수 없습니다. 호남 정치의 고질적인 문제, 그 뿌리를 바꾸지 않으면 안 된다 — 그래서 나왔습니다.", "저는 계파도 돈도 빽도 없는 평당원입니다. 그런데 바로 그래서 할 수 있습니다. 신세 진 사람, 챙겨줄 사람이 많은 분들은 절대 이 시스템을 못 바꿉니다. 저는 챙겨줄 사람도 없어서, 눈치 보지 않고 거침없이 갈아엎을 수 있습니다.", "그래서 어제 연설에서 구체적인 공약을 걸었습니다. 첫째, 경선 데이터 전면 공개와 당원 명부 검증으로 '진짜 1인 1표'를 만들겠다. 둘째, 경선 룰은 6개월 전에 확정하고 불법·유령 당원을 전수조사하겠다. 셋째, 돈 없는 청년도 나올 수 있게 당직선거 공영제를 실현하고 임명직 최고위원 두 자리를 청년에게 주겠다. 넷째, 청년취업보장제를 당의 핵심 정책으로 삼겠다. 그리고 호남에는 800조 반도체를 비롯한 3대 메가프로젝트를 반드시 성사시키겠다. 손보는 수준이 아니라 재창당 수준으로 바꾸겠다는 것이 제 결심입니다."], "quotes": [["7.20 합동연설회 연설문(최종)", "경선 룰 6개월 전 확정·불법 유령 대리 당원 정리·경선 결과 100% 공개 · 당직선거 공영제 · 청년취업보장제 · 호남 반도체 800조·3대 메가프로젝트"], ["캠프 확정 멘트", "저 김보미는 챙겨줄 사람 한 명도 없습니다 → 거침없이 개혁할 수 있는 유일한 후보"]], "notes": ["'지역 바꾸려다 민주당을 바꿔야 함을 깨달음 → 호남 정치 고질병 → 어제 연설 공약 5가지' 순서", "공약 5개 빠르게 나열(TV 시간): 경선 공개·명부 검증·공영제·청년취업보장·800조", "'재창당'으로 마무리"], "warn": null, "media": "KBS광주TV", "label": "T3"}, {"no": 504, "part": 8, "q": "출마를 선언하면서 경선 데이터 전면 공개, 당원명부 검증을 통한 '진짜 1인 1표' 실현을 공약으로 내걸었어요. 민주당의 당원 구조나 경선 제도에 문제가 있다는 의미로 읽히는데요.", "tags": ["1인1표", "유령당원", "경선데이터", "유리상자"], "script": ["문제가 있는 정도가 아니라, 지금의 1인1표는 가짜 1인1표입니다. 가짜 당원, 유령 당원이 천지인데 명부 정리를 하라고 해도 하지 않습니다. 오염된 명부 위의 투표가 무슨 당원주권입니까.", "제가 겪은 일을 그대로 말씀드리겠습니다. 후보인 저에게 선거인 수도, 투표율도, 득표율도, 득표수도 공개하지 않았습니다. 이름도 없이 숫자 세 개만 보여줍니다. 그게 내 점수인지 남 점수인지, 조작이 있었는지 알 길이 없습니다. 이의를 제기하면 '제명하겠다'는 협박이 돌아옵니다. 전 세계 어느 민주주의 정당이 이렇게 선거를 합니까.", "그래서 공약이 두 가지입니다. 당원 명부 전수 검증으로 진짜 1인1표를 만들고, 경선 룰은 6개월 전에 확정하고 결과는 100퍼센트 공개하는 유리상자 경선. 공개 못 할 이유가 없지 않습니까."], "quotes": [["호남 정견발표/성명(7.18~7.21) 원문", "여러분이 지지한 후보가 몇 표 받았는지 아십니까? 모릅니다. 선거인 수도, 투표율도, 득표율도, 득표수도 공개하지 않습니다. 이름도 없이 숫자 세 개만 보여줍니다. 내 점수인지 남 점수인지, 조작을 했는지 안 했는지 알 길이 없습니다. 이의를 제기하면 '제명하겠다'는 협박이 돌아옵니다."]], "notes": ["강진 15% 감산 상세는 T7(김승남 질문)과 중복되지 않게 여기선 '몇 표인지 모른다'까지만"], "warn": null, "media": "KBS광주TV", "label": "T4"}, {"no": 505, "part": 8, "q": "오늘 민주당이 너무 높다는 지적이 나온 전당대회 기탁금을 2천만원 낮추겠다고 발표했습니다. 기탁금 문제를 비롯해 당내 청년 정치인이 마주한 가장 큰 장벽은 뭐라고 보십니까?", "tags": ["기탁금", "기탁금감액", "청년장벽", "후원회부재", "3인캠프", "공영제"], "script": ["돈이죠, 당연히. 그런데 돈은 시작일 뿐입니다. 오늘 당이 기탁금을 2천만 원 낮췄지만, 그마저도 이재명 대통령 때의 두 배이고, 등록은 이미 끝난 뒤였습니다. 저는 그 돈이 없어서 등록 당일 다섯 군데에서 빌렸습니다.", "더 큰 장벽은 구조입니다. 현역 의원이 아니면 후원회조차 만들 수 없습니다. 돈을 모을 길 자체가 막혀 있는 겁니다. 솔직히 말씀드리면 저희 캠프는 선배님 한 분, 후배 한 분, 저까지 셋이 전부입니다. 사무실도 없이 발로 뛰고 있습니다. 요즘 전화가 너무 많이 와서 한 분 한 분 연락을 다 못 드리는데, 이 자리를 빌려 죄송하다는 말씀을 드립니다.", "그래서 답은 당직선거 공영제입니다. 기탁금 때문에, 후원회가 없어서 꿈을 접는 청년이 없도록, 당이 선거 비용을 책임지는 구조로 바꿔야 합니다. 그리고 청년에게 사진이 아니라 권한을 줘야 합니다. 임명직 최고위원 두 자리를 청년에게, 청년 정책은 청년위원회가 결정하게 하겠습니다."], "quotes": [["후보 메시지(7.21)", "현역 의원이 아니면 후원회도 없다 · 선배 한 분·후배 한 분, 저까지 3인 캠프 · 사무실도 없이 발로 뛴다 · 전화를 다 못 받아 죄송한 마음"], ["7.20 합동연설회 연설문(최종)", "당직선거 공영제를 반드시 실현해, 기탁금 때문에 꿈을 포기하는 청년이 없도록 하겠습니다"]], "notes": ["'돈이죠 당연히'로 솔직하게 시작 → 후원회 부재(현역만 가능) → 3인 캠프·사무실 없음·전화 다 못 받아 죄송(진정성) → 공영제", "3인 캠프 스토리는 동정표가 아니라 '가장 가난하지만 가장 많은 사람이 함께하는 캠프' 톤으로"], "warn": null, "media": "KBS광주TV", "label": "T5"}, {"no": 506, "part": 8, "q": "이런 가운데 최근 이재명 대통령이 SNS를 팔로우했습니다. 어떤 의미로 받아들이고 있습니까?", "tags": ["이재명", "X팔로우", "경청"], "script": ["저도 놀랐고, 감사했습니다. 대통령께서 청년 평당원의 목소리까지 지켜봐 주신다는 뜻이라고 생각합니다. 댓글까지 직접 읽으신다는 분 아닙니까. 그런 경청의 정치를 저도 배우고 싶습니다.", "다만 분명한 것은, 저는 누구의 낙점으로 여기까지 온 사람이 아니라는 점입니다. 당원의 선택, 국민의 선택으로 왔습니다. 팔로우는 감사하게 받고, 표는 당원과 국민께 받겠습니다."], "quotes": [], "notes": ["'낙점설' 인정 금지 — 감사+자립 2단 구조, 20초 컷"], "warn": null, "media": "KBS광주TV", "label": "T6"}, {"no": 507, "part": 8, "q": "강진군의장 시절에도 당시 지역위원장이었던 김승남 전 국회의원과 갈등이 있지 않았습니까. 당시 경험이 지금의 민주당을 비판하는 문제의식과도 연결된다고 봐야 할까요?", "tags": ["김승남", "표적징계", "강진", "구조문제"], "script": ["연결됩니다. 다만 저는 이걸 특정인과의 사적 갈등으로 보지 않습니다. 구조의 문제입니다. 지역에서는 국회의원이 왕입니다. 자기 마음에 들면 키워주고, 말을 듣지 않으면 씨를 말립니다. 선거 때는 동원하고, 공천 때는 줄을 세웁니다. 저는 의장 시절 표적 징계와 불신임, 압수수색, 100건이 넘는 허위 보도까지 겪었습니다.", "그때 많은 분들이 그러셨습니다. '계란으로 바위치기다, 억울해도 그냥 10년 쉬면 기회가 온다.' 그런데 더 많은 분들이 저를 지켜주셨습니다. 하루 1,000명이 불신임 철회 서명을 해 주셨고, 고소·감사·수사는 전부 혐의없음으로 끝났고, 허위 보도 손해배상 소송은 제가 이겼습니다.", "그 시간을 지나며 확신했습니다. 개인이 착해지길 기다릴 게 아니라 구조를 바꿔야 한다고요. 그래서 제 결론은 하나입니다. 공천은 충성도가 아니라 실력과 전문성으로, 당원과 주민이 결정하는 상향식으로 바꿔야 합니다. 그러면 누구도 왕이 될 수 없습니다. 그 문제의식이 지금 제가 민주당 개혁을 외치는 이유입니다."], "quotes": [["후보 메시지(7.21)", "지역에서는 국회의원이 왕입니다. 마음에 들면 키워주고 말을 듣지 않으면 씨를 말립니다. 선거 때는 동원하고, 공천 때는 줄을 세우고 — 공천은 충성도가 아니라 실력과 전문성으로, 당원과 주민이 결정하는 상향식으로"], ["후보 메시지(7.21)", "많은 분들이 '계란으로 바위치기다, 10년 쉬면 기회가 온다'고 했지만, 더 많은 분들이 지켜주셨습니다 — 구조적 문제이고, 민주당 개혁이 필요한 이유"]], "notes": ["김승남 실명은 질문에 나온 경우에만 받고, 답변에서는 '특정인이 아니라 구조'로 즉시 전환", "'전 건 혐의없음·손배 승소·주민 1,000명 서명'은 검증된 사실 — 자신 있게"], "warn": "김승남 개인 비위 단정 금지 — 법적 리스크. '제가 겪은 일'과 '확정된 결과'만, 그리고 '구조의 문제'로 전환.", "media": "KBS광주TV", "label": "T7"}, {"no": 508, "part": 8, "q": "마지막으로, 정치인 김보미의 목표는 무엇인지 들어보겠습니다.", "tags": ["목표", "재창당", "다음김대중", "클로징", "호남엔딩", "본경선진출"], "script": ["제 목표는 당대표 자리 자체가 아닙니다. 청년이 공정하게 경쟁하는 민주당, 국민이 자랑스럽게 '뽑고 싶은' 민주당으로 재창당하는 것입니다. 계파가 아니라 가치를, 기득권이 아니라 변화를, 과거가 아니라 미래를 선택받는 정당으로 바꾸겠습니다.", "그리고 호남의 딸로서 꿈이 하나 있습니다. 김대중 대통령을 낳은 이 땅이 다음 김대중을 길러내는 것입니다. 민주당이 살아야 호남이 살고, 호남이 살아야 대한민국이 살고, 대한민국이 살아야 청년이 삽니다. 저 김보미를 민주당 당대표 본경선에 꼭 진출시켜 주십시오. 686 세 명으로 하는 경선은 민주당의 몰락을 이끌 뿐입니다. 그런 경선으로는 총선도 대선도 절대 이길 수 없습니다. 가장 현명하신 전남·광주의 힘을 보여주십시오. 서울에서 호남을 이용하려는 정치인이 아니라, 호남에 살며 호남과 운명을 같이할 사람을 꼭 본경선에 올려 주십시오.", "저는 약한 계란입니다. 그러나 계란은 생명을 품고 있습니다. 끝까지 바위를 두드려 결국 금을 내겠습니다. 8월 17일까지 완주하겠습니다. 지켜봐 주십시오."], "quotes": [], "notes": ["마지막 답변 — 카메라 정면, 천천히. '재창당·다음 김대중·계란' 3요소 고정"], "warn": null, "media": "KBS광주TV", "label": "T8"}, {"no": 509, "part": 8, "media": "KBS광주TV", "label": "T9", "q": "[정견발표 전문·핵심 워딩] 서울시의회 정견발표(7.21) — 방송에서 바로 인용하는 문장 모음", "tags": ["정견발표전문", "세대교체", "내로남불", "기득권", "족보경쟁", "아름다운퇴장", "공약"], "script": ["【세대교체 요청(존경 먼저)】 저는 김민석·정청래·송영길, 686 선배님들을 존경합니다. 최루탄을 맞고 감옥에 가며 민주주의를 만드셨습니다. 제가 오늘 민주당을 비판할 자유도 선배님들 덕분입니다. 그런데 바로 그렇기 때문에, 정중히 세대교체를 요청드립니다. 밀어내려는 것이 아니라, 다음 총선에서 이겨 재집권하기 위해서입니다.", "【1. 왜 위기인가】 민주당이 더 이상 반성하지 않기 때문입니다. '우리가 국민의 마음을 잘못 읽은 것은 아닐까' — 이 질문이 사라졌습니다. 질문보다 확신이 많고, 경청은 없고 연설만 있습니다. 실력보다 의리, 정책보다 인맥, 원칙보다 예외. 그렇게 내로남불이 탄생했습니다.", "【2. 누가 기득권인가】 지금 대한민국에서 가장 강한 기득권은 민주당 686입니다. 권력이 없을 때는 모두 민주주의자가 되지만, 권력을 오래 가지면 자신도 모르게 기득권이 됩니다. 기득권은 책임지지 않습니다. 선거에서 져도 다시 당대표에 나옵니다. 그러나 청년은 공천 한 번 떨어지면 정치를 접어야 합니다.", "【3. 왜 청년이 떠나는가】 청년 정치를 확대하겠다더니 기탁금만 올렸습니다. '청년이 미래'라는 말은 '지금은 아니다, 기다려라'가 된 지 오래입니다. 미래만 약속하는 정당은 현재를 빼앗는 정당입니다.", "【4. 족보 경쟁】 국민은 원조를 보지 않습니다. 누가 내 삶을 바꾸는지를 봅니다. 정책이 족보를 이기고, 정책이 계파를 이겨야 합니다.", "【5. 왜 지금인가】 민주화 시대의 무기는 용기였지만 AI 시대는 다릅니다. 선배님들의 역사는 기념비가 되어야지, 다음 세대를 막는 성벽이 되어서는 안 됩니다. 지금 바꾸지 못하면 국민은 '당신들은 정권은 바꾸었지만 자신들은 바꾸지 않았다'고 할 것입니다. 세대교체는 총선 필승 전략이고 재집권 전략입니다.", "【6. 이렇게 바꾸겠다】 당직선거 공영제로 기탁금 때문에 꿈을 포기하는 청년이 없게 하겠습니다. 청년위원회에 실제 정책 결정권을 주겠습니다. 공천은 충성도가 아니라 실력과 전문성으로 하겠습니다. 당 최고 의사결정 단위에 지방의원의 몫을 보장하고, 자치입법권·자치재정권을 확대하는 제2의 지방자치 개혁으로 서울시의회에 힘을 보태겠습니다. 같은 지역에서 세 번 이상 국회의원을 하신 분들은 후배들에게 길을 열어 주십시오. 그리고 그만 싸우십시오 — 재집권에 실패하면 다시 계엄입니다.", "【7. 아름다운 퇴장】 이번 선거가 686 잔치로 끝나면 총선은 국민의힘 잔치판이 될 것입니다. 저는 선배님들의 시대를 끝내자는 것이 아니라 다음 세대로 이어가자는 것입니다. 가장 위대한 계승, 가장 아름다운 퇴장을 김보미가 준비해 드리겠습니다. 저는 계파가 없습니다. 챙겨줄 사람이 단 한 명도 없어 거침없이 개혁할 수 있는 유일한 후보입니다.", "【클로징】 청년이 돌아오는 민주당, 공정이 살아 있는 민주당, 계파보다 실력이 존중받는 민주당. 과거를 자랑하는 정당이 아니라 미래를 만드는 정당을, 풀뿌리에서 자란 김보미가 반드시 만들겠습니다. 여러분의 한 표가 기적의 봄을 만듭니다."], "quotes": [["서울시의회 정견발표 전문(7.21)", "7개 장(위기·기득권·청년·족보·세대교체·공약·퇴장) + 세대교체 요청 서두 — 본 카드는 방송용 발췌"]], "notes": ["이 카드는 어느 문항에서도 문장 단위로 꺼내 쓰는 '원문 창고'", "세대교체 답변은 반드시 '존경 먼저 → 요청'", "신규 공약 눈여겨볼 것: 제2의 지방자치 개혁(자치입법권·자치재정권 확대), 같은 지역 3선 이상 용퇴 요청"], "warn": null}, {"no": 401, "part": 7, "q": "어제 민주당 첫 합동연설회에서 세대교체론을 전면에 내세우며 청년 정치의 필요성을 강조하셨는데요. 36살의 나이로 당대표에 출마하신 배경부터 간단히 말씀해주실까요?", "tags": ["출마배경", "세대교체", "재창당", "평당원"], "script": ["네, 안녕하세요. 만 서른여섯, 계파도 돈도 빽도 없는 평당원 김보미입니다. 저는 강진에서 정치를 시작해 13년, 지방의원 8년, 전국 최연소 기초의회 의장을 지냈습니다.", "제가 나온 이유는 하나입니다. 686 기득권 정당이 된 민주당을, 청년도 공정하게 경쟁할 수 있는 정당으로 바꾸려고 나왔습니다. 지금 민주당에는 공정도, 세대교체도, 청년도 보이지 않습니다. 경선 규칙은 경기 중에 바뀌고, 청년최고위원제는 부결되고, 기탁금은 올라갔습니다. 이 정도면 손보는 수준으로는 안 됩니다. 재창당 수준으로 다시 태어나야 합니다.", "민주화운동은 존중받아야 합니다. 그러나 대한민국 정치를 40년, 50년 독점할 권리는 누구에게도 없습니다. 이제 다음 세대에게 넘겨줄 때가 됐습니다. 그 일을 저 김보미가 시작하겠습니다."], "quotes": [], "notes": ["첫 답변은 30~40초 안에 — 재창당 키워드 1회 포함"], "warn": null, "media": "광주KBS", "label": "G1"}, {"no": 402, "part": 7, "q": "36살, 젊은 나이잖아요. 전남광주를 찾아서 당원과 시민들 만나보셨어요? 어떤 말씀을 많이 하고, 들으셨나요?", "tags": ["호남", "광주", "현장", "독립선언"], "script": ["네, 저는 전남 강진에서 나고 자라 13년을 전남에서 정치했습니다. 앞으로 전남·광주와, 호남과 운명을 함께할 호남의 후보입니다. 그래서 저에게는 매일이 현장입니다.", "들은 말씀은 아프게도 비슷했습니다. '호남에는 선거가 없고 공천만 있다.' '우리 애들은 다 나가서 안 돌아온다.' 청년이 떠나고, 일자리가 사라지고, 면소재지에는 밥 먹을 식당 하나 남지 않았습니다. 호남이 전국에서 가장 낙후된 지역이 된 것, 저는 호남을 표밭으로만 이용해 온 정치 탓이라고 봅니다.", "제가 드린 말씀은 하나였습니다. 호남이 각성하지 않으면 민주당은 절대 바뀌지 않습니다. 권력에 줄 서지 않고 오직 군민의 도움으로 성장한 저 김보미가, 낡은 공천을 완전히 갈아엎고 호남 정치를 혁신하겠습니다. 그래야 백제 이후 절호의 기회인 800조 반도체 투자도 제대로 성사시킬 수 있습니다."], "quotes": [["호남 정견발표/성명(7.18~7.21) 원문", "지역민은 외면하고 권력에 줄 대는 정치, 실력은 쌓지 않고 눈치만 보는 정치 — 그런 정치가 호남 정치였습니다. 이제 이 김보미가 완전히 갈아엎겠습니다"], ["호남 정견발표/성명(7.18~7.21) 원문", "호남을 표밭으로만 이용하는, 가장 대표적인 갈라치기 정치입니다. 청년이 떠나고, 마을이 없어지고, 면소재지에 밥 먹을 식당이 모두 사라진 것 아닙니까"]], "notes": ["7.18 광주 기자회견('호남 정치 독립선언') 기반 — 구체 일화 추가는 후보 재량"], "warn": null, "media": "광주KBS", "label": "G2"}, {"no": 403, "part": 7, "q": "예비경선을 앞두고 '공천이 곧 당선인 곳에서 권력과 계파에 줄 대고, 청년이 낄 자리는 없는 게 호남 정치'라고 비판하셨어요.", "tags": ["호남정치", "강진공천", "불공정경선", "줄서기"], "script": ["제가 몸으로 겪은 일이라 거리낌 없이 말씀드릴 수 있습니다. 호남의 지방선거 공천, 공정했습니까. 여러분이 던진 한 표는 던진 그대로 계산됐습니까. 여러분이 지지한 후보가 몇 표 받았는지 아십니까? 모릅니다. 선거인 수도, 투표율도, 득표율도, 득표수도 공개하지 않습니다. 이름도 없이 숫자 세 개만 보여줍니다. 내 점수인지 남 점수인지, 조작을 했는지 안 했는지 알 길이 없습니다. 이의를 제기하면 '제명하겠다'는 협박이 돌아옵니다.", "지난 강진군수 경선에서 저는 우리 당의 민낯을 봤습니다. 당헌·당규에도 없는 새 지침을 만들어 기어이 15퍼센트를 감산했습니다. 반대로 전과 5범 후보에게는 감산할 조항을 억지로 만들어 하나도 감산하지 않았습니다. 결과는 무소속에게 참패였습니다. 공천이 곧 당선인 곳에서 국회의원이 왕이 되니, 청년은 키울 생각이 없고 죽일 생각만 있는 겁니다.", "그래서 처방은 분명합니다. 경선 룰은 6개월 전에 확정해 못 바꾸게 하고, 결과는 100퍼센트 공개하고, 공천은 당원과 주민이 결정하는 상향식으로 바꾸겠습니다. 호남의 공천부터 대한민국에서 가장 깨끗하고 혁신적으로 만들겠습니다."], "quotes": [["호남 정견발표/성명(7.18~7.21) 원문", "선거인수도, 투표율도, 득표율도, 득표수도 하나도 공개하지 않습니다. 이름도 밝히지 않고 숫자 3개만 보여줍니다 … 이의를 제기하면 '제명하겠다'는 협박이 들어옵니다"], ["호남 정견발표/성명(7.18~7.21) 원문", "당헌·당규에도 없는 새 지침으로 15% 감산. 전과 5범 후보에게는 감산 조항을 억지로 만들어 감산하지 않았습니다. 청년을 키울 생각이 없습니다. 죽일 생각만 있습니다"]], "notes": ["강진 사례 수치는 사실관계 자료 기준 — 생방송에서 상대 후보 실명 거론 금지"], "warn": "상대 후보·특정 의원 실명 금지. 강진 사례는 '제가 겪은 일'로만.", "media": "광주KBS", "label": "G3"}, {"no": 404, "part": 7, "q": "민주당이 전당대회를 앞두고 후보들이 내는 기탁금을 큰 폭으로 올리기로 했는데, 이 문제는 어떻게 생각하세요?", "tags": ["기탁금", "기탁금감액", "공영제", "투개표비용"], "script": ["네, 그 소식엔 오늘 낮에 후속편이 나왔습니다. 비판이 쏟아지고 대통령까지 나서시니까, 오늘 당 선관위가 당대표 기탁금을 1억에서 8천만 원으로, 최고위원은 5천에서 3천만 원으로 내렸습니다.", "안 내리는 것보다는 낫습니다. 그런데 세 가지가 문제입니다. 첫째, 원상복귀가 아닙니다. 이재명 대통령이 당대표였던 재작년의 딱 두 배입니다. 둘째, 순서가 틀렸습니다. 등록은 이미 끝났습니다. 저는 그 돈이 없어서 등록 당일 다섯 군데에서 빌렸습니다. 문턱에 걸려 출마를 포기한 청년은 누가 책임집니까. 셋째, 당에서는 '투개표 비용은 후보가 부담하는 게 맞다'고 하는데요, 저는 반대입니다. 투개표는 정당 민주주의의 기본 비용입니다. 그걸 후보 지갑에 떠넘기면 돈 있는 사람만 출마하는 정당이 됩니다.", "답은 당직선거 공영제입니다. 이재명 대통령이 당대표 시절 하려던 것을 제가 완성하겠습니다."], "quotes": [], "notes": ["질문 전제(인상)가 구정보 — 오늘 감액 결정을 자연스럽게 업데이트하며 시작"], "warn": null, "media": "광주KBS", "label": "G4"}, {"no": 405, "part": 7, "q": "이 발언 이후에 이재명 대통령이 하루 만에 SNS 팔로우를 했더라구요. 화제가 됐는데, 어떠셨어요?", "tags": ["이재명", "X팔로우", "경청"], "script": ["솔직히 저도 놀랐습니다. 대통령께서 청년 평당원의 목소리까지 지켜봐 주신다는 것, 감사한 일이지요.", "저는 그걸 '경청'이라고 생각합니다. 댓글까지 다 읽으시고 거기서 아이디어를 얻으신다는 대통령 아닙니까. 국민의 목소리를 직접 보고 들어주는 대통령이 계시다는 건 정말 든든한 일입니다. 저도 그런 경청의 정치를 하고 싶습니다.", "다만 분명히 말씀드리면, 저는 누구의 낙점으로 여기까지 온 사람이 아닙니다. 당원의 선택, 국민의 선택으로 왔습니다. 대통령의 팔로우는 감사하되, 제 표는 당원과 국민께 받겠습니다."], "quotes": [], "notes": ["'낙점설' 프레임 인정 금지(공통 금지선) — 감사+자립 2단 구조"], "warn": null, "media": "광주KBS", "label": "G5"}, {"no": 406, "part": 7, "q": "민주당 대표 경선을 3파전이라고 하지 않습니까? 김 후보님의 도전이 '계란으로 바위치기다' 이런 얘기가 나오는데 어떻게 생각하시나요?", "tags": ["계란과바위", "3파전", "노무현2%", "완주"], "script": ["맞습니다. 저는 계란입니다. 그런데요, 민주당의 역사가 처음부터 끝까지 계란으로 바위를 친 역사입니다. 김대중 대통령은 목숨을 위협받으면서도 도전하셨고, 노무현 대통령은 경선 초기 지지율 2%로 시작하셨습니다. 제 첫 여론조사도 2%였습니다. 저는 이 숫자가 부끄럽지 않습니다. 2%는 절망의 숫자가 아니라 희망이 출발하는 숫자입니다.", "월드컵 우승 못 하면 출전하지 말아야 합니까? 서울대 못 가면 공부도 하지 말아야 합니까? 질 것이 뻔하다던 도전들이 이 나라 민주주의를 만들었고 지역주의에 금을 냈습니다.", "약한 계란이 강한 바위를 두드려 결국 금을 냅니다. 저는 8월 17일 대전까지 완주합니다. 3파전이라고들 하시는데, 청년 한 명 끼워서 4파전 만들어 주십시오. 그건 당원 여러분이 하실 수 있습니다. 오늘부터 투표입니다."], "quotes": [], "notes": ["끝에 투표 독려로 연결 — 방송 흐름상 자연스러운 지점"], "warn": null, "media": "광주KBS", "label": "G6"}, {"no": 407, "part": 7, "q": "보완수사권 폐지 관련해서 민주당 내에서도 신중론이 나오는데, 보완수사권에 대해서는 어떤 의견을 갖고 계신가요?", "tags": ["검찰개혁", "보완수사권", "피해자보호"], "script": ["검찰개혁의 방향에는 전적으로 동의합니다. 그런데 솔직하게 여쭙고 싶습니다. 언제 적 검찰개혁입니까. 노무현 대통령 때 시작해서 24년째 완성을 못 했습니다. 혹시 완성하는 것보다 외치는 것이 공천에 유리했던 것은 아닙니까.", "제 원칙은 두 가지입니다. 하나, 검찰과 경찰이 서로 견제하게 만들어야 합니다. 정치검찰도 안 되지만 경찰의 독주도 안 됩니다. 둘, 개혁의 속도전 속에 범죄 피해자 보호에 공백이 생겨서는 안 됩니다. 여성단체들이 우려하는 지점이 바로 그것이고, 저는 그 우려가 정당하다고 봅니다.", "한 가지 덧붙이면, 대통령께서도 보완수사권이 없으면 여러 문제가 생길 수 있다고 생각하시는 것 같습니다. 그렇다면 대통령께서도 입장을 조금 더 명확히 밝히시고, 공론화를 통해 국민과 함께 결론을 내는 것이 좋지 않을까 합니다. 칼은 뺏어도 좋습니다. 그러나 국민을 지키는 선까지 자를 일은 아닙니다. 개혁은 속도가 아니라 신뢰로 완성됩니다."], "quotes": [["박동완 통화 원워딩(7.21 14:39)", "대통령이 보완수사권이 없으면 여러 가지 문제가 생긴다고 생각하고 계시는 것 같은데, 그런 입장을 조금 더 명확히 하고 공론화를 하는 게 좋지 않을까 한다 — 이 정도는 추가하되 나머지는 지난번대로"], ["캠프 확정 멘트", "칼은 뺏어도 좋습니다. 그러나 국민을 지키는 선까지 자를 일은 아닙니다"]], "notes": ["기존 기조 유지 + 7.21 14:39 통화 추가 지시: '대통령 입장 명확화·공론화' 워딩 삽입", "특정 후보(김민석 등) 거명 비교는 하지 않음(통화에서 보류)"], "warn": null, "media": "광주KBS", "label": "G7"}, {"no": 408, "part": 7, "q": "최근 전남국립의대가 원점으로 돌아갈 위기에 놓였는데, 강진에서 정치를 하셨던 만큼 의료인프라가 취약하다는 것을 많이 느끼셨을 듯한데요.", "tags": ["전남국립의대", "의료공백", "지방소멸", "강진"], "script": ["이건 제가 통계가 아니라 생활로 아는 문제입니다. 강진에서는 한밤에 아이가 아프면 광주까지 달려야 합니다. 어르신들은 투석 한 번 받으러 왕복 서너 시간을 다니십니다. 전남은 전국에서 유일하게 의과대학이 없는 지역입니다. 도민들이 수십 년을 기다려 온 약속인데, 이것이 원점으로 돌아가서는 안 됩니다.", "다만 지금 논란의 핵심에 대해서는 원칙을 말씀드리겠습니다. 대학과 병원을 분리한다는 것은 말이 안 됩니다. 의대와 부속병원은 한 몸입니다. 같은 곳에서 가르치고, 수련하고, 진료해야 지역에 정착하는 의사가 나옵니다. 이 원칙이 흔들리면 의대는 껍데기만 남습니다.", "어디에 두느냐 하는 입지 문제는, 시장께서 지역 주민들과 충분히 협의하면서 풀어나가시는 것이 맞다고 봅니다. 특정 지역 편을 드는 것은 갈등만 키웁니다. 분명한 것은 하나입니다. 병원이 문을 닫으면 마을이 문을 닫습니다. 전남국립의대는 흔들림 없이, 그리고 온전한 모습으로 추진돼야 하고, 여당이 당론으로 힘을 실어야 합니다."], "quotes": [["박동완 통화 원워딩(7.21 14:39)", "대학하고 병원을 분리한다는 게 일단 말이 안 된다, 같은 한 곳에 있어야 되는 것 아니냐 — 이 정도 원칙을 정하고. 어디로 가느냐는 시장이 지역 주민들과 협의해 가면서 잘 풀어나갔으면 좋겠다. 한쪽 편을 들면 안 된다"]], "notes": ["7.21 14:39 통화 지시: 한쪽 편들기 금지 — ①대학·병원 분리 반대 원칙 ②입지는 시장이 주민 협의로, 두 가지만", "통화에서 '민영배 시장' 언급(음성인식 표기) — 생방송에서는 실명 대신 '시장께서'로 안전하게", "순천이냐 목포냐 유도 질문에 절대 안 올라탐"], "warn": "입지(순천·목포 등) 관련 한쪽 편드는 발언 절대 금지. 정부·부처 비난 톤 금지.", "media": "광주KBS", "label": "G8"}, {"no": 409, "part": 7, "q": "오늘부터 8·17 전당대회의 첫 관문인 예비경선(컷오프)이 진행되는데요. 1차 컷오프로 3명의 당대표 후보가 정해집니다. 컷오프에 대해서도 비판하셨어요.", "tags": ["컷오프", "예비경선", "투표독려", "선호투표"], "script": ["네, 오늘부터 23일까지 투표입니다. 먼저 권리당원 여러분께 부탁드립니다. 누구를 찍으시든 꼭 참여해 주십시오. 참여가 많아질수록 계파와 조직의 힘은 작아지고 당원의 뜻이 커집니다.", "컷오프 자체에 대해선 분명히 비판합니다. 다섯 명밖에 출마하지 않았는데 왜 자릅니까. 당헌에도 컷오프를 '할 수 있다'고 돼 있지, 꼭 3명으로 잘라야 한다고 돼 있지 않습니다. 게다가 이번엔 선호투표제까지 도입했잖아요. 표가 갈릴 걱정이 없는데 왜 자릅니까. 결국 청년에게는 마이크를 쥐여주지 않겠다는 것 아닙니까.", "방식도 문제입니다. 달랑 동영상 연설 하나, 당원들 앞 대면 연설 한 번 없이, 토론 한 번 없이 자릅니다. 이런 경선으로는 청년이 설 자리가 없습니다. 686끼리 하는 경선, 무슨 감동이 있겠습니까. 청년 한 명은 본선 무대에 세워야 하지 않겠습니까. 당원 여러분의 한 표를 믿습니다."], "quotes": [], "notes": ["오늘=투표 시작일(21~23) — '오늘 3명이 정해진다'는 전제가 오면 '발표는 23일'로 자연 정정"], "warn": null, "media": "광주KBS", "label": "G9"}, {"no": 410, "part": 7, "q": "끝으로 김보미 후보에게 호남이란 어떤 의미인가요?", "tags": ["호남", "강진", "김대중", "반도체800조"], "script": ["호남은 민주주의의 뿌리이고, 저에게는 제 삶이고 제 정치의 시작입니다. 저는 강진에서 나고 자라 13년을 전남에서 정치했습니다. 앞으로도 전남·광주, 호남과 운명을 함께하겠습니다.", "그런데 이상하게 됐습니다. 그 뿌리를 흔들어 놓은 것이 다름 아닌 민주당입니다. 호남을 표밭으로만 이용하는 갈라치기 정치, 지역민은 외면하고 권력에 줄 대는 정치 — 그런 정치를 지지해 온 결과가 지금의 낙후된 호남입니다.", "저는 이제 호남이 '주기만 하는 땅'이 아니라 '주인이 되는 땅'이 되기를 바랍니다. 호남의 공천이 가장 깨끗하고 혁신적이어야 하고, 호남이 세대교체에 가장 앞장서야 합니다. 김대중 대통령을 낳은 땅이 다음 김대중을 길러내야 하지 않겠습니까. 800조 반도체와 함께 호남을 대한민국의 두 번째 수도권으로, 그 일을 호남의 딸 김보미가 하겠습니다."], "quotes": [["박동완 통화 원워딩(7.21 14:39)", "호남은 민주주의의 뿌리죠. 그 뿌리를 흔들어 놓은 당이 민주당이죠. 호남의 공천이 가장 깨끗하고 가장 혁신적이어야 되는 거죠. 호남이 세대교체에도 앞장서야 되는 거고 … 호남은 내 삶이고 내 정치의 시작이고 대한민국 정치의 시작"]], "notes": ["7.21 14:39 통화 지시 반영: 뿌리 → 뿌리를 흔든 민주당 → 호남 공천이 가장 깨끗·혁신적이어야, 호남이 세대교체 선봉 — 논리 순서 고정"], "warn": null, "media": "광주KBS", "label": "G10"}, {"no": 411, "part": 7, "q": "정견발표에서 '민주화운동은 존중받아야 하지만 대한민국 정치를 40~50년 독점할 권리는 없다'며 86세대를 비판하고 세대교체를 주장해 주목받았습니다. 관련 영상은 조회수 100만회를 넘겼는데요. 끝으로 청취자들에게 하고 싶은 말씀 있다면?", "tags": ["클로징", "100만조회", "세대교체", "투표독려", "2%", "호남엔딩", "본경선진출", "전남광주"], "script": ["100만이라는 조회수는 김보미가 잘나서가 아닙니다. 그만큼 바뀌어야 한다는 국민의 갈증이 크다는 뜻입니다. 저는 그 갈증을 무겁게 받았습니다.", "민주화운동은 존중받아야 합니다. 그러나 어떤 세대도 대한민국 정치를 40년, 50년 독점할 권리는 없습니다. 산업화 세대가 민주화 세대에게 권력을 넘겼듯, 이제 민주화 세대가 AI 세대에게 넘겨줄 때입니다.", "민주당이 살아야 호남이 살고, 호남이 살아야 대한민국이 살고, 대한민국이 살아야 청년이 삽니다. 저 김보미를 민주당 당대표 본경선에 꼭 진출시켜 주십시오. 686 세 명으로 하는 경선은 민주당의 몰락을 이끌 뿐입니다. 그런 경선으로는 총선도 대선도 절대 이길 수 없습니다. 가장 현명하신 전남·광주의 힘을 보여주십시오. 서울에서 호남을 이용하려는 정치인이 아니라, 호남에 살며 호남과 운명을 같이할 사람을 꼭 본경선에 올려 주십시오.", "청취자 여러분, 오늘부터 23일까지 예비경선 투표입니다. 여러분의 한 표가 민주당을 바꾸고, 대통령을 살리고, 대한민국의 미래를 바꿉니다. 저는 약한 계란이지만, 계란은 생명을 품고 있습니다. 끝까지 바위를 두드려 결국 금을 내겠습니다. 쫄지 않고, 끝까지 가겠습니다. 감사합니다."], "quotes": [["후보 엔딩 멘트(7.21)", "민주당이 살아야 호남이 살고, 호남이 살아야 대한민국이 살고, 대한민국이 살아야 청년이 삽니다. 저 김보미를 민주당 당대표 본경선에 꼭 진출시켜 주십시오. 686 세 명으로 하는 경선은 민주당의 몰락을 이끌 뿐입니다. 그런 경선으로는 총선도 대선도 절대 이길 수 없습니다. 가장 현명하신 전남·광주의 힘을 보여주십시오. 서울에서 호남을 이용하려는 정치인이 아니라, 호남에 살며 호남과 운명을 같이할 사람을 꼭 본경선에 올려 주십시오."]], "notes": ["광주 지역방송 클로징 — '전남·광주의 힘' 직접 호소가 가장 강한 지점", "순서: 갈증 → 세대교체 → 호남 3연(살아야) → 투표 독려 → 계란 → 감사", "'서울에서 호남을 이용하려는 정치인 vs 호남에 사는 사람' 대비가 핵심 한 방"], "warn": null, "media": "광주KBS", "label": "G11"}, {"no": 412, "part": 7, "media": "광주KBS", "label": "G12", "q": "[공격·수비 워딩 카드] 새 성명 '물러나야 민주당이 산다'(7.21) — 생방송에서 바로 쓰는 핵심 문장 모음", "tags": ["워딩카드", "성명", "족보정치", "약자코스프레", "3선배제", "공천혁신", "박수칠때떠나라"], "script": ["【위기 진단】 민주당의 민주주의가 왜 위기입니까. '너희는 틀렸고 우리만 옳다'는 독선과 아집 때문입니다. 동지의 잘못은 감싸고 반대파의 사소한 잘못엔 시퍼런 칼날을 들이대는 내로남불이 686의 문화가 됐습니다. 그 세월을 지나 지금, 정의는 없고 계파만 남았습니다.", "【기득권 규정】 김민석·정청래·송영길 세 선배님이야말로 대한민국의 가장 센 기득권, 민주당 686입니다. 청년들이 몽땅 민주당을 떠나도 아무도 책임을 묻지 않고, 선거에 지고도 다시 당대표 선거에 나옵니다. 청년은 한 번 탈락하면 다시 기회를 얻기 어려운데, 686은 돌아가며 사이좋게 '형님 먼저, 아우 먼저'를 하고 있습니다.", "【약자 코스프레 반박(정청래 '집단폭행' 발언 대응)】 30년째 기득권을 누리고 당대표까지 지낸 분이 약자라니요. 진짜 약자는 눈물 한 방울 흘릴 공간도 없고, 억울한 사연을 호소할 토론회 한 번 없고, 기탁금이 없어 빚을 내는 사람입니다. 그런 발연기, 정말 어이가 없습니다.", "【족보 정치】 원조라는 글자가 안 들어간 가게가 없는 신당동 떡볶이골목이 생각납니다. 내가 김대중과 친했다, 니가 노무현을 배신하지 않았냐, 내가 이재명을 지켰다 — 언제까지 족보 정치를 할 겁니까. 청년들은 686 삼인방의 족보에 아무 관심이 없습니다. 실용이 뭡니까. 필요한 능력이 있으면 족보를 안 따지고 쓰는 것 아닙니까.", "【정책 경쟁 촉구】 청년이 돌아올 정책, 사망 직전인 공정을 회생시킬 대책, 가짜·불법 당원 정리 대책, 3대 메가프로젝트 성공 전략 — 이런 걸 가지고 피 튀기게 싸우십시오. AI 경쟁, 반도체 패권, RE100, 지방소멸, 기후위기로 박 터지게 싸우면 국민과 당원이 행복해집니다.", "【통합·재집권】 친명·친청이 합치는 건 기본이고, 모든 민주진보세력에 합리적 보수까지 끌어와야 다음 대선에서 이깁니다. 재집권에 실패하면 다시 계엄입니다. 오늘, 지금, 당장, 족보 타령과 비방을 중단하십시오.", "【공천 혁신(신규 공약)】 저는 다음 총선 공천을 686 세대교체의 원년으로 삼겠습니다. 같은 지역에서 합계 세 번 이상 국회의원을 한 분은 공천하지 않겠습니다. 현장 경험과 전문성을 갖춘 청년 인재, 686 등쌀에 기 한 번 못 펴본 각 분야 실력자들을 대거 공천하겠습니다. 2028년 총선, 686 운동권의 명예로운 퇴장을 준비해 드리겠습니다.", "【클로징】 산업화 세대가 민주화 세대에게 권력을 넘겼듯, 이제 민주화 세대가 AI 세대에게 권력을 넘겨야 합니다. 운동권 경력은 장기집권 면허증이 아닙니다. 박수 칠 때 떠나라 — 지금이 딱 그때입니다."], "quotes": [["새 성명 전문(7.21)", "'왜 민주당은 위기인가'부터 '물러나야 민주당이 산다'까지 8개 장 — 본 카드는 생방송용 발췌"]], "notes": ["'3선 이상 공천 배제'는 신규 공약 — 방송에서 처음 공개 시 뉴스포인트, 단 '검토'가 아니라 '하겠다'로 단정하려면 캠프 확정 여부 확인", "'발연기' '댕댕이가 웃는다' 등 최고 수위 표현은 라디오에서는 한 번만, 웃음기 없이", "송영길 등록 준비 질책('뭐 하다가 면접장에 나타나')은 고함 사건 질문이 나올 때만"], "warn": "수위 최상급 카드 — 생방송에서는 질문이 해당 주제를 정확히 건드릴 때만 꺼낼 것. 선제 공격용으로 쓰지 말 것."}, {"no": 1, "part": 2, "q": "지난 12일 정견 발표, 86 핵심 인사들 앞에서 사실상 '용퇴'를 직격했다. 현장 분위기와 심정은.", "tags": ["정견발표", "86용퇴", "세대교체"], "script": ["솔직히 다리가 떨렸습니다. 서툴렀고요. 그런데 서투르다고 안 하면, 그 말은 영원히 아무도 못 합니다. 실수하더라도 하는 게 안 하는 것보다 낫고, 이건 해야만 하는 말이었습니다.", "선배들 면전에서 못 할 말이면 뒤에서도 하면 안 된다고 생각했습니다. 개인이 아니라 40년 된 시스템을 향한 질문이었어요. 그날 현장의 침묵이, 오히려 그 질문이 유효하다는 증거였다고 생각합니다."], "quotes": [["정견발표문(7.12)", "민주화운동은 존중하지만, 40~50년 정치를 독점할 권리는 없습니다"], ["공개질의 답변서(7.13)", "약한 계란이 강한 바위를 두드려, 결국 금을 냅니다"]], "notes": ["정견발표 이후 폭발적 관심 — 통화 지시: '정견발표 이후 폭발적인 관심을 보인 것을 보라' [자료 13]", "7.12 합동 정견발표문, 김보미.com 게시 [자료 7·9]"], "warn": null, "media": "조선일보", "label": "Q1"}, {"no": 2, "part": 2, "q": "86세대 정치인들이 당의 쇄신을 가로막는 가장 치명적인 문제는 구체적으로 무엇인가.", "tags": ["86용퇴", "공정", "공천", "컷오프", "청년"], "script": ["한마디로 공정의 문제입니다. 지금도 안 껴 줍니다. 예비경선에서 두 명을 자르겠다는 것부터가 그렇습니다. 청년이 들어오면 컷오프라는 문을 만들어서 잘라냅니다.", "공천도 마찬가지입니다. 공정하게 심사하는 것처럼 꾸며 놨지만, 그 심사 자리에 앉은 사람들이 다 국회의원이 추천한 가까운 인사들입니다. 그렇게 정치 신인들, 청년들의 진입을 구조적으로 가로막고 있는 것 — 그게 가장 치명적인 문제입니다.", "그래서 저는 '퇴출'을 말하는 게 아닙니다. 3선이 넘은 지역구가 열려야 새 인재가 들어올 자리가 생깁니다. 퇴출이 아니라 영입입니다."], "quotes": [["박동완 통화 원워딩(7.19)", "공정 얘기하세요. 안 껴 주는 거, 지금도 안 껴 주잖아요. 두 명 자르잖아요. 공천 심사 자리에 배치된 사람들 다 국회의원 똘마니들이잖아요. 정치 신인들, 청년들의 진입을 가로막고 있다"], ["출마선언문", "계파도, 돈도, 빽도 없는 평당원"]], "notes": ["통화 원워딩은 위 인용 그대로 — 발언 시 '국회의원이 추천한 가까운 인사'로 순화(후보 결정) [자료 13]", "'퇴출이 아니라 영입' 프레임: 전대자료집 [자료 10]"], "warn": "'표현이 과하다'는 반발이 오면 Q3 논리로 받을 것.", "media": "조선일보", "label": "Q2"}, {"no": 3, "part": 2, "q": "“화염병과 짱돌을 들던 세대”라는 표현이 지나치게 공격적이라는 당내 지적이 있다.", "tags": ["화염병짱돌", "표현수위", "86용퇴"], "script": ["솔직하게 말씀드리겠습니다. 그렇게 말하지 않으면 들어주지 않습니다. 지난 몇 년간 청년들이 점잖게 말할 때 누가 들어줬습니까.", "그리고 그건 그 세대가 가장 잘 아는, 그 세대의 언어입니다. 그분들이 청년일 때 기성 질서에 던졌던 질문을, 지금의 청년이 똑같이 던지고 있을 뿐입니다. 민주화운동에 대한 존중은 당연히 전제입니다."], "quotes": [["박동완 통화 원워딩(7.19)", "그렇게 얘기 안 하면 들어주지를 않아요"], ["정견발표문(7.12)", "민주화운동은 존중하지만, 40~50년 정치를 독점할 권리는 없습니다"]], "notes": ["통화 지시: 표현 수위의 이유를 정면으로 설명하는 기조 [자료 13]"], "warn": null, "media": "조선일보", "label": "Q3"}, {"no": 4, "part": 2, "q": "친청·친명 양쪽에서 공격받고, 송영길·김용 출마 예외 허용을 비판하자 문자폭탄까지 온다는데.", "tags": ["문자폭탄", "정청래", "김민석", "송영길김용", "책임정치"], "script": ["예상했습니다. 어떤 분들은 제가 김민석 후보를 위해서 정청래 후보를 공격하는 역할을 해 주길 바라셨던 것 같습니다. 그런데 저는 그거 하려고 출마한 게 아닙니다.", "제 얘기는 처음부터 하나였습니다. 586이 40년 해 먹었으면 이제 그만하고 후배들한테 길을 열어 줘야 한다는 것. 그리고 정청래 전 대표를 강하게 비판한 건, 바로 직전 당대표였기 때문입니다. 직전 대표가 모든 책임을 지는 것, 그게 민주 정치 아닙니까. 민주 정치는 책임 정치입니다.", "문자폭탄이요, 아주 반갑게 받고 있습니다. 386 중 누구 한 명을 지지하러 나온 후보가 아니라, 어떤 폭탄이 터지더라도 청년의 목소리를 가감 없이 대변하러 나온 후보라고 인정받는 것 같아서, 오히려 기분이 좋습니다."], "quotes": [["박동완 통화 원워딩(7.19)", "예상했다. 그 사람들은 제가 김민석을 위해서 정청래 까는 역할을 해 주길 바랐던 거잖아요. 그거 하려고 출마한 거 아니에요. 586이 40년 해 먹었으니까 그만하고 후배들한테 길을 열어 줘야 된다. 정청래가 모든 책임을 져야 된다. 민주 정치는 책임 정치 아니에요. 폭탄이 많이 날아와요. 아주 반갑게 받고 있습니다"], ["페이스북(등록 직후)", "저는 계파에 줄 선 적 없습니다. 국민께 줄 서서 여기까지 왔습니다"]], "notes": ["통화 지시 답변 순서 그대로: 예상했다 → 역할 기대 거부 → 586 40년 → 책임정치 → 문자폭탄 반갑게 [자료 13]", "박지현 사례 비교('같지 않고 더 심각 — 룰 확정 후 맞춤형 개정'): 7.18 대책회의 [자료 11]"], "warn": "당원 전체를 적으로 돌리는 표현 금지.", "media": "조선일보", "label": "Q4"}, {"no": 5, "part": 2, "q": "김어준 뉴스공장에서 '당선은 현실적으로 어렵잖아요, 현실을 인정하라'는 말을 들었다. 당시 기분은.", "tags": ["김어준", "뉴스공장", "꼰대", "노무현2%", "이생망중꺾마"], "script": ["사실 그날, 후보 등록 서류를 준비하느라 잠도 못 잔 상태였습니다. 당대표 후보들이 다 안 나가고 저만 남았다고 해서, 무리한 일정인 걸 알면서도 가기로 했습니다. 저는 청년 후보의 이야기를 들어주는 자리인 줄 알았습니다.", "그런데 가 보니 '너 왜 나왔냐, 나오지 마라, 안 되는데 왜 나왔냐, 정청래 까려고 나온 거 아니냐, 누구 사주를 받았냐' — 이걸 확인하는 자리 같았습니다. 솔직히 황당했습니다. 제가 평소에 뉴스공장을 보지 않아서, 이렇게까지 꼰대 기득권인 줄 몰랐습니다.", "말도 계속 끊으시더군요. 저도 똑같이 끊을까 하다가, 똑같이 끊으면 저도 똑같은 사람으로 보일까 봐 내려놓았습니다. 그래, 꼰대가 하고 싶은 말 맘껏 하시라고요. 저는 끊는 사람이 아니라 듣는 사람이 되기로 했습니다. 그게 제가 하고 싶은 정치이기도 하고요.", "그래서 되묻고 싶습니다. 김어준씨 말대로라면, 노무현 후보는 지지율 2%였을 때 포기했어야 합니까? 김대중 대통령은 죽이려는 자들 앞에서 포기했어야 합니까? 혁신이라는 게 뭡니까. 아무것도 없는 데서 기존 기득권에 도전하는 것 아닙니까. 그렇게 도전하는 청년의 길을 살려주지는 못할망정, 작정하고 꺾으려 하더군요. 저는 꿀리지 않습니다. 그래서 꼰대라고 한 겁니다. 그런 꼰대가 없습니다.", "그날 하고 싶은 말 반도 못 하고 나와서 '아, 이생망'이었습니다. 그런데 중요한 건 꺾이지 않는 마음이거든요. 부끄러움 탁탁 털고 다시 나왔습니다. 한번 더 붙자고 말씀드리고 싶습니다."], "quotes": [["박동완 통화 원워딩(7.19)", "인터뷰하러 오라 그래서 인터뷰를 하는 줄 알았다. 그랬더니 '너 왜 나왔냐, 너 나오지 마라, 안 되는데 왜 나왔냐, 정청래 까러 나온 거 아니냐, 누구 사주를 받았냐' 이거 확인하려고 하는 것 같았다 — 이게 제일 중요해요. 김어준 말대로라면 노무현 2프로였을 때 포기했어야지 왜 끝까지 갔냐. 혁신이라는 게 뭐냐. 아무것도 없는 데서 기존 기득권에 도전하는 거 아니냐. 난 꿀리지 않는다. 꼰대도 그런 꼰대가 없다"], ["비전·공약 '계란과 바위'", "2002년 노무현 후보의 초기 지지율, 바로 2%였습니다. 2%는 끝이 아니라 시작입니다"], ["비전·공약 '이생망, 그리고 중꺾마'", "중요한 것은, 꺾이지 않는 마음입니다"]], "notes": ["후보 본인 소회(7.19): 밤샘 등록 준비 → 유일 출연이라 무리해서 수락 → 들어주는 자리인 줄 → 황당 → 평소 뉴스공장 안 봄 → 말 끊어도 똑같이 안 끊음", "7.18 대책회의: '작정한 꼰대 정치였다, 완전히 당했다, 한번 더 붙자' [자료 11]"], "warn": "방송 실수는 먼저 인정(이생망) 후 반격. [방송기록대장 7.20] '꼰대' 표현 재사용 금지 — 이 스크립트의 '꼰대' 부분은 '낡은 검증 방식'·'기득권의 화법'으로 대체 권고(최종 판단 후보). 비판 여론도 지지자발 다수 — 폄하 금지, 수용 화법.", "media": "조선일보", "label": "Q5"}, {"no": 6, "part": 2, "q": "현재 민주당을 '공정·민주·세대교체·청년·미래'가 사라진 5무(無) 정당으로 규정했다. 구체적으로.", "tags": ["5무정당", "공정", "강진공천", "유령당원", "득표수공개", "세대교체", "2030"], "script": ["공정부터 말씀드리겠습니다. 멀리 갈 것도 없이 강진군수 공천을 보십시오. 의장 선거 때 당에서 찍으라는 후보를 안 찍었다는 이유로, 당헌·당규에도 없는 새 지침까지 만들어 저에게 15% 감산을 때렸습니다. 반대로 전과 5범인 상대 후보에게는 감점을 피할 규정을 억지로 만들어 공천을 줬습니다. 저는 2~3%포인트 차이로 떨어졌고, 결과는 어땠습니까. 공천받은 민주당 후보는 무소속에게 참패했고, 강진은 군수·도의원·군의원까지 모조리 무소속이 이겼습니다. 민주당의 불공정이 부른 대참사입니다. 이게 공정입니까.", "저는 그 경선에서 66개 공약을 발표하고 공약집까지 발간했지만 떨어졌고, 공약을 하나도 발표하지 않은 사람이 공천을 받았습니다. 경선 결과라고 받은 건 이름도 없는 '45.5'라는 숫자 하나였습니다. 그게 제 점수인지 남의 점수인지도 모릅니다. 이의를 제기하면 제명하겠다는 협박이 돌아옵니다.", "민주는요. 1인 1표라고 하는데, 그 명부에 유령 당원, 그 동네에 살지도 않고 식당에 주소를 올려놓은 당원이 섞여 있습니다. 그 명부로 경선을 하고, 현직 군수는 당무 정지로 출마를 막았습니다. 후보인 저조차 제가 몇 표 받았는지 모릅니다. 득표수를 후보한테도 안 알려주는 당원 주권이 무슨 당원 주권입니까. 이런 1인 1표, 다 사기입니다.", "세대교체는커녕 586에 686, 786, 886까지 다 하시겠다고 나서고, 청년 진입은 막혀 있습니다. 그러니 청년이 떠나고, 미래가 없는 겁니다. 분명히 말씀드립니다. 2030이 지지하지 않는 민주당에는 총선도 없고 대선도 없습니다. 저는 그게 걱정돼서 나왔습니다."], "quotes": [["박동완 통화 원워딩(7.19)", "강진군수 공천을 봐라. 억지로 규정 만들어 가지고 15프로 감점을 매기더라. 저쪽은 감점을 안 줄 방법을 억지로 찾아내서 감점을 안 주더라. 2~3 차이로 떨어졌다. 이게 공정이냐. 유령 당원, 불법 당원이 포함된 DB를 가지고 경선을 했다. 이게 민주주의냐. 1인 1표 다 사기다. 내가 찍은 후보 몇 표 나왔는지 후보한테도 안 알려 주는데 그게 무슨 당원 주권이냐. 2030이 지지 안 하는 민주당은 총선도 없고 대선도 없다. 걱정이 돼서 나왔다"], ["정견발표문(7.12)", "공정·민주·세대교체·청년·미래가 사라진 5무(無) 정당"], ["7.14 기자회견문", "규칙 없는 경기장이야말로 최악의 불공정입니다"]], "notes": ["당헌 25조 5항·특례 부칙, 청년최고위원 분리선출 부결: [자료 2·8]"], "warn": "'사기' 원워딩 유지(후보 결정). 강진 공천 15% 감점·유령당원 사례는 날짜·문서 등 사실관계 자료 지참 필수(법적 리스크 본인 인지 하에 발언).", "media": "조선일보", "label": "Q6"}, {"no": 7, "part": 2, "q": "'호남에는 선거가 없고 공천만 있다', '청년을 죽일 생각만 있다'고 썼다. 호남 청년 정치의 실상은.", "tags": ["호남", "강진", "청년", "지방"], "script": ["공천이 곧 당선인 구조에서는 경쟁이 사라집니다. 청년은 경쟁자가 되는 순간 배제됩니다. 제가 강진에서 겪은 그대로입니다. 도전하는 청년에게 돌아온 건 기회가 아니라 '순서를 기다리라'는 말이었습니다.", "더 근본적으로는, 지방을 이용만 했지 지방을 위해 해 준 게 없다는 겁니다. 호남 바닥 민심이 어떤지는 관심이 없고, 이걸 내 선거에 어떻게 이용할까만 생각합니다. 서울에서 호남을 이용하려는 정치로는 절대 호남 문제를 풀 수 없습니다. 호남에서 나고 자라 도민들과 동고동락한 사람이 풀어야 합니다."], "quotes": [["박동완 통화 원워딩(7.19)", "지방을 이용만 해 먹었지 지방을 위해서 해 준 게 없다. 호남 바닥 민심을 모르기 때문에 이걸 내 선거에, 내가 권력을 잡는 데 어떻게 이용할 것인가만 생각한다. 호남에서 자라고 호남에서 정치를 하고 도민들과 동고동락했던 사람이 아니면 지방의 문제를 풀 수가 없다. 서울에서 호남을 이용하려고 하는 586 꼰대 정치인들은 절대 호남의 문제를 풀 수 없다"], ["페이스북", "호남에는 선거가 없고, 공천만 있습니다"]], "notes": ["호남 기자회견(7.18) 현장 반응: 청년 환호, 강진 1,000표 목표 [자료 11]"], "warn": "통화 중 특정 전직 대통령 관련 발언은 STT 불명·리스크 커 인터뷰 언급 금지. 투자 규모(800조 등) 수치는 출처 확정 전 인용 금지.", "media": "조선일보", "label": "Q7"}, {"no": 8, "part": 2, "q": "'가만히 있으면 죽이는 정당, 나서지 말라는 이야기를 많이 들었다'고 했다. 구체적 경험은.", "tags": ["압박", "무혐의", "강진", "문자폭탄"], "script": ["바로 어제도 겪었습니다. 나서지 말라는 조언은 배려처럼 오지만, 사실은 경고입니다. 목소리를 내는 순간 공천 불이익과 문자폭탄이 온다는 걸 모두가 알기 때문에 침묵하는 겁니다.", "저는 의장 시절에 영장도 없이 차량을 털리고, 수개월 경찰 조사 끝에 무혐의를 받았습니다. 그런데도 허위사실을 쓴 언론에 조리돌림을 당했습니다. 억울해서 죽고 싶었던 심정, 그때 겪어봤습니다. 그래서 더욱, 이번에 후보 등록을 해야겠다고 생각했습니다. 안 하는 것보다 하는 게 나으니까요."], "quotes": [["박동완 통화 원워딩(7.19)", "바로 어제도 겪었다"], ["페이스북(등록 직후)", "끝까지 살아남아 목소리를 내겠습니다. 지금까지 그랬듯, 쫄지 않고 여러분의 목소리를 전달하겠습니다"]], "notes": ["의장 시절 압수·조사·무혐의·언론 피해: 페이스북 게시글 원문 [자료 12]"], "warn": "구체 인명 거론 금지. '어제 겪은 일'은 인터뷰 전 어떤 사례를 말할지 본인이 확정해 둘 것.", "media": "조선일보", "label": "Q8"}, {"no": 9, "part": 2, "q": "청년 정치인으로서 체감하는 2030의 민주당에 대한 실망감은 어느 정도인가.", "tags": ["2030", "무당층", "이생망중꺾마"], "script": ["숫자로 말씀드리겠습니다. 18세에서 29세 중 무당층이 48%입니다. 절반이 어떤 정당도 내 삶에 답하지 않았다고 생각하는 겁니다. 원래도 꼰대 정당이라는 인식 때문에 2030 지지율이 낮았는데, 지난 1년 사이 더 무너졌습니다. 특히 20대 남성은 바닥이고, 이제 여성들도 빠져나가고 있습니다.", "청년이 민주당을 떠난 게 아닙니다. 민주당이 먼저 청년을 떠난 겁니다. 선거철에 청년을 앞줄에 세워 사진 찍고, 선거가 끝나면 돌려보내는 일을 반복해 놓고 청년이 떠난다고 걱정합니다. 청년의 보수화가 걱정되십니까? 청년의 보수화는 민주당의 기득권 정치가 뿌린 씨앗입니다.", "그런데 저는 숫자보다 말이 더 아픕니다. 제 또래들은 '이생망'이라고 합니다. 이번 생은 망했다고 말하는 세대에게, 정치가 한 번도 '네 잘못이 아니다'라고 말해준 적이 없습니다. 저는 그 말을 하러 나왔습니다."], "quotes": [["출마선언문(7.9 최종)", "민주당에 청년이 사라졌습니다. 18세에서 29세 중 무당층이 48%입니다. 어떤 정당도 내 삶에 답하지 않았다고 생각하는 것입니다"], ["출마선언문(7.9 최종)", "청년이 민주당을 떠난 것이 아닙니다. 민주당이 먼저 청년을 떠난 것입니다"], ["박동완 통화 원워딩(7.19)", "45%가 무당층이다, 이 얘기만 하면 안 돼요. 원래부터 꼰대 정당이라고 소문나 가지고 2030 지지율이 낮았지만 지난 1년 동안 다 말아먹었다. 20대 남자들은 20%도 안 되고, 이제 여자들도 빠져나가고 있다. 그리고 본인 주변에 있었던 얘기를 하시라"], ["비전·공약", "어제 불합격 통보를 받았지만, 오늘 새로운 입사지원서를 쓰고 계시는 우리 청년 여러분 — 우리 모두, 이 꺾이지 않는 마음을 함께 품읍시다"]], "notes": ["'48%'는 출마선언문 공식 수치 — 그대로 인용 가능 [자료 7]"], "warn": "'20대 남성 20%'는 통화 수치로 출처 미확정 — '바닥'으로 표현. 48%는 출마선언문 기재 수치라 그대로 사용.", "media": "조선일보", "label": "Q9"}, {"no": 10, "part": 2, "q": "정 전 대표의 1인 1표제를 강하게 비판했다.", "tags": ["1인1표", "정청래", "선호투표", "컷오프", "유령당원"], "script": ["1인 1표라는 방향 자체는 제가 먼저 요구한 겁니다. 문제는 그 말이 현장에서 거짓이 된다는 겁니다. 유령 당원이 섞인 명부, 후보도 모르는 득표수, 그리고 본선만 1인 1표를 하고 예비경선은 밀실 컷오프로 두는 반쪽 구조 — 정청래식 1인 1표는 사기입니다. 당원 주권이 아니라 간판입니다.", "그리고 이건 직전 당대표의 책임이기도 합니다. 민주 정치는 책임 정치니까요. 선호투표를 도입했으면 컷오프는 안 됩니다. 청년의 입을 막는 청년 컷오프 하지 말고, 5인 모두 본선에서 정정당당하게 겨룹시다."], "quotes": [["박동완 통화 원워딩(7.19)", "정청래가 말하는 당원주권 1인 1표는 사기다. 유령 당원은 다 섞여 있고, 내가 찍은 후보 몇 표 나왔는지 후보한테도 안 알려 주는데 그게 무슨 당원 주권이냐"], ["7.14 기자회견", "밀실 컷오프를 폐지하고 예비경선부터 전 당원 1인 1표를 보장하라. 선거인 수와 후보별 득표수를 100% 공개하라"]], "notes": ["'사기' 원워딩 그대로 사용(후보 결정) [자료 13]", "선호투표제 확정(7.14 최고위·7.15 당무위): [자료 1]"], "warn": null, "media": "조선일보", "label": "Q10"}, {"no": 11, "part": 2, "q": "당대표가 된다면 5가지 중 가장 먼저 복원할 제1의 가치는.", "tags": ["공정", "재집권", "계란과바위"], "script": ["공정입니다. 저는 민주당의 공정을 회복하기 위해서 출마했습니다.", "공정과 당내 민주주의를 확립하는 것이 단순히 옳아서가 아니라, 재집권을 위한 핵심 과제이기 때문입니다. 공정이 무너지면 청년이 떠나고, 청년이 떠난 정당에는 총선도 대선도 없습니다. 규칙이 공정해야 계란도 바위와 겨뤄볼 수 있습니다."], "quotes": [["박동완 통화 원워딩(7.19)", "공정이다. 나는 민주당의 공정을 회복하기 위해서 출마했다. 공정과 당내 민주주의 확립하는 게 재집권을 위한 핵심적인 과제라고 생각한다"], ["공개질의 답변서(7.13)", "약한 계란이 강한 바위를 두드려, 결국 금을 냅니다"]], "notes": ["통화 지시: 공정과 당내 민주주의 둘 다 말할 것 [자료 13]"], "warn": null, "media": "조선일보", "label": "Q11"}, {"no": 12, "part": 2, "q": "'젊은 얼굴'을 넘어 공천·의사결정 구조에서 어떤 구체적 변화를 약속하나.", "tags": ["공약", "25개약속", "청년결정권", "청년최고위원", "공개질의답변"], "script": ["말이 아니라 이미 문서로 약속했습니다. 저는 '뽑고 싶은 민주당을 위한 25개 약속'을 냈고, 지금 하루에 하나씩 공개 발표하고 있습니다. 핵심은 세 가지입니다. 첫째, 밀실 컷오프 폐지와 예비경선부터 전 당원 1인 1표. 둘째, 선거인 수·득표수 100% 공개 — 경선과 공천을 유리상자처럼 투명하게. 셋째, 청년 결정권 — 자리가 아니라 권한을 드리는 겁니다.", "구체적으로 약속드린 것도 있습니다. 전국청년위원회가 공개 질의를 보내왔을 때 저는 문서로 답했습니다. 청년최고위원제 즉시 시행에 찬성하고, 이번에 무산되면 취임 당일 1호 안건으로 발의해 취임 30일 이내, 9월 안에 개정을 완료하겠다고요. 그리고 청년최고위원은 낙점이 아니라 선출직이어야 하고, 당대표 몫 지명직 최고위원은 전원 청년으로 임명하겠다고 답했습니다. 못 지키면 그 사유와 책임까지 공개하겠다는 것까지, 전부 문서로 남겼습니다.", "가짜 1인 1표 문제도 방법까지 제시했습니다. 당원 명부와 행안부 주민등록 데이터를 대조해서 진짜 당원만 가려내는 겁니다. 그 지역에 사는 사람이 그 지역 민주당 후보를 뽑는, 가장 상식적인 일부터 하겠습니다. 그리고 다른 후보들께 공개 제안합니다. 민주당이 정말 공정하고 투명한 정당이라 자신하신다면, 제 '경선 데이터 전면 공개' 공약을 이번 전당대회 우리 모두의 공통 공약으로 삼읍시다. 경선에서 떨어진 사람도 자신이 어느 지역, 어느 세대의 마음을 얻지 못했는지 알아야 성장합니다. 승자도 패자도 박수받는 '싱어게인' 같은 민주당, 그게 제가 만들 경선입니다."], "quotes": [["출마선언문(7.9 최종)", "당원 명부와 행안부 주민등록 데이터를 대조해서 진짜 당원만 가려내겠습니다. 그 지역에 사는 사람이 그 지역 민주당 후보를 뽑는, 가장 상식적인 일부터 하겠습니다"], ["메시지② '싱어게인'(김보미.com)", "저 김보미가 당대표가 된다면, 지난 지방선거의 모든 경선 데이터를 상세하고 투명하게 전면 공개하겠습니다. 다른 후보님들께도 제안합니다 — 이 '경선 데이터 전면 공개'를 우리 모두의 공통 공약으로 삼읍시다"], ["공개질의 답변서(7.13)", "당대표에 당선되면 취임 당일 청년최고위원제 도입 당헌·당규 개정을 '1호 안건'으로 발의하겠습니다"], ["공개질의 답변서(7.13)", "청년의 대표는 당대표의 낙점이 아니라 당원의 투표로 세워야 합니다"], ["공개질의 답변서(7.13)", "최고위원회의에서 청년의 목소리가 '구색'이 아니라 '상수'가 되게 하겠습니다"]], "notes": ["전국청년위원회(모경종 위원장) 긴급 공개질의(7.13) → 6개 질의 전체 서면 답변: ①즉시 시행 ②취임 당일 1호 안건 ③30일 이내 완료·결과 공개 ④선출직+지명직 전원 청년 ⑤청년위원장 최고위 상시 배석·청년 사전협의·월례 간담회 ⑥25개 약속 중 '청년 결정권' [자료 14]", "통화 지시: '공약 얘기하세요 — 1인 1표, 투명 공개, 어제 발표한 공약 첫째 둘째' [자료 13]"], "warn": null, "media": "조선일보", "label": "Q12"}, {"no": 13, "part": 2, "q": "주류를 향한 쓴소리는 '내부 총질' 반발을 부른다. 어떻게 돌파할 계획인가.", "tags": ["내부총질", "강성지지층", "김어준", "화산", "동행"], "script": ["당은 강성 지지층의 것도 아니고, 김어준씨의 것도 아니고, 꼰대 686의 것도 아닙니다. 당원과 국민의 것입니다.", "저는 청년들, 일반 당원들, 그리고 권리당원 중에 합리적으로 생각하시는 분들이 지금 제 이야기에 귀를 기울이고 계시다고 생각합니다. 정견발표 이후에 쏟아진 폭발적인 관심이 그 증거입니다. 혁신의 동력은, 당의 공정과 민주주의를 회복할 동력은 이미 준비돼 있습니다.", "문제는 누가 그 화산을 터뜨려 주느냐입니다. 제 몸이 부서지더라도, 그 분노를 폭발시키는 데 조그만 역할이라도 하겠습니다. 그게 제가 돌파하는 방식입니다. 밀실이 아니라 광장에서, 동원이 아니라 동행으로."], "quotes": [["박동완 통화 원워딩(7.19)", "당은 강성 지지층의 것도 아니고 김어준의 것도 아니다. 꼰대 686 것도 아니다. 청년들이나 일반 당원들, 권리당원들 중에 합리적인 생각을 하는 사람들은 내 얘기에 귀를 기울이고 있다. 혁신의 동력, 당의 공정과 민주주의를 회복할 수 있는 동력은 준비되어 있다. 누가 그 화산을 터뜨려 주느냐인데, 제 몸이 부서지더라도 그 분노를 폭발시키는 데 조그만 역할이라도 하겠다"], ["전대자료집 확정 멘트", "동원이 아니라 동행입니다. 김보미를 마음껏 사용해 주십시오"]], "notes": ["통화 원워딩 그대로 [자료 13]"], "warn": null, "media": "조선일보", "label": "Q13"}, {"no": 14, "part": 2, "q": "'바위에 맞서는 계란' — 다른 네 명의 쟁쟁한 후보에게 없는 '김보미만의 무기'는.", "tags": ["무기", "계파", "재산", "나라살림돋보기", "청년최고위원"], "script": ["기득권 계파에 물들지 않았다는 겁니다. 저는 신세 진 사람이 없습니다. 그래서 갚아야 할 사람도, 챙겨줘야 할 사람도 없습니다. 당원이 원하는 게 뭔지, 국민이 원하는 게 뭔지만 보고 눈치 안 보고 개혁할 수 있는 유일한 후보라고 감히 말씀드립니다.", "청년최고위원 하나를 못 만들고 반대하는 걸 보십시오. 챙겨줄 사람이 있고 신세 진 사람이 많은 기득권의 한계가 바로 저겁니다. 저에게는 그 한계가 없습니다.", "그리고 삶이 무기입니다. 다섯 후보 중에 일반 국민과 같은 상황에서 같은 마음으로 사는 사람은 저뿐입니다. 제 명의 재산이 마이너스 9,178만 원입니다. 불합격 통보의 무게, 사직서를 품고 출근하는 마음 — 그 삶을 저는 지금 살고 있습니다. 여기에 숫자가 있습니다. 재정주권시민행동 공동대표로 만든 '나라살림 돋보기'는 동네 이름만 치면 전국 243개 지자체와 중앙정부 예산이 3초면 나옵니다.", "마지막으로 승복의 품격입니다. 저는 지난 강진군수 경선에서 그 불공정을 겪고도 '경선 결과를 겸허히 받아들입니다'라고 승복했고, 억울함을 삼키고 당 후보들의 본선 승리를 도왔습니다. 승자도 패자도 함께 빛나는 민주당 — 말이 아니라 행동으로 먼저 보여드렸습니다. 지금 제 캠프는 역사상 가장 가난한 캠프지만, 가장 많은 사람이 함께하는 캠프입니다. 저의 빽도, 후원자도, 대변인도 국민 여러분입니다."], "quotes": [["박동완 통화 원워딩(7.19)", "기득권 계파에 물들지 않았다. 신세를 갚아야 될 사람도 없다. 진정하게 당원이 원하는 게 뭔지, 국민이 원하는 게 뭔지를 파악해서 개혁을 하려면 챙겨 줄 사람도 없고 신세 진 사람도 없는 저 같은 사람이 나서야 된다. 청년 최고위원 하나 배당 못 하고 반대하는 걸 봐라. 그게 챙겨 줄 사람 있고 신세 진 사람 많은 기득권들의 한계다. 민주당의 대선·총선 승리를 위해 꼭 해야 될 개혁을 눈치 보지 않고 과감하게 할 수 있는 유일한 후보다"], ["페이스북(등록 직후)", "빽이 없다는 말은 틀렸습니다. 저에게는 지지자 여러분이라는, 세상에서 가장 큰 빽이 있습니다"]], "notes": ["재산 -9,178만 원·아버지 이야기 좋아요 600+: [자료 11·12]"], "warn": null, "media": "조선일보", "label": "Q14"}, {"no": 15, "part": 2, "q": "지방정치(강진군의회) 경험이 여의도 중앙정치의 고질적 문제 해결에 어떤 실질적 도움이 되나.", "tags": ["강진", "호남", "지방", "예산", "맘다니"], "script": ["호남 정치를 개혁하면 민주당이 다 바뀝니다. 그게 제 답입니다.", "지금 중앙정치의 제일 큰 문제는, 지방을 이용만 했지 지방을 위해 해 준 게 없다는 겁니다. 저는 예산서를 보좌진 보고서로 읽은 사람이 아니라 직접 뜯어본 사람입니다. 지방의회는 예산과 민생이 매일 부딪히는 최전선이거든요. 그 바닥 민심과 생활 감각이, 거대 담론만 넘치는 여의도에 가장 부족한 것이고, 제가 가진 것입니다.", "말이 아니라 기록으로 증명합니다. 역대 최대 규모인 낭비성 예산 108억 원을 삭감했고, 행정사무감사 시정요구 195건, 조례 165건 제·개정 — 전반기 대비 44% 늘렸습니다. 강진군의회 개원 이래 최초로 '일문일답' 군정질문을 도입해 집행부를 실시간 검증했고, 업무추진비는 전면 공개했습니다. 전남 최초·전국 최고 수준의 강진형 육아양육수당 — 자녀 1명당 만 7세까지 월 60만 원 — 조례를 대표 발의해서, 시행 후 출생아와 전입 인구가 늘었습니다. 지방에서 되는 것을 보여줬으니, 이제 중앙에서 하겠다는 겁니다."], "quotes": [["박동완 통화 원워딩(7.19)", "호남 정치를 개혁하면 다 바뀐다로 가도 된다. 지방을 이용만 해 먹었지 지방을 위해서 해 준 게 없다"], ["김보미.com 의정성과", "역대 최대 규모 낭비성 예산 108억 원 삭감(2023 본예산 4,790억의 2.25%) · 행정사무감사 시정요구 195건 · 조례 165건 제·개정(+44%)"], ["페이스북", "호남에는 선거가 없고, 공천만 있습니다"], ["참고 워딩 (자질·경험·나이 질문 공용)", "지방의회는 중앙의 축소판입니다. 오히려 지방의회 경험도 없이 중앙정치 하는 분들이 허다합니다. 유럽은 지방의원부터 정치인을 양성합니다. 뉴욕시장 맘다니는 저보다 동생뻘입니다 — 30대가 못할 게 뭐가 있습니까?"]], "notes": ["의정 성과 수치 전체: 김보미.com '한눈에 보는 실적'·'주요 의정 성과' 직접 확인 [자료 7]"], "warn": null, "media": "조선일보", "label": "Q15"}, {"no": 16, "part": 2, "q": "“AI 3대 강국을 향해야 할 나라” — 민주당이 당장 주도권을 쥐어야 할 핵심 미래 산업·기술 어젠다는.", "tags": ["AI", "메가프로젝트", "농업", "기후위기", "균형발전"], "script": ["복잡하게 말씀 안 드리겠습니다. 3대 메가 프로젝트입니다. AI 반도체, 로봇, 그리고 AI 데이터센터. 이 세 가지는 반드시 성사시켜야 합니다.", "다만 그 과정에서 양극화가 생길 수 있습니다. 청년이 소외되고, 지방이 소외될 수 있습니다. 대기업과 중소기업, 수도권과 지방의 격차가 더 벌어지지 않도록 배분하고 균형발전에 투자하는 것까지가 국가의 일입니다.", "그리고 하나 더, 이건 꼭 말씀드리고 싶습니다. AI 다음은 농업입니다. 기후위기는 곧 식량위기입니다. 인류가 쌀 하나를 주식으로 만드는 데 몇천 년이 걸렸습니다. 기후가 급격히 바뀌면 새로운 식량 작물을 갑자기 만들어낼 수 없습니다. 그래서 AI와 로봇을 식량위기에 대응하는 첨단 농업에 동원해야 하고, AI 이후의 전략 산업으로 농업 첨단화를 지금부터 준비해야 합니다. 호남에서 온 후보라서 하는 말이 아니라, 미래를 보고 드리는 말씀입니다.", "그리고 그 미래의 열쇠는 지방에 있습니다. RE100의 핵심인 바람과 태양, AI 벨트에 필수적인 넓은 부지와 풍부한 용수는 여의도 빌딩 숲에 있지 않습니다. 지방에 다 있습니다. 대통령은 남부권 AI·반도체 벨트를 만들고 계신데 당은 계파 싸움만 하고 있습니다. 저는 정부보다 한발 앞서 미래를 연구하는 당, 대통령을 가장 잘 돕는 당대표가 되겠습니다."], "quotes": [["박동완 통화 원워딩(7.19)", "복잡하게 얘기하지 말고 — AI 반도체, 로봇, 데이터센터 3대 메가 프로젝트, 반드시 성사시켜야 된다. 그런데 그걸로 인해서 양극화가 생길 수 있다. 청년이 소외되고 지방이 소외될 수 있다. 균형 발전에 투자를 해야 된다. 그리고 중요한 게 하나 있다. AI 다음은 농업이다. 기후 위기는 곧 식량 위기다. 인류가 쌀농사 하나를 인류의 식량으로 만들기 위해서 몇천 년 걸렸다. AI도 로봇도 식량 위기에 대응할 수 있는 농업을 키우는 데 동원해야 한다"], ["정견발표문(7.12)", "AI 3대 강국을 향해야 할 나라"]], "notes": [], "warn": "정부 기금 명칭 등 세부는 STT 불명 — '정부도 기금으로 대응하는 것으로 안다' 수준까지만.", "media": "조선일보", "label": "Q16"}, {"no": 17, "part": 2, "q": "결국 정치는 통합이다. 86세대의 경험을 자산으로 남기면서 세대교체를 이루는 연착륙 방안은.", "tags": ["세대교체", "통합", "청년최고위원", "공정한틀"], "script": ["지금처럼 하면 됩니다. 젊은 사람들은 기득권의 잘못된 행태에 날카롭게 문제를 제기하고, 선배 세대는 청년들의 부족한 점을 지적해 주시고, 그렇게 서로 공정하게 경쟁하면 됩니다.", "그리고 세대교체는 양심에 맡길 게 아니라 제도로 해야 합니다. 솔직히, 제가 나가시란다고 나가시겠습니까. 동일 지역구 3선 이상 출마 제한 — 이건 김용 최고위원 후보의 공약이기도 합니다 — 여기에 저는 단체장도 연달아가 아니라 모두 합쳐 3선까지로 해야 한다고 봅니다. 국회의원이 자기 자리를 위협할 인기 있는 시장·군수를 무슨 수를 써서라도 공천에서 떨어뜨리는 일, 이런 것만 못 하게 제도를 만들면 세대교체는 자연스럽게 됩니다.", "기준은 나이가 아니라 시대의 과제입니다. 686 선배님들이 30대일 때 시대의 과제는 민주화였고, 그분들이 그 과제를 풀었습니다. 지금 우리의 과제는 AI 대전환, 지방소멸, 기후위기, 양극화입니다. 이 과제를 해결할 리더십이 당을 이끌어야 한다는 겁니다. 저는 세대 간의 전쟁이 아니라, 세대 간의 경쟁을 할 수 있는 공정한 틀을 만들어 달라는 겁니다. 그 틀만 있으면 선배들의 경험은 당의 가장 큰 자산이 됩니다."], "quotes": [["박동완 통화 원워딩(7.19)", "지금처럼 하면 됩니다. 젊은 사람들은 기득권의 잘못된 행태에 대해서 날카롭게 문제 제기를 하고, 나이든 세대들은 청년들이 부족한 거에 대해서 지적을 하고, 그러면서 서로 공정하게 경쟁을 하면 된다. 청년을 위한 자리가 지금은 하나도 없지 않냐. 청년최고위원제 절대 반대해 가지고 결국은 안 돼 있지 않냐. 나는 세대 간의 전쟁을 하자는 게 아니다. 세대 간의 경쟁을 할 수 있는 공정한 틀을 만들어 달라는 거다"], ["출마선언문(7.9 최종)", "나설 때가 아니라 이제 멋진 이별을 준비할 때입니다. 대한민국을 다음 세대에게 넘겨주는 아름다운 퇴장, 청년들에게 민주당의 미래를 맡기는 명예로운 은퇴를 준비할 때입니다"], ["출마선언문(7.9 최종)", "저는 세대 전쟁을 하지 않겠습니다. 그러나 세대교체는 반드시 이루겠습니다. 민주당은 특정 세대의 정당이 아니라 대한민국 모든 세대의 정당이 되어야 하기 때문입니다"], ["공개질의 답변서(7.13)", "청년최고위원 한 자리는 끝이 아니라 시작입니다"]], "notes": ["청년최고위원 분리선출안 부결: [자료 2]"], "warn": null, "media": "조선일보", "label": "Q17"}, {"no": 18, "part": 3, "q": "첫 여론조사 2%였다. 예비경선 컷오프 통과가 가능하겠나. 탈락하면 가처분으로 가나.", "tags": ["노무현2%", "컷오프", "가처분", "완주"], "script": ["2002년 국민경선 초반, 노무현 후보 지지율이 몇 %였는지 기억하십니까. 2%였습니다. 2%는 끝이 아니라 시작입니다. 절망의 숫자가 아니라 희망이 출발하는 숫자입니다.", "가처분은 당이 당헌 위반 상태를 강행할 경우의 조건부 대응입니다. 그리고 분명히 말씀드립니다. 저는 끝장을 보겠습니다. 끝까지 완주합니다. 8월 17일 대전까지 갑니다."], "quotes": [["비전·공약 '계란과 바위'", "기득권은 커 보일 뿐, 당원과 국민의 열망을 이길 수 없습니다. 권력은 강하지만, 민심은 더 강합니다"]], "notes": ["완주 의지(7.18): '끝장을 보겠다, 끝까지 완주, 연대 생각 없다' [자료 11]", "예비경선 배점 35·35·30(~7.23) vs 보도상 7.21 컷오프 — 상충, 인터뷰 전 확정 [자료 4·11]", "노무현 2%는 조사 기준별 상이 가능 — 반박 시 '경선 초반 군소후보' 취지로 수용"], "warn": "'탈락 대비' 프레임에 말리지 말 것.", "media": "조선일보", "label": "Q18"}, {"no": 19, "part": 3, "q": "이재명 대통령이 X에서 팔로우했다는 보도가 있다. 청와대의 낙점인가.", "tags": ["이재명", "X팔로우", "낙점", "계파"], "script": ["대통령께서 청년 평당원의 목소리를 지켜보신다면 좋은 일이지요. 하지만 저는 누구의 선택이 아니라 당원의 선택으로 여기까지 왔습니다. 누구 사주를 받았냐는 질문, 김어준씨한테도 받았습니다. 저는 누구의 똘마니도 아닙니다."], "quotes": [["페이스북(등록 직후)", "저는 계파에 줄 선 적 없습니다. 국민께 줄 서서 여기까지 왔습니다"]], "notes": ["뉴스1 보도(교차 미확인 ▲), X 계정 실재 확인 [자료 6]"], "warn": "낙점·교감 프레임 인정 절대 금지.", "media": "조선일보", "label": "Q19"}, {"no": 20, "part": 3, "q": "조국혁신당과의 합당론에 대한 입장은.", "tags": ["조국혁신당", "합당"], "script": ["거꾸로 여쭙고 싶습니다. 당원이 빠진 합당 논의가 무슨 의미가 있습니까. 욕심보따리부터 내려놓아야 합니다."], "quotes": [], "notes": ["확정 워딩: 전대자료집 체크리스트 ⑪·⑭ [자료 10]"], "warn": null, "media": "조선일보", "label": "Q20"}, {"no": 21, "part": 3, "q": "문자폭탄·팬덤정치는 민주당의 고질병 아닌가.", "tags": ["팬덤", "문자폭탄", "흥신소정치", "계파", "무당층"], "script": ["당원의 열정은 민주당의 자산입니다. 문제는 열정이 아니라, 그 열정을 좌표찍기와 족보 캐기에 동원하는 정치입니다. 사진 한 장으로 계파를 판정하는 것 — 저는 그걸 '흥신소 정치'라고 부릅니다.", "10년 전 상 받는 사진 한 장이 '이낙연계'의 증거로 돌았습니다. 기차역에서 배웅한 사진이 족보 캐기의 재료가 됐습니다. 가족끼리도 지지하는 사람이 다를 수 있는데, 다르면 무조건 손절해야 합니까.", "청년에게 계파가 어디 있습니까. 18~29세 절반 가까이가 무당파입니다. 기득권이 장벽을 쳐놓고 오지 말라고 해놓고, 이제 와서 누구 라인이냐를 따지는 것 자체가 계파 정치입니다. 저를 계파 어디에 넣을지 고민하지 마시고, 제 공약을 검증해 주십시오."], "quotes": [["페이스북(등록 직후)", "사진 한 장으로 계파를 판정하는 것, 그것이 바로 흥신소 정치입니다"]], "notes": ["페이스북 게시글 원문 [자료 12]"], "warn": "당원 전체 비난 취지 절대 금지 — 그 순간 헤드라인이 된다. 비판 대상은 '흥신소 정치'라는 행태로 한정.", "media": "조선일보", "label": "Q21"}, {"no": 22, "part": 3, "q": "정치 경력도 짧고 방송에서도 서툴다는 평가가 있다.", "tags": ["자질론", "서툶", "이생망중꺾마", "맘다니"], "script": ["맞습니다, 서툽니다. 뉴스공장에서도 하고 싶은 말을 다 못 했습니다. 그런데 국민 대부분의 인생이 그렇지 않습니까. 어제 실수하고, 오늘 다시 출근합니다.", "다만 검증이라면 이미 혹독하게 받았습니다. 당적 박탈, 불신임, 표적 고소·감사·수사 — 전부 겪었고, 전 건 '혐의없음·불송치'로 종결됐습니다. 100여 건의 허위·비방 보도에는 손해배상 소송으로 맞서 2024년에 승소했습니다. 불신임을 당했을 때는 하루 1,000명의 군민이 철회 지지 서명을 해주셨습니다. 방송에는 서툴러도, 시련에는 서툴지 않습니다.", "완벽해서 하는 게 아니라 해야만 해서 합니다. 서툴러도 하는 것이 안 하는 것보다 낫다 — 그게 제 정치의 전부입니다."], "quotes": [["비전·공약 '이생망, 그리고 중꺾마'", "부끄러움과 좌절을 탁탁 털고 다시 한 번 힘을 내어 나아가보겠습니다"], ["참고 워딩 (자질·경험·나이 질문 공용)", "지방의회는 중앙의 축소판입니다. 오히려 지방의회 경험도 없이 중앙정치 하는 분들이 허다합니다. 유럽은 지방의원부터 정치인을 양성합니다. 뉴욕시장 맘다니는 저보다 동생뻘입니다 — 30대가 못할 게 뭐가 있습니까?"]], "notes": ["'이생망→중꺾마' 서사: [자료 7]"], "warn": null, "media": "조선일보", "label": "Q22"}, {"no": 23, "part": 3, "q": "지지를 철회한 유튜버들이 있다. 초반 우군까지 등을 돌린 것 아닌가.", "tags": ["유튜버", "지지철회", "계파"], "script": ["저는 누구의 똘마니가 아닙니다. 당선되려고 나왔습니다. 저를 마음대로 움직일 수 없다는 걸 확인시켜 드렸다면, 철회해 줘서 오히려 고맙습니다.", "지지의 조건이 '말을 잘 듣는 것'이라면, 그 지지는 처음부터 제 것이 아니었습니다."], "quotes": [["페이스북", "저는 계파에 줄 선 적 없습니다. 국민께 줄 서서 여기까지 왔습니다"]], "notes": ["대응 기조(7.18 확정): '똘마니 아니다, 당선되려고 나왔다, 철회 오히려 고맙다' [자료 11]"], "warn": "이 싸움에 진 빼지 말 것 — 한 번 답하고 다음 주제로 전환.", "media": "조선일보", "label": "Q23"}, {"no": 24, "part": 3, "q": "군소후보 간 단일화나 특정 후보와의 연대 가능성은.", "tags": ["단일화", "연대", "완주", "김민석", "정청래"], "script": ["없습니다. 저는 완주합니다. 어
