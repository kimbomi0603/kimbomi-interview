떤 분들은 제가 특정 후보를 위해 뛰어주길 바라셨지만, 저는 누구를 위해서가 아니라 당선되려고 나왔습니다.", "계란은 다른 계란과 합쳐서 바위가 되는 게 아닙니다. 바위에 금을 내는 건, 끝까지 부딪히는 계란입니다."], "quotes": [["박동완 통화 원워딩(7.19)", "그 사람들은 제가 김민석을 위해서 정청래 까는 역할을 해 주길 바랐던 거잖아요. 그거 하려고 출마한 거 아니에요"]], "notes": ["완주·연대 입장(7.18): '끝까지 완주, 연대 생각 없다' [자료 11]"], "warn": null, "media": "조선일보", "label": "Q24"}, {"no": 25, "part": 3, "q": "'억대 자산가' '부모 빽' '이낙연계' '세작' 의혹 제기가 있다. 해명한다면.", "tags": ["재산", "계파", "이낙연계", "세작", "검증"], "script": ["전부 공개된 기록으로 답하겠습니다. 2018년 첫 재산신고 1억 남짓이 올해 3월 공직자윤리위 기준 3,395만 원이 됐고, 이번 후보 등록 신고 기준 제 명의 재산은 마이너스 9,178만 원입니다. 8년 만에 플러스가 마이너스가 됐습니다. 억대 자산가라니, 저에게는 로또 당첨만큼 꿈같은 얘기입니다.", "계파 이력도 공개돼 있습니다. 추미애 대표 시절 첫 공천, 이낙연 대표 시절 제명, 이재명 대표 시절 복당. 이 이력의 어디를 잘라야 제가 누구의 계파가 됩니까. 그 계파에 있었으면 총리실이나 보좌관, 청와대 이력 하나쯤은 있어야 하는 것 아닙니까. 저에겐 단 하나도 없습니다.", "한 가지는 정정하겠습니다. 빽이 없다는 말은 틀렸습니다. 저에게는 아낌없이 지지해주시는 지지자 여러분이라는, 세상에서 가장 큰 빽이 있습니다."], "quotes": [["페이스북(등록 직후)", "세작이 당에서 쫓겨나고, 15% 감산을 받습니까? 세작이 토론회 한 번 못 열고, 자기 득표수도 모른 채 떨어집니까?"]], "notes": ["재산·당적 이력·무혐의: 페이스북 게시글 원문 그대로만 인용 [자료 12]"], "warn": "숫자는 원문 그대로. 제명·수사 이력은 먼저 꺼내되 '무혐의'를 반드시 붙일 것.", "media": "조선일보", "label": "Q25"}, {"no": 120, "label": "Q26", "part": 3, "q": "(공통 대비) 혼자 목소리만 높인다는 지적이 있다. 다른 후보들과 만나 풀 생각은 없나.", "tags": ["토론회", "공정", "민주주의", "완주"], "script": ["그래서 제가 후보 등록을 마치자마자 모든 후보께 공개 제안을 했습니다. 당대표 후보 전원이 참여하는 공개 토론회를 열자고요. 민주당의 공정은 무엇인지, 청년들이 왜 떠나는지, 세대교체는 어떻게 이룰 것인지 — 국민과 당원 앞에서 공개적으로 토론합시다.", "혼자 외치는 것은 민주주의가 아닙니다. 입장이 다르더라도 만나서 토론하고 설득하는 것이 민주주의 아니겠습니까. 당이 입을 막더라도 후보들이 뜻만 모으면 얼마든지 열 수 있습니다. 모두가 어렵다면, 되는 분들끼리라도 합시다. 누가 더 큰 목소리를 내느냐가 아니라 누가 민주당의 미래를 책임질 수 있는지를 겨루자는 겁니다. 응하지 않으신다면, 그것이야말로 토론할 실력이 없다는 자백 아니겠습니까."], "quotes": [["등록 소회문(페이스북)", "그냥 혼자 외치는 것은 민주주의가 아닙니다. 입장이 다르더라도 만나서 토론하고 설득하는 것이 바로 민주주의 아니겠습니까"], ["등록 소회문(페이스북)", "비록 계란으로 바위를 치는 일일지라도 누군가는 끝까지 청년의 목소리를 대변해야 한다고 결심했습니다"]], "notes": ["등록 당일 전 후보 공개 토론회 제안 — 성사 여부와 무관하게 '토론 회피 프레임'을 상대에게 씌우는 카드 [자료 19]", "호남 회견 연계: 합동연설회는 '무관중 동영상 촬영회'일 뿐이라는 비판과 세트로 사용 [자료 17]"], "warn": null, "media": "조선일보"}, {"no": 101, "label": "B1", "part": 4, "q": "[후보 소개] 만 36세 최연소 군의장 출신 후보라고 언론들이 소개하던데요. 본인을 스스로 소개할 시간을 드리죠.", "tags": ["소개", "강진", "나라살림돋보기", "재산"], "script": ["안녕하십니까, 서른여섯 평당원 김보미입니다. 나이는 어리지만 민주당에서 정치한 지 13년 됐습니다. 강진에서 군의원 두 번 하고, 전국 최연소 기초의회 의장도 지냈습니다.", "계파도, 돈도, 빽도 없습니다. 재산은 빚밖에 없고요. 대신 재정주권시민행동 공동대표로 '나라살림 돋보기'를 만들어서, 검색창에 동네 이름만 치면 전국 243개 지자체 예산이 3초면 나오게 했습니다. 숫자와 현장으로 정치하는 사람입니다."], "quotes": [["정견발표문(7.20 최종)", "서른여섯, 평당원 김보미입니다. 나이는 어리지만 민주당에서 정치를 한 지 13년이 지났습니다. 강진에서 전국 최연소 기초의회 의장도 지냈습니다"]], "notes": ["연설문 첫인사 그대로 활용 [자료 15]"], "warn": null, "media": "불교방송"}, {"no": 102, "label": "B2", "part": 4, "q": "[출마 이유] 현역 의원도 아니고 조직·계파도 없는 원외 후보로서 왜 당대표 경선에 뛰어드셨습니까?", "tags": ["출마이유", "공정", "세대교체", "계파"], "script": ["저는 이번 당대표 선거에 특정 후보를 공격해서 다른 후보 지지자들의 표를 얻으려고 출마한 사람이 아닙니다. 저는 계파가 없습니다.", "민주당에 세대교체가 필요하고, 공정과 민주주의를 되찾아야 하고, 민주당에 청년이 돌아와 미래를 만들어야 한다는 의지로 출마했습니다. 686 기득권 정당 민주당을 청년도 공정하게 경쟁하는 정당으로 만들려고, 저 김보미가 당대표가 되려고 나왔습니다.", "그렇게 하지 않는다면 총선도, 대선도, 미래도 없습니다. 2030이 지지하지 않는 민주당에는 내일이 없다는 절박한 마음으로 나섰습니다."], "quotes": [["정견발표문(7.20 최종)", "저는 계파가 없습니다. 686 기득권 정당 민주당을, 청년도 공정하게 경쟁하는 정당으로 만들겠습니다. 저 김보미가 당대표가 되려고 나왔습니다"]], "notes": ["통화 지시: '2030이 지지 안 하는 민주당은 총선도 대선도 없다' [자료 13]"], "warn": null, "media": "불교방송"}, {"no": 103, "label": "B3", "part": 4, "q": "[386 세대교체] 유력 후보 3명이 모두 386인데, 세대교체가 필요하다는 주장이시죠?", "tags": ["세대교체", "86용퇴", "화염병짱돌"], "script": ["그렇습니다. AI 3대 강국에 진입하는 대한민국에, 화염병과 짱돌 들고 싸우던 세대가 아직도 민주당의 주인입니다. 민주화운동은 존중하고 저도 존경합니다. 하지만 그것이 40~50년 정치를 독점할 권리는 될 수 없습니다. 686이 786, 886까지 가면 민주당은 망합니다. 686은 아름답게 퇴장하고, 청년들이 민주당을 이끌어야 합니다.", "그리고 세대교체는 양심에 맡길 게 아니라 제도로 해야 합니다. 솔직히, 제가 나가시란다고 나가시겠습니까(웃음). 첫째, 동일 지역구 3선 이상 출마 제한 — 이건 김용 최고위원 후보의 공약이기도 합니다. 여기에 저는 하나 더 얹었습니다. 단체장도 연달아 3선이 아니라 '모두 합쳐' 3선 이상은 못 하게 해야 합니다. 국회의원이 자기 자리 위협할 인기 있는 시장·군수를 무슨 수를 써서라도 공천에서 떨어뜨리는 일만 못 하게 제도를 만들면, 세대교체는 자연스럽게 됩니다. 퇴출이 아니라 영입입니다. 3선이 넘은 지역구가 열려야 새 인재가 들어올 자리가 생깁니다.", "기준은 나이가 아니라 시대의 과제입니다. 686 선배님들이 30대일 때 시대의 과제는 민주화였고, 그분들이 풀었습니다. 지금의 과제는 AI 대전환, 지방소멸, 기후위기, 양극화입니다. 이 과제를 해결할 리더십이 당을 이끌어야 합니다. 저는 세대 전쟁이 아니라, 세대 간 경쟁을 할 수 있는 공정한 틀을 만들자는 겁니다."], "quotes": [["정견발표문(7.20 최종)", "686이 786, 886까지 가면 민주당은 망합니다. 686은 아름답게 퇴장하고 청년들이 민주당을 이끌어야 합니다"], ["뉴스공장 대비원고", "세대교체를 하려면 양심에 맡길 것이 아니라 제도를 만들어야 합니다. 김용 최고위원 후보 공약처럼 동일 지역구 3선 이상 출마 못 하게 해야 합니다. 여기에 저는 단체장도, 연달아 3선이 아니라 모두 합쳐 3선 이상 못 하게 해야 한다고 봅니다"], ["출마선언문(7.9 최종)", "나설 때가 아니라 이제 멋진 이별을 준비할 때입니다. 아름다운 퇴장, 명예로운 은퇴를 준비할 때입니다"], ["출마선언문(7.9 최종)", "저는 세대 전쟁을 하지 않겠습니다. 그러나 세대교체는 반드시 이루겠습니다"], ["박동완 통화 원워딩(7.19)", "나는 세대 간의 전쟁을 하자는 게 아니다. 세대 간의 경쟁을 할 수 있는 공정한 틀을 만들어 달라는 거다"]], "notes": ["호남 단체장 평균 연령 환갑 근접 — 국회의원이 은퇴 직전 인사만 공천하는 구조 비판(뉴스공장 원고) [자료 18]", "조선일보 Q2·Q17과 동일 논리 — 상세는 해당 문항 참조"], "warn": null, "media": "불교방송"}, {"no": 104, "label": "B4", "part": 4, "q": "[돌풍] X 계정을 새로 여셨는데 이재명 대통령이 하루 만에 팔로우해서 화제가 됐죠?", "tags": ["이재명", "X팔로우", "낙점"], "script": ["저도 놀랐습니다. 대통령께서 청년 평당원의 목소리를 지켜봐 주신다면 감사한 일이지요. 다만 분명한 건, 저는 누구의 선택이 아니라 당원의 선택으로 여기까지 왔다는 겁니다.", "경청이 무엇인지 몸소 보여주시는 대통령이십니다. 댓글까지 다 보시고 거기서 아이디어도 얻으신다고 하지 않으셨습니까. 그 많은 댓글을 하나하나 확인한다는 게 얼마나 어려운 일입니까. 저를 비롯한 국민들의 목소리와 삶을 보고 들어주는 대통령이 계시다고 생각하면 정말 든든합니다. 저도 그런 '경청의 정치'를 하겠습니다."], "quotes": [], "notes": ["낙점 프레임 금지 [금지선]"], "warn": "'낙점·교감' 해석에 동조 금지. 가볍게 받고 다음 질문으로.", "media": "불교방송"}, {"no": 105, "label": "B5", "part": 4, "q": "[돌풍] 인터뷰 요청도 많이 받고 계시죠? 대중의 관심, 이유가 뭐라고 보세요?", "tags": ["돌풍", "이생망중꺾마", "5무정당"], "script": ["제가 잘나서가 아니라, 다들 하고 싶었는데 아무도 하지 않던 말을 해서라고 생각합니다. '정말 듣고 싶은 말을 해 줘서 고맙다'는 분들이 많았습니다.", "이번 생은 망했다고 말하는 청년 세대에게, 정치가 한 번도 '네 잘못이 아니다'라고 말해준 적이 없거든요. 저는 그 말을 하러 나왔고, 그 마음이 닿은 것 같습니다.", "처음에는 제가 청년들의 분노를 대신 말했다고 생각했습니다. 그런데 지금은 2030만이 아니라 전 세대가 공감해 주고 계십니다. 공정과 세대교체가 청년만의 요구가 아니라, 민주당을 사랑하는 모든 세대의 요구였다는 것을 확인하고 있습니다."], "quotes": [["비전·공약", "중요한 것은, 꺾이지 않는 마음입니다"]], "notes": ["'아버지 이야기' 글 좋아요 600+ — 삶의 서사 공감 [자료 11]"], "warn": null, "media": "불교방송"}, {"no": 106, "label": "B6", "part": 4, "q": "[한계론] 언론이 3파전이라고 하고, 김 후보 도전엔 '계란으로 바위치기'라는 제목도 달던데요?", "tags": ["계란과바위", "노무현2%", "완주", "맘다니"], "script": ["맞습니다, 저는 계란입니다. 그런데 민주당의 역사가 처음부터 끝까지 계란으로 바위를 친 역사입니다. 노무현 후보는 2%로 시작했습니다. 그때 왜 안 될 사람이 나오냐고 했습니까? 김대중 대통령은 목숨을 위협받으면서도 도전했습니다.", "김어준 공장장도 그러시더군요. 안 그래도 안 될 건데 왜 나왔냐고요. 그럼 여쭙겠습니다. 월드컵 우승 못 하면 출전도 하지 말아야 합니까? 서울대 못 가면 공부도 하지 말아야 합니까? 질 것이 뻔하다던 도전들이 이 나라 민주주의를 만들었고, 지역주의에 금을 냈습니다.", "약한 계란이 강한 바위를 두드려, 결국 금을 냅니다. 저는 8월 17일 대전까지 완주합니다."], "quotes": [["공개질의 답변서(7.13)", "약한 계란이 강한 바위를 두드려, 결국 금을 냅니다"], ["참고 워딩 (자질·경험·나이 질문 공용)", "지방의회는 중앙의 축소판입니다. 오히려 지방의회 경험도 없이 중앙정치 하는 분들이 허다합니다. 유럽은 지방의원부터 정치인을 양성합니다. 뉴욕시장 맘다니는 저보다 동생뻘입니다 — 30대가 못할 게 뭐가 있습니까?"]], "notes": [], "warn": null, "media": "불교방송"}, {"no": 107, "label": "B7", "part": 4, "q": "[송영길 자격] 송영길 의원 후보자격 예외 인정 — '청년 박지현은 안 되고 686 송영길은 되느냐'고 직격하셨죠? 복당은 신규 입당과 다르다는 반론도 있는데요.", "tags": ["송영길김용", "박지현", "공정", "컷오프"], "script": ["먼저 분명히 말씀드립니다. 저는 송영길 후보 개인을 공격하려고 이 문제를 제기한 것이 아닙니다. 검찰 수사와 재판 과정에서 겪으신 어려움을 모르지 않습니다. 하지만 민주당의 원칙은 개인의 사정보다 우선해야 합니다. 원칙은 사정이 있는 사람을 비껴가는 것이 아니라, 누구에게나 동일하게 적용될 때 비로소 원칙이 됩니다. 청년에게는 예외가 없고 기득권에게만 예외가 반복된다면, 청년들은 민주당에서 계속 멀어질 것입니다.", "당헌·당규를 떠나서 보시죠. 4년 전 청년 박지현은 입당 6개월이 안 됐다는 이유로 서류 접수조차 거부당했습니다. 예외조항이 있으니 회의를 열어 논의해 달라는 요구도 묵살됐습니다. 그런데 등록 전날 밤 10시 30분, 똑같은 사유로 탈락 위기에 놓인 686 송영길 후보를 구제하려고 긴급 최고위원회가 열렸습니다. 김민석 후보도 '충분한 예외 사유'라며 거들었고요. 입사 면접장에서 자격 안 되는 면접자를 위해 면접 기준을 바꾸는 것과 한 치도 다르지 않습니다. 예외를 인정하려면 등록 전에 했어야죠. 불공정의 끝판왕입니다.", "아무리 손흥민이라도 결정적인 반칙을 하면 레드카드를 받습니다. 심판은 '그동안 국가를 위해 헌신했으니 이번만 봐주겠다'고 하지 않습니다. 규칙보다 사람이 우선하는 순간, 민주주의는 무너집니다. 당대표 후보들 모두 청년 정책을 내놓고선, 정작 청년들이 가장 혐오하는 불공정을 적나라하게 보여줬습니다. 양두구육 아닙니까.", "그리고 법원의 판단은 무죄고, 존중합니다. 하지만 돈봉투를 안 돌린 건 아니지 않습니까. 낡은 돈봉투 정치의 책임을 지고 쉬어야 할 분입니다. 당대표도 한 번 하셨습니다. 그때 청년정치를 위해, 공정을 위해 무엇을 하셨습니까. 두 번 하겠다는 건 어이가 없습니다."], "quotes": [["성명 전문", "아무리 손흥민이라도 결정적인 반칙을 하면 레드카드를 받습니다. 심판은 '그동안 국가를 위해 헌신했으니 이번만 봐주겠다'고 말하지 않습니다"], ["성명 전문", "입사 면접을 갔는데, 자격이 안 되는 면접자를 위해 면접 기준을 바꾸겠다고 하는 것과 한 치도 다르지 않습니다"], ["성명 전문", "규칙보다 사람이 우선하는 순간, 공정보다 특혜를 우선하는 순간 민주주의는 무너집니다"], ["문화일보 보도 워딩", "규정은 같은데 사람에 따라 적용을 달리한다면, 그것은 불공정을 넘어 비정상의 극치"], ["7.18 대책회의", "박지현 사례와 이번 자격 특혜는 같지 않고 더 심각 — 룰 확정 후 맞춤형 개정이기 때문"]], "notes": ["당규: 권리행사 시행일 6개월 전 입당+당비 6회, 예외는 최고위 의결+당무위 — 송영길 2.27 복당(6개월 미달), 김용 계좌동결로 당비 미납 [한국일보 보도·BBS 제공 자료]"], "warn": "'무죄지만 돈봉투' 발언은 명예훼손 시비 소지 — 반드시 '법원 판단은 존중한다'를 앞에 붙이고 의혹 사건의 정치적 책임론으로 한정.", "media": "불교방송"}, {"no": 108, "label": "B8", "part": 4, "q": "[컷오프] 오늘 컷오프에서 3인을 추립니다. 컷오프 제도에 비판적 시각을 갖고 계시죠?", "tags": ["컷오프", "선호투표", "1인1표"], "script": ["선호투표제를 도입했으면 컷오프는 안 됩니다. 표가 갈릴 걱정이 없는데 왜 자릅니까. 청년의 입을 막는 '청년 컷오프'를 하지 말고, 5인 모두 본선에서 정정당당하게 겨루면 됩니다.", "지금 이 경선이 어떤지 말씀드릴까요. 저는 등록을 마친 다음에야 경선 룰을 받았습니다. 선수가 뛰기 시작한 뒤에 규칙을 정하는 겁니다. 등록 나흘 뒤 컷오프인데 토론회는 한 번도 없습니다. 합동연설회요? 청중도 없이 동영상 찍는 '무관중 동영상 촬영회'일 뿐입니다. 기탁금 1,000만 원 내고 하는 게 그겁니다. 그래서 제가 후보 전원 공개 토론회를 제안했습니다. 모두 어렵다면 되는 분들끼리라도 합시다.", "밀실 컷오프가 아니라, 선거인 수와 득표수를 100% 공개하는 투명한 경선이어야 당원 주권입니다."], "quotes": [["전대자료집 확정 기조", "선호투표를 도입했으면 컷오프는 안 됩니다. 5인 모두 본선에서 정정당당하게 겨룹시다"]], "notes": ["선호투표제 7.14 의결·7.15 확정 [자료 1]"], "warn": null, "media": "불교방송"}, {"no": 109, "label": "B9", "part": 4, "q": "[기탁금] 전당대회 기탁금이 갑자기 인상됐죠? 청년 출마를 어렵게 한다는 비판이 있는데요.", "tags": ["기탁금", "청년", "공영제"], "script": ["제가 산증인입니다. 예비경선 기탁금이 2,000만 원으로 올랐고, 청년 50% 감면을 받아도 1,000만 원입니다. 저는 그 1,000만 원이 없어서 등록 당일 다섯 군데서 빌렸습니다. 본경선 가면 5,000만 원입니다. 이건 청년에게 출마하지 말라는 얘기입니다.", "이재명 대통령이 당대표 시절 당직선거 공영제를 도입하려고 기탁금을 줄여 놓았더니, 오히려 더 올려버렸습니다. 오죽하면 대통령이 나서서 깎아주라고 했겠습니까. 그리고 그게 어떻게 당무개입입니까. 이런 논란은 대체 누가 만든 겁니까. 당직선거 공영제, 저 김보미가 반드시 실현하겠습니다."], "quotes": [["정견발표문(7.20 최종)", "오죽하면 대통령이 나서서 기탁금 깎아주라고 이야기했겠습니까. 그리고 이것이 어떻게 당무개입입니까. 당직선거 공영제, 저 김보미가 반드시 실현하겠습니다"]], "notes": ["기탁금: 지난해 당대표 1,500/최고위원 500 → 7.14 공고 예비경선 2,000, 본경선 당대표 5,000, 청년 50% 감면 [BBS 제공 자료]", "기탁금 당일 5곳 차입: 페이스북 새벽 게시글 [자료 12]"], "warn": null, "media": "불교방송"}, {"no": 110, "label": "B10", "part": 4, "q": "[6.3 책임론] 6.3 지방선거 결과에 정청래 대표가 책임져야 한다는 입장이시죠? 연임 도전을 부정적으로 보시죠?", "tags": ["정청래", "책임정치", "6.3지방선거"], "script": ["민주 정치는 책임 정치입니다. 바로 직전 당대표가 선거 결과와 공천 파행의 책임을 지는 게 당연합니다. 대통령에 대한 국민의 압도적 지지에도 지방선거에서 졌습니다. 그런데 아무런 반성도 평가도 없습니다. 책임져야 할 분이 한 번 더 하겠다고 나오는 것, 그게 지금 민주당의 모습입니다.", "국민의힘을 해산하겠다고 해놓고, 지난 지방선거에서 다 죽은 국민의힘을 펄펄 날게 만들어 줬습니다. 정청래 대표 시절 1년, 민주당은 미래의 문을 열지 못하고 과거의 벽에 갇혀 있었습니다. 반성하지 않는 민주당, 변화하지 않는 민주당으로는 청년의 마음을 얻을 수 없습니다."], "quotes": [["박동완 통화 원워딩(7.19)", "정청래가 모든 책임을 져야 된다. 민주 정치는 책임 정치 아니에요"]], "notes": [], "warn": null, "media": "불교방송"}, {"no": 111, "label": "B11", "part": 4, "q": "[공천 문제] 선거 패배뿐 아니라 6.3 선거의 공천 문제도 지적하고 계시죠?", "tags": ["강진공천", "유령당원", "1인1표", "공정"], "script": ["제가 겪은 강진군수 경선이 불공정의 극치였습니다. 의장 선거 때 당에서 찍으라는 후보를 안 찍었다는 이유로, 당헌·당규에도 없는 새 지침을 만들어 기어이 15%를 감산했고, 전과가 다섯 개나 있는 후보는 감산 조항을 피할 방법을 억지로 만들어 공천을 줬습니다. 저는 66개 공약을 발표하고 공약집까지 냈지만 떨어졌고, 공약 하나 발표하지 않은 사람이 공천을 받았습니다. 제가 받은 경선 결과는 이름도 없는 '45.5'라는 숫자 하나였습니다.", "결과는 어땠습니까. 공천받은 민주당 후보는 무소속에게 참패했고, 강진은 군수·도의원·군의원까지 모조리 무소속이 이겼습니다. 불공정 경선이 빚은 대참사입니다. 이런 일이 어디 강진뿐이었겠습니까.", "가짜·불법 당원을 모았다고 후보자를 징계해 놓고, 그 가짜 당원들이 민주당 후보를 뽑게 했습니다. 이게 1인 1표입니까? 가짜 1인 1표입니다. 4무공천 약속도 지켜지지 않았습니다."], "quotes": [["정견발표문(7.20 최종)", "불공정 경선이 빚은 참사였습니다. 이런 일이 어디 강진만 있었겠습니까"], ["정견발표문(7.20 최종)", "이게 1인 1표입니까? 이건 가짜 1인 1표입니다"]], "notes": ["연설문에서는 '4무공천, 모두 사기였습니다' — 라디오에서는 '지켜지지 않았다'로 조절 가능, 판단은 후보 [자료 15]"], "warn": "강진 사례는 사실관계 자료 지참. 상대 후보 '전과 5개'는 공개된 선거공보 기준으로만.", "media": "불교방송"}, {"no": 112, "label": "B12", "part": 4, "q": "[적통논쟁] 고 이해찬 전 총리 배우자가 정청래 후보 후원회장을 맡는다고 하죠? 민주당 적통논쟁, 어떻게 보세요?", "tags": ["적통논쟁", "정청래", "계파"], "script": ["솔직히 저에게는 조금 먼 이야기입니다. 저는 지금 후원회 만드는 절차가 너무 복잡하고 번거로워서, 경선이 얼마 남지도 않았는데 그 안에 만들 수는 있을지 현실적인 걱정을 하고 있는 처지거든요. 어떤 후보는 후원회장이 누구냐로 화제가 되는데, 저는 후원회 자체가 없습니다. 이것이 청년 후보의 현실입니다.", "고인은 당의 큰 어른이셨고, 유족께서 누구를 돕는지는 그분들의 선택입니다. 다만 이렇게 여쭙고 싶습니다. 적통이 혈통입니까, 인맥입니까?", "민주당의 적통은 계란으로 바위를 쳤던 김대중·노무현의 도전 정신입니다. 누구의 배우자가 후원회장이냐로 적통을 다투는 것 자체가, 실력과 정책이 아니라 의리와 인맥을 앞세우는 낡은 정치입니다. 저는 그 적통 — 도전의 적통을 잇겠습니다."], "quotes": [["정견발표문(7.20 최종)", "민주당의 모든 문제는 실력과 능력보다 의리와 인맥을 앞세우기 때문입니다"]], "notes": [], "warn": "고인·유족 관련 직접 비판 절대 금지. 비판 대상은 '적통 마케팅'이라는 정치 문화로 한정.", "media": "불교방송"}, {"no": 113, "label": "B13", "part": 4, "q": "[유시민 비판] 이재명 대통령이 '필연적 실패의 길'로 가고 있다는 유시민 작가의 비판, 어떻게 들으셨나요?", "tags": ["유시민", "이재명", "검찰개혁"], "script": ["쓴소리는 경청해야 한다고 생각합니다. 저부터가 당에 쓴소리를 하는 사람이니까요. 다만 저는 이재명 정부가 실패하기를 바라는 사람이 아니라, 성공시키려고 나온 사람입니다.", "정부의 성공은 대통령 혼자 만드는 게 아니라 당이 만드는 겁니다. 지금처럼 계파 싸움으로 발목을 잡는 민주당이야말로 '필연적 실패의 길'입니다. 당을 바꿔야 정부가 성공합니다.", "한 가지만 덧붙이면, 쓴소리에 문자폭탄으로 답하는 정당에는 미래가 없습니다. 쓴소리일수록 경청하는 것, 그것이 제가 말하는 당내 민주주의이고, 그래야 당도 정부도 삽니다."], "quotes": [], "notes": [], "warn": "유시민 개인 평가 금지. 논점을 '당 개혁 = 정부 성공'으로 전환.", "media": "불교방송"}, {"no": 114, "label": "B14", "part": 4, "q": "[보완수사권] 수사·기소 분리에 의지가 없어 검찰개혁이 늦어진다는 비판, 보완수사권 논쟁은 어떻게 보세요? 여성단체들도 완전 폐지에 우려를 나타내는데요.", "tags": ["보완수사권", "검찰개혁"], "script": ["검찰개혁의 방향에는 전적으로 동의합니다. 그런데 솔직하게 여쭙고 싶습니다. 언제 적 검찰개혁입니까. 노무현 대통령 때 시작해서 24년이 지나도 완성하지 못했습니다. 작년 추석 전에 끝낸다고 하지 않았습니까. 혹시 공천받는 데 유리하니까 수십 년째 외치기만 한 것은 아닙니까.", "저의 방향은 분명합니다. 검찰과 경찰이 서로 견제하는 제도를 만들어야 합니다. 정치검찰은 물론이고, 경찰의 독주도 절대 허용해선 안 됩니다. 개혁의 속도전 속에 범죄 피해자 보호에 공백이 생겨서는 안 되고, 여성단체들이 우려하는 지점이 바로 그것입니다. 당론안이 보완수사요구권을 유지하는 방향인 것으로 아는데, 피해자의 눈높이에서 공백이 없는지 국민과 함께 검증하며 가야 합니다. 개혁은 속도가 아니라 신뢰로 완성됩니다. 민주당을 과거에 묶어 둔 검찰개혁, 제가 깨끗이 정리하고 미래로 가겠습니다.", "결국 개혁의 목적은 검찰을 이기는 것이 아니라 국민의 인권과 안전을 지키는 것입니다. 칼은 뺏어도 좋습니다. 그러나 국민을 지키는 선까지 자를 일은 아닙니다."], "quotes": [["출마선언문(7.9 최종)", "검찰과 경찰이 서로 견제하는 제도를 만들겠습니다. 정치검찰은 물론, 경찰 독주도 절대 허용하지 않겠습니다"], ["출마선언문(7.9 최종)", "미래를 설계해야 할 정당이 죽자 사자 과거에만 복수하고 있습니다"]], "notes": ["당론안: 형소법 196조 삭제 + 보완수사요구권 유지, 법사위 소위 심사 중, '8.17 전 처리' 방침 [자료: 법률신문·뉴시스, 7월 브리핑]"], "warn": "법안 세부는 '~로 안다'로 한정. 확정 전 단정 금지.", "media": "불교방송"}, {"no": 115, "label": "B15", "part": 4, "q": "[청년최고위원] 선출직 청년최고위원 도입이 최고위에서 부결됐습니다. 계파 간에 선호투표제와 청년최고위원제가 거래된 것 아니냐는 시각도 있는데요.", "tags": ["청년최고위원", "선호투표", "계파", "공개질의답변"], "script": ["거래로 보인다면, 그게 바로 계파 정치의 민낯입니다. 청년의 자리가 계파 간 협상 카드로 쓰였다는 것 아닙니까. 청년최고위원 하나를 못 만들고 부결시키는 것 — 챙겨줄 사람 많고 신세 진 사람 많은 기득권의 한계입니다.", "국민의힘조차 하고 있는 청년최고위원을, 민주당은 전준위가 전원일치로 결의한 안조차 계파싸움을 하느라 최고위에서 부결시켰습니다. 이것이 민주당의 현주소입니다. 그리고 이것이 바로 제가 출마한 이유입니다.", "저는 전국청년위원회 공개질의에 문서로 답변했습니다. 청년최고위원제 도입에 전적으로 동의하며 즉시 시행을 요구한다고요. 당대표가 되면 취임 당일 도입 당헌·당규 개정을 1호 안건으로 발의하고 30일 이내에 완료하겠습니다. 그리고 한 자리 도입에 그치지 않겠습니다. 청년최고위원은 낙점이 아니라 선출직이어야 하고, 당대표 몫 지명직 최고위원은 전원 청년으로 임명하며, 당직과 예산에 대한 청년의 실질적 결정권까지 보장하겠습니다. 출마선언 25개 약속의 '청년 결정권' 공약 그대로입니다."], "quotes": [["공개질의 답변서(7.13)", "당대표에 당선되면 취임 당일 청년최고위원제 도입 당헌·당규 개정을 '1호 안건'으로 발의하겠습니다"], ["공개질의 답변서(7.13)", "청년최고위원제 도입에 전적으로 동의하며, 즉시 시행을 요구합니다. 지명직 최고위원 전원 청년 임명, 당직과 예산에 대한 청년의 실질적 결정권 보장까지 나아가겠습니다"]], "notes": ["분리 선출안 7.14 최고위 부결 — 김민석·송영길 '자기정치' 비판 보도 [자료 2]", "국민의힘 청년최고위원 운영 비교 프레임 — 후보 지시(7.20)"], "warn": null, "media": "불교방송"}, {"no": 116, "label": "B16", "part": 4, "q": "[청년미래비서관] 이재명 정부가 청년미래비서관직을 신설하고 구글 출신 김태원 대표를 임명했습니다. 어떻게 보세요?", "tags": ["청년", "이재명", "청년결정권"], "script": ["정부가 청년의 목소리를 들으려는 시도는 환영합니다. 능력 있는 분이 오신 것도 좋은 일이고요.", "다만 한 가지만 말씀드리고 싶습니다. 청년 정치는 '청년의 목소리를 듣는 자리'를 만드는 데서 끝나면 안 되고, '청년이 결정하는 권한'까지 가야 합니다. 정부에 비서관이 생겼다면, 당에는 청년 정책 결정권이 생겨야 합니다. 그래서 저는 당 청년위원회에 청년 정책 결정권을 드리겠다고 약속했습니다."], "quotes": [["정견발표문(7.20 최종)", "당 청년위원회가 청년 정책 결정권을 갖도록 하겠습니다"]], "notes": [], "warn": "인선 자체에 대한 평가는 절제 — 구조(결정권) 이야기로 전환.", "media": "불교방송"}, {"no": 117, "label": "B17", "part": 4, "q": "[참정권] 이른바 올림픽공원 시위로 대표되는 청년들의 참정권 침해 비판은 어떻게 보세요?", "tags": ["참정권", "청년", "문자폭탄"], "script": ["투표용지가 부족해 참정권을 박탈당한 송파 투표소 사건 — 청년들이 분노하는 건 당연합니다. 분명히 해야 할 게 있습니다. 청년들은 선거 결과를 뒤집자는 게 아닙니다. 누가 이기고 졌는지를 따지는 것도 아닙니다. 왜 과정의 공정이 무너졌는지를 묻고 있는 겁니다.", "핵심은 결과가 아니라 과정입니다. 민주주의는 결과에 대한 승복 이전에 과정의 공정으로 지켜집니다. 투표소에서 몇 시간을 기다리고도 투표하지 못한 청년에게 '어차피 결과는 안 바뀐다'고 답하는 것은 모욕입니다. 한 표라도 과정에서 침해됐다면 사과하고, 재발 방지를 제도로 답해야 합니다. 그 과정의 불공정에 침묵한 것, 그것이 청년들이 분노하는 이유입니다.", "그런데 민주당은 어떤 답을 했습니까. 아무도, 그 어떤 답도 하지 않았습니다. 다가가서 청년의 하소연을 들었다는 소식도 없습니다. 청년들은 정치를 싫어하는 게 아니라 공정하지 않은 정치를 싫어하는 겁니다. 저라면 시위 현장에 가서 먼저 듣겠습니다. 그 목소리가 불편하다고 피하는 순간, 민주당은 민주정당이기를 포기하는 겁니다."], "quotes": [["출마선언문(7.9 최종)", "청년들은 선거 결과를 뒤집자고 말하는 것이 아닙니다. 왜 과정의 공정이 무너졌는지 따지고 있는 것입니다. 여기에 민주당이 어떤 답을 했습니까? 아무도 그 어떤 답도 하지 않았습니다"]], "notes": ["송파 투표소 투표용지 부족 사건: 출마선언문에 명시 — 올림픽공원 시위와 연결된 참정권 이슈 [자료 7]"], "warn": "시위대 요구사항 세부는 미확인 — '먼저 듣겠다'는 태도까지만, 특정 요구 수용 약속 금지.", "media": "불교방송"}, {"no": 118, "label": "B18", "part": 4, "q": "[기탁금 주문] 이재명 대통령의 기탁금 원상복귀 주문, 어떻게 보세요?", "tags": ["기탁금", "이재명", "공영제"], "script": ["당연한 말씀을 하신 겁니다. 그리고 그 당연한 말을 대통령이 직접 해야 할 만큼 당 지도부가 거꾸로 갔다는 것이 문제의 본질입니다. 오죽했으면 대통령이 나섰겠습니까.", "지금 민주당은 청년에게 높은 담장을 쳐 놓고 운동장에 못 올라오게 해 놨습니다. 예비경선 기탁금이 1천5백만 원에서 2천만 원으로 올랐습니다. 저는 청년이라 50%를 감면받았는데, 그 1천만 원도 없어서 여기저기 빌리느라 하루 종일 애를 태웠습니다. 그렇게 내고 할 수 있는 선거운동은 5일간 6분짜리 동영상 촬영 하나뿐입니다. 그걸 연설회라고 부르더군요. 경선 규칙이 무엇인지도 등록을 마친 뒤에야 알았습니다. 세계 10대 경제강국 집권당의 깜깜이 경선, 이게 실체입니다.", "그런데 특정 후보 측에서는 대통령의 이 말씀마저 당무개입이라고 합니다. 청년의 문턱을 낮추자는 의견이 어떻게 당무개입입니까. 저는 아직 후원회조차 못 만들었는데 어떤 후보는 수억 원의 후원금을 자랑합니다. 이것은 기울어진 운동장이 아닙니다. 운동장 위에는 기득권만 올라가 있고, 청년은 운동장 밖에서 들어갈 문조차 찾지 못하고 있는 겁니다.", "기탁금 인하를 넘어 당직선거 공영제로 가야 합니다. 돈이 아니라 정책으로, 인맥이 아니라 실력으로 경쟁하는 정당, 돈이 없어 출마를 포기하는 청년이 없는 민주당을 제가 만들겠습니다."], "quotes": [["정견발표문(7.20 최종)", "당직선거 공영제, 저 김보미가 반드시 실현하겠습니다"], ["페이스북(7.20)", "운동장 위에는 기득권만 올라가 있고, 청년은 운동장 밖에서 들어갈 문조차 찾지 못하고 있습니다"]], "notes": [], "warn": null, "media": "불교방송"}, {"no": 119, "label": "B19", "part": 4, "q": "[청년과 부동산] 지방 출신 여성 청년으로서 — 수도권 부동산 급등과 전월세 품귀로 서울 거주 청년층이 민주당을 지지하지 않는 상황, 어떻게 보세요?", "tags": ["부동산", "균형발전", "청년", "메가프로젝트"], "script": ["서울 청년의 주거 절망과 지방 청년의 일자리 절망은 같은 문제의 양면입니다. 모든 것이 수도권에 몰려 있으니 집값은 폭등하고, 지방에는 청년이 남을 이유가 사라집니다. 제 고향에는 면소재지에 밥 먹을 식당이 사라지고 있습니다.", "결국 지방이 살아야 나라가 바로잡힙니다. 수도권 집중을 그대로 둔 채 내놓는 부동산 대책은 대증요법일 뿐입니다. 지역균형개발로 지방에 사람과 일자리가 돌아와야 서울의 집값도, 청년의 절망도 풀립니다.", "그래서 부동산 대책의 절반은 균형발전입니다. 대통령의 3대 메가프로젝트, 호남 반도체 800조 투자를 반드시 성공시켜서 지방에 좋은 일자리를 만들어야 서울의 주거 압력도 풀립니다. 여기에 청년취업보장제를 민주당 핵심 정책으로 도입해서, 청년이 어디에 살든 출발선을 보장하겠습니다."], "quotes": [["정견발표문(7.20 최종)", "청년이 떠나고, 마을과 일자리가 없어지고, 면소재지에 밥 먹을 식당이 사라진 것 아닙니까"], ["정견발표문(7.20 최종)", "호남이 대한민국의 두 번째 수도권으로 우뚝 서도록, 대통령과 함께 3대 메가프로젝트를 반드시 성공시키겠습니다"]], "notes": ["구체 부동산 세제·공급 수치는 캠프 공약 미확정 — 균형발전+청년취업보장제 프레임으로만"], "warn": null, "media": "불교방송"}, {"no": 201, "label": "N1", "part": 5, "q": "정견발표 발언이 큰 화제였습니다. 그동안 언론 인터뷰에서 가장 많이 받은 질문은?", "tags": ["출마이유", "김어준"], "script": ["'왜 출마했느냐'였습니다. 그래서 답했습니다. 계파도 돈도 빽도 없는 평당원이, 686 기득권 정당 민주당을 청년도 공정하게 경쟁하는 정당으로 만들려고, 당대표가 되려고 나왔다고요.", "그런데 김어준 총수는 달랐습니다. 당선될 리도 없는데 정청래 저격하러 나온 것 아니냐고 끈질기게 물으시더군요."], "quotes": [["정견발표문(7.20 최종)", "정청래 공격하려 나왔냐, 김민석 도와주려 나왔냐 — 아닙니다. 저 김보미가 당대표가 되려고 나왔습니다"]], "notes": [], "warn": null, "media": "뉴탐사"}, {"no": 202, "label": "N2", "part": 5, "q": "정청래 의원을 직접 거명하며 강도 높게 비판했는데, 이후 당내에서 껄끄럽지는 않으신지?", "tags": ["정청래", "문자폭탄", "꼰대", "노무현2%"], "script": ["당연히 시끄러웠습니다. 댓글 달리는 것 보면서 솔직히 공포에 떨기도 했습니다. 그런데 제일 마음이 아팠던 건 청년의 도전을 바라보는 시선이었습니다. '당선이 어렵잖아요', '현실을 인정해야죠' — 이 말이 반복해서 날아왔습니다.", "정치가 언제부터 당선 가능성이 높은 사람만 도전할 수 있는 곳이 됐습니까? 노무현은 2%로 시작했습니다. 그때 왜 안 될 사람이 나오냐고 했습니까? 김대중은 박정희 정권이 현해탄에 빠뜨려 죽이려 했습니다. 서슬 퍼런 군사독재 치하에서도 도전했습니다. 탄압이 심하니 포기했어야 합니까?", "김어준 총수 같은 꼰대들이 지금도 공격하고 있습니다. 하지만 잘 버티고 있습니다. 격려해 주시는 분들이 훨씬 더 많습니다. '정말 듣고 싶은 말을 해 줘서 고맙다'는 분들이 많았습니다."], "quotes": [["후보 답변 초안(원문)", "정치가 언제부터 당선 가능성이 높은 사람만 도전할 수 있는 곳이 되었습니까?"]], "notes": ["뉴탐사는 우호 매체 — 7.4 라이브 인터뷰(35:57, 압도적 조회수)·자체 보도 기사 인연 [자료 10·방송기록대장]"], "warn": "[방송기록대장 7.20] '꼰대' 재사용 금지 지침 — 원고의 '꼰대들' 표현은 '낡은 검증 방식'으로 대체 권고(최종 판단 후보). N11 표준답변 확정본과 톤 일치시킬 것.", "media": "뉴탐사"}, {"no": 203, "label": "N3", "part": 5, "q": "핵심 메시지는 '세대교체'였습니다. 청년이 얼굴마담·들러리로 소모돼 온 현실 비판으로 읽혔는데, 진정한 세대교체란 무엇입니까?", "tags": ["세대교체", "청년결정권", "공천", "호남"], "script": ["청년을 들러리로 생각하지 않는 겁니다. 청년이 청년의 정책을 직접 결정하게 해 주는 것, 그리고 청년도 공정하게 출발선에 세워주는 겁니다.", "지역 이야기를 좀 해 볼까요. 지역에서는 국회의원이 왕입니다. 국회의원에게 밉보이면 아무것도 할 수 없습니다. 말 잘 듣는 청년만 클 수 있어요. 아무리 실력이 있어도 국회의원 말을 안 듣거나 자기 자리를 위협할 것 같으면 가차 없이 잘라버립니다.", "그래서 진정한 세대교체의 첫걸음은, 공천 과정에서 국회의원의 입김을 완전히 차단하는 것입니다."], "quotes": [["호남 기자회견문(7.18)", "호남에는 선거가 없고 공천만 있습니다. 호남 유권자는 민주당의 들러리일 뿐입니다"], ["호남 기자회견문(7.18)", "저는 정청래를 떨어뜨리려고, 송영길을 떨어뜨리려고 나온 것이 아닙니다. 저는 586 다 떨어뜨리고 제가 당선되려고 나왔습니다"], ["정견발표문(7.20 최종)", "지역에선 국회의원이 왕입니다. 자기 맘에 들면 키워주고, 자기 말을 듣지 않는 청년은 씨를 말립니다"]], "notes": ["호남 정치 독립선언(7.18): '호남이 호남을 키워야 민주당이 바뀝니다' — 뉴탐사에서 확장 가능 [자료 17]"], "warn": null, "media": "뉴탐사"}, {"no": 204, "label": "N4", "part": 5, "q": "'개혁' 앞세운 젊은 정치인들이 세대 갈라치기나 스스로 기득권화로 실망을 사기도 했습니다. 김보미도 '검증된 대안'인지 의구심이 있는데요.", "tags": ["자질론", "검증", "강진", "계파", "맘다니"], "script": ["나이는 서른여섯이지만 입당한 지 13년입니다. 군의원 두 번 했고, 전국 최연소로 의장도 지냈습니다. 누가 끌어준 것도 아니고, 어느 계파에 소속된 것도 아닙니다. 오직 군민만 보고 정치했습니다. 같은 당 군수라도, 국회의원이라도 잘못하면 지적했습니다. 그래서 얻은 별명이 '폭주 기관차', '동네 쌈닭'입니다. 저를 지지하는 분들은 '강진의 이재명'이라고 부르십니다.", "거꾸로 여쭙고 싶습니다. 대한민국에 유력 정치인이 끌어주지 않고, 스스로 온갖 고난을 이겨내면서 이 자리까지 온 청년 정치인이 있으면 한번 소개해 주십시오. 스물셋에 입당해 스물여덟에 최다득표로 당선됐고, 서른둘에 전국 최연소 의장이 됐습니다. 표적 징계와 수사는 전 건 혐의없음으로 끝났고, 허위보도 100여 건에는 소송으로 이겨냈습니다. 그리고 지난 강진군수 경선에서 그 불공정을 겪고도 승복하고 당 후보의 본선을 도왔습니다. 제가 아직 기죽지 않고 당대표에 도전한다는 것 자체가 검증된 대안이라는 증거입니다.", "그리고 저는 세대 갈라치기를 하자는 게 아닙니다. 세대 간의 전쟁이 아니라, 세대 간의 경쟁을 할 수 있는 공정한 틀을 만들어 달라는 겁니다."], "quotes": [["박동완 통화 원워딩(7.19)", "나는 세대 간의 전쟁을 하자는 게 아니다. 세대 간의 경쟁을 할 수 있는 공정한 틀을 만들어 달라는 거다"], ["참고 워딩 (자질·경험·나이 질문 공용)", "지방의회는 중앙의 축소판입니다. 오히려 지방의회 경험도 없이 중앙정치 하는 분들이 허다합니다. 유럽은 지방의원부터 정치인을 양성합니다. 뉴욕시장 맘다니는 저보다 동생뻘입니다 — 30대가 못할 게 뭐가 있습니까?"]], "notes": [], "warn": null, "media": "뉴탐사"}, {"no": 205, "label": "N5", "part": 5, "q": "재산, 부친의 선거 출마 이력을 거론하며 '지역 유지' 프레임으로 해석하려는 움직임이 있습니다.", "tags": ["재산", "검증", "기탁금"], "script": ["저는 기탁금 1,000만 원이 없어서 등록 당일 다섯 군데서 빌렸습니다. 이게 '지역 유지'입니까?", "재산은 전부 공개돼 있습니다. 2018년 첫 신고 1억 남짓이 올해 3월 공직자윤리위 기준 3,395만 원이 됐고, 이번 후보 등록 신고 기준 제 명의 재산은 마이너스 9,178만 원입니다. 재산은 빚밖에 없습니다.", "아버지는 오래전 무소속으로 군의원 선거에 나가신 적이 있을 뿐, 지금은 공방을 운영하시는 분입니다. 자기가 지지하는 후보를 비판하니까 아무말 대잔치를 하는 것뿐입니다."], "quotes": [["페이스북(등록 직후)", "억대 자산가라니, 저에게는 로또에 당첨된다는 것만큼이나 꿈같은 이야기입니다"]], "notes": ["재산 수치·부친 관련: 페이스북 게시글 원문 그대로 [자료 12]"], "warn": null, "media": "뉴탐사"}, {"no": 206, "label": "N6", "part": 5, "q": "이낙연 전 총리 측근으로 알려진 이진련 전 대구시의원과 찍힌 사진 등이 논란이 됐습니다. 어떻게 돌파하실 계획입니까?", "tags": ["계파", "이낙연계", "흥신소정치"], "script": ["그런 식으로 따진다면 김민석 후보와 사진 찍은 사람은 다 친석파고, 정청래 후보와 사진 찍은 사람은 다 친청파겠네요.", "당 행사에 대구·부산에서 전남까지 와주신 여성 지방의원님들을 기차역에서 배웅한 것까지 족보 캐기의 재료가 됐습니다. 사진 한 장으로 계파를 판정하는 것, 그것이 바로 흥신소 정치입니다.", "미안하지만 우리 청년들은 계파에 끼워 주지도 않습니다. 계파가 없어요. 벽을 쳐놓고 못 들어오게 막아 놓고, 이제 와서 누구 파냐 하는 것이 웃길 따름입니다."], "quotes": [["페이스북(등록 직후)", "사진 한 장으로 계파를 판정하는 것, 그것이 바로 흥신소 정치입니다"]], "notes": ["당적 이력 반박(추미애 공천·이낙연 제명·이재명 복당): [자료 12]"], "warn": null, "media": "뉴탐사"}, {"no": 207, "label": "N7", "part": 5, "q": "송영길 후보 자격 문제로 박지현 전 위원장을 소환하셨는데, '불가피한 복당'과 '신규 입당'은 다르니 비교가 무리라는 지적도 있습니다.", "tags": ["송영길김용", "박지현", "공정", "돈봉투"], "script": ["당헌·당규를 떠나 이겁니다. 어떤 청년은 후보 자격이 되는지 회의를 열어 결정해 달라고 했는데 접수조차 안 받았습니다. 어떤 686은 자격이 안 되니까 회의를 열어 등록할 길을 열어 줬습니다. 등록 시작하고 나서 규정을 고치는 시험이나 면접이 있습니까? 예외를 인정하려면 등록 전에 했어야죠. 불공정의 끝판왕입니다.", "솔직히 말해서, '나를 어찌하랴, 규정이 뭔 필요 있어' 하고 아무 준비도 안 하신 것 아닙니까. 본인의 준비성 없음이 만든 문제를 누구 탓을 합니까. 자격이 안 되는 분이 면접을 보게 해달라고 떼를 쓰는 게 말이 됩니까.", "법원의 판단은 무죄입니다. 존중합니다. 하지만 돈봉투를 안 돌린 겁니까? 낡은 돈봉투 정치의 책임을 지고 쉬어야 할 분입니다. 그리고 당대표 한 번 하셨지 않습니까. 그때 청년정치를 위해, 공정을 위해, 당내 민주주의를 위해 뭘 하셨습니까. 두 번 하겠다는 것도 어이가 없습니다."], "quotes": [["후보 답변 초안(원문)", "등록 시작하고 나서 규정 고치는 시험이나 면접이 있습니까? 불공정의 끝판왕입니다"]], "notes": ["당규 근거(6개월·당비 6회·예외 절차)와 송영길 2.27 복당·김용 계좌동결: BBS 자료와 동일 [B7 참조]"], "warn": "'무죄지만 돈봉투' — 반드시 '법원 판단은 존중한다' 선행. 인신 표현('게으르다')은 방송에서는 '준비성 없음'까지만.", "media": "뉴탐사"}, {"no": 208, "label": "N8", "part": 5, "q": "줄곧 '공정'을 강조하셨는데, '룰'이 공정의 최고 기준이냐는 지적도 나옵니다.", "tags": ["공정", "룰", "송영길김용"], "script": ["최고 기준은 아닐지 몰라도, 최소한의 기준입니다. 그런데 우리 민주당의 룰에는 '단, 어떠한 경우 예외로 한다', '단, 달리 정할 수 있다'가 너무 많습니다.", "무슨 뜻이냐면, 누굴 떨어뜨리고 싶으면 얼마든지 떨어뜨릴 수 있고, 자격도 조건도 안 되지만 누굴 붙이고 싶으면 얼마든지 붙일 수 있다는 겁니다. 어떤 민주당 의원께서 이번 사태를 보고 '민주당은 룰이 없다'고 했는데, 딱 그 말이 맞습니다. 민주당은 최소한의 룰조차 없는 것과 마찬가지입니다.", "그래서 약속합니다. 경선 룰은 6개월 전에 확정하고 절대 바꾸지 않겠습니다."], "quotes": [["정견발표문(7.20 최종)", "경선 룰은 6개월 전에 확정하고 절대 바꾸지 않겠습니다"]], "notes": [], "warn": null, "media": "뉴탐사"}, {"no": 209, "label": "N9", "part": 5, "q": "지방의회 의장으로서 쌓아온 실질적 성과는 무엇이고, 그 리더십이 중앙 정치에서도 발휘될 수 있다고 자신하십니까?", "tags": ["강진", "예산", "나라살림돋보기", "리더십", "맘다니"], "script": ["숫자로 말씀드리겠습니다. 전국 최연소 의장으로서 역대 최대 규모인 낭비성 예산 108억 원을 삭감했습니다. 2023년 본예산 4,790억의 2.25%입니다. 행정사무감사 시정요구 195건, 조례 165건 제·개정으로 전반기 대비 44%를 늘렸고, 강진군의회 개원 이래 최초로 '일문일답' 군정질문을 도입해 집행부를 실시간 검증했습니다. 업무추진비는 전면 공개해서 지방의회 투명성의 새 기준을 만들었습니다.", "정책으로는 전남 최초·전국 최고 수준의 강진형 육아양육수당 조례를 대표 발의했습니다. 소득·자녀 수 무관, 자녀 1명당 만 7세까지 월 60만 원 — 시행 후 출생아와 전입 인구가 늘었고, 전액 지역화폐로 지급해 골목경제까지 살렸습니다. 그 예산 감시 경험으로 '나라살림 돋보기'를 만들어 누구나 동네 예산을 3초면 보게 했습니다.", "리더십은 시련이 증명합니다. 표적 징계와 수사를 전 건 혐의없음으로 이겨냈고, 불신임을 당했을 때는 하루 1,000명의 군민이 철회 서명을 해주셨습니다. 여의도에 부족한 건 거대 담론이 아니라 숫자, 신뢰, 맷집입니다. 저는 셋 다 검증받았습니다."], "quotes": [["김보미.com 의정성과", "전남 최초·전국 최고 수준 강진형 육아양육수당 — 자녀 1명당 만 7세까지 월 60만 원(아동 1인 최대 5,040만 원). 시행 후 출생아·전입 인구 증가"], ["페이스북", "강진군민들께서는 조용히 최다득표로 힘을 실어주셨습니다"], ["참고 워딩 (자질·경험·나이 질문 공용)", "지방의회는 중앙의 축소판입니다. 오히려 지방의회 경험도 없이 중앙정치 하는 분들이 허다합니다. 유럽은 지방의원부터 정치인을 양성합니다. 뉴욕시장 맘다니는 저보다 동생뻘입니다 — 30대가 못할 게 뭐가 있습니까?"]], "notes": ["의장 성과는 '알아서 답변' 지시 문항 — 김보미.com '주요 의정 성과' 수치로 구성. 8년 연속 의정활동비 지역아동센터 기탁, 언론노출 970건 돌파, 유튜브 생중계 도입도 추가 소재 [자료 7]"], "warn": null, "media": "뉴탐사"}, {"no": 210, "label": "N10", "part": 5, "q": "후보님이 만들고 싶은 '미래형 민주당'의 청사진, 핵심 키워드 3가지로 정리해 주신다면?", "tags": ["공정", "1인1표", "청년", "신천지", "공약"], "script": ["첫째, 공정한 민주당. 민주당에 공정이 없습니다. 강진군수 경선에서 저에게는 당헌·당규에도 없는 새 지침을 만들어 15%를 감산했고, 전과 다섯 개 후보는 감산 없이 공천을 받았습니다. 경선 규칙을 전면 혁신해서 실력으로, 정책으로 경쟁하는 정당을 만들겠습니다.", "둘째, 민주주의가 있는 민주당. 가짜·불법 당원이 후보를 뽑는 가짜 1인 1표, 선거인 수도 득표수도 공개 안 하는 가짜 당원주권을 끝내겠습니다. 신천지가 특정 후보를 지원하려고 조직적으로 들어왔다는 의혹이 사실이라면 명백한 불법 당원입니다. 전수조사해서 모두 솎아내고 경선해야 합니다. 룰은 6개월 전 확정, 결과는 100% 공개하겠습니다.", "셋째, 청년정당 민주당. 지역에선 국회의원이 왕입니다. 청년에게 기회가 없는 민주당을 완전히 바꾸겠습니다. 청년취업보장제를 핵심 정책으로 도입하고, 당 청년위원회가 청년 정책 결정권을 갖게 하겠습니다. 남녀 모두 단기 기초군사훈련을 받고 징병제를 단계적 모병제로 바꾸는 공약도 발표했습니다."], "quotes": [["정견발표문(7.20 최종)", "불법당원, 유령당원, 신천지 당원 모두 정리하고, 경선 결과는 100% 공개하겠습니다"], ["출마선언문(7.9 최종)", "민주주의는 상대를 이기는 기술이 아닙니다. 더 나은 답을 찾는 과정입니다"], ["김보미.com 공약집", "5대 분야 25개 약속 — ①유리상자 경선 ②진짜 1인 1표 ③청년 결정권(청년 예산 10%·정책 오디션) ④미래 설계 정당(미래전략원·AI 대전환) ⑤성장 사다리 정당(풀뿌리 사다리·공정 경쟁 공천)"]], "notes": ["신천지 관련은 '의혹이 사실이라면'이라는 조건부 유지 — 단정 금지 [자료 15]", "스웨덴 알메달렌 참가(2026) 경험 — '잔디밭이든 주차장이든 모두 토론장, 누가 어느 편인지 대신 누가 더 좋은 정책인지 토론' 비유 활용 가능 [자료 7]"], "warn": "신천지 발언은 반드시 '의혹', '사실이라면' 조건부로. 뉴탐사가 파고들어도 '전수조사가 답'이라는 요구로 수렴.", "media": "뉴탐사"}, {"no": 211, "label": "N11", "part": 5, "q": "민주당의 분열을 걱정하는 분들이 많습니다. 어떤 생각을 갖고 계신지요.", "tags": ["통합", "정청래", "이재명"], "script": ["대통령께서 통합을 원하고 계시고, 누가 당선되든 새 대표도 통합을 내세울 겁니다. 지금은 당권을 두고 치열하게 경쟁해서 그렇지, 전당대회가 끝나면 다시 통합의 길로 간다고 봅니다.", "다만 정청래 후보가 되면 사정이 달라질 수 있습니다. 지금까지 그랬던 것처럼 집권여당 대표가 야당 대표같이 사사건건 정부와 엇박자를 낸다면, 분열상이 심각해질 수 있습니다.", "당권과 대권에만 빠져 허덕이는 정치가 아니라, 국가와 국민을 보고 하는 정치였으면 좋겠습니다. 저는 그 통합의 기준이 '공정'이라고 믿습니다. 규칙이 공정하면 경쟁은 축제가 되고, 규칙이 무너지면 경쟁은 분열이 됩니다."], "quotes": [["후보 답변 초안(원문)", "당권과 대권에만 빠져 허덕이는 정치가 아니라 국가와 국민을 보고 정치를 했으면 좋겠습니다"]], "notes": [], "warn": "'소인배' 등 인격 표현은 방송에서 자제 — '당권과 대권에만 빠진 정치'로.", "media": "뉴탐사"}, {"no": 300, "part": 6, "media": "한겨레", "label": "H0", "q": "[첫인사] 인터뷰 시작 멘트 — 예시 3개 (오늘 예비경선 당원투표 시작 → 투표 독려 필수)", "tags": ["첫인사", "오프닝", "투표독려", "예비경선", "권리당원투표", "고함사건"], "script": ["【예시 1 · 기본형(투표 독려 프레임)】 안녕하세요, 김채운 기자님. 만 서른여섯 평당원 후보, 김보미입니다. 귀한 지면 내주셔서 감사합니다. 오늘부터 23일까지 당대표 예비경선 투표가 시작됐습니다. 권리당원 여러분께 이 자리를 빌려 꼭 부탁드리고 싶습니다. 이번 한 표가 민주당이 이대로 갈 것인지, 다시 태어날 것인지를 정합니다. 꼭 투표해 주십시오. 저는 오늘, 있는 그대로 다 말씀드리겠습니다. 편하게 물어봐 주십시오.", "【예시 2 · 고함 사건 정면형 + 독려】 네, 김보미입니다. 반갑습니다. 오늘 아침 공개 석상에서 고함을 듣고 시작한 하루입니다만, 마음은 어느 때보다 단단합니다. 마침 오늘부터 예비경선 당원투표가 시작됐습니다. 왜 오늘 제가 겪은 일이 남의 일이 아닌지, 왜 이번 투표가 중요한지 — 그 이야기를 다 말씀드리겠습니다. 권리당원 여러분, 23일까지입니다. 청년의 목소리가 본선 무대에 오를 수 있을지, 여러분의 한 표에 달려 있습니다.", "【예시 3 · 풀뿌리 겸손형 + 독려】 안녕하세요, 김보미입니다. 8년 동안 새벽 민원 전화로 하루를 열었던 지방의원이라, 전화 인터뷰가 오히려 제일 편합니다. 오늘부터 사흘간 예비경선 투표가 진행됩니다. 한겨레 독자 중에 계신 권리당원 여러분, 어떤 후보를 선택하시든 꼭 참여해 주십시오. 참여가 많아질수록 계파와 조직의 힘은 작아지고, 진짜 당원의 뜻이 커집니다. 그것이 제가 말하는 진짜 1인 1표의 시작입니다."], "quotes": [["당 선관위·보도(7.21)", "예비경선 7.21~23 · 당대표 5→3인 압축 · 반영 비율: 중앙위원 35% + 권리당원 35% + 국민여론조사 30% · 결과 발표 7.23 국회 의원회관"], ["활용 팁", "세 예시 모두 '오늘부터 투표 시작 + 23일까지 + 참여 독려'를 반드시 포함 — 독려 문구는 특정 후보 지지 호소가 아니라 '참여' 호소로(기사화 안전)"]], "notes": ["첫인사 3요소 유지: ①만 36세 평당원 ②감사 ③가감 없이 예고 — 여기에 ④투표 독려 추가", "'참여가 많아질수록 계파의 힘은 작아진다'(예시 3)는 김보미 공정 서사와 자연 연결되는 독려 논리", "유선 특성상 첫 문장에 이름 또렷하게"], "warn": "독려 멘트에서 '저를 찍어달라'로 들리는 직접 호소는 기사 인용 시 역풍 가능 — '꼭 투표해 달라, 청년이 본선에 갈지는 여러분 손에'까지만."}, {"no": 301, "part": 6, "q": "정견발표에서 \"화염병과 짱돌로 싸운 분들이 아직도 주축이다. 686이 786, 886까지 갈 게 아니라 이제 멋진 이별을 준비해야 할 때\"라고 해 화제가 됐다. 왜 지금 민주당에 세대교체가 시급한가.", "tags": ["세대교체", "고함사건", "재창당", "86용퇴", "화염병짱돌", "내로남불", "송영길"], "script": ["왜 지금이냐고요. 오늘 아침에 있었던 일부터 말씀드리겠습니다. 오늘 서울시의회 의장실 접견 자리, 의장님과 의원님들, 의회사무과 직원들까지 계신 공개된 자리에서 송영길 후보께서 저에게 고함을 지르셨습니다. 제가 지적한 것은 하나였습니다. 왜 청년과 686에게 절차를 다르게 적용하느냐. 청년 박지현은 서류 접수조차 거부해 놓고, 686은 면접이 시작된 다음에 절차를 무시하고 자격이 안 되는 분에게 자격을 만들어 주느냐. 그 '과정의 불공정'을 지적했더니 돌아온 것은 '내가 뭘 잘못했느냐, 내가 탄압받고 살아왔는데'라는 고함이었습니다. 세대교체가 왜 시급하냐고요. 바로 이 장면이 답입니다. 공정을 물으면 훈장이 돌아오는 정당, 이것이 지금의 민주당입니다.", "오해는 마십시오. 저는 김민석·정청래·송영길 선배님들을 진심으로 존경합니다. 독재에 맞선 그 용기가 오늘의 민주주의를 만들었습니다. 저는 선배님들의 시대를 끝내자는 것이 아니라 다음 세대로 이어가자는 것입니다. 그런데 지금 민주당은 반성을 잃었습니다. '우리가 국민의 마음을 잘못 읽은 것은 아닐까'라는 질문이 사라졌고, 질문보다 확신이 많고, 경청은 없고 연설만 있습니다. 실력보다 의리, 정책보다 인맥, 원칙보다 예외 — 그렇게 내로남불이 탄생했습니다.", "그래서 저는 '개혁' 정도로는 안 된다고 봅니다. 거의 재창당 수준이어야 합니다. 586 기득권은 물러나고, 청년과 미래세대, 전문가 중심으로 당을 새로 짜야 합니다. AI 3대 강국에 진입해야 할 대한민국에서 화염병과 짱돌 들고 싸우던 세대가 아직도 당의 주인입니다. 686이 786, 886까지 가면 민주당은 망합니다.", "민주주의는 권력을 얻는 것으로 끝나지 않습니다. 권력을 다음 세대에게 넘겨줄 때 완성됩니다. 독재에 맞섰던 그 용기를 이제는 권력을 내려놓는 용기로 완성해 주십시오. 가장 위대한 계승, 가장 아름다운 퇴장을 저 김보미가 준비해 드리겠습니다."], "quotes": [["박동완 통화 원워딩(7.21 12:38)", "오늘 아침에 있었던 일 알고 계세요? 송영길이 저한테 막 고함을 지르더라고요. 왜 절차를 다르게 적용하냐, 왜 청년들한테 예외를 안 주고 686들은 절차도 무시하고 면접 시작한 다음에 자격이 안 되는 사람에게 자격을 주게 하냐고 지적을 했는데 '내가 뭘 잘못했나 내가 탄압받아 살았는데' — 거기서부터 얘기를 시작하세요"], ["박동완 통화 원워딩(7.21 12:38)", "거의 재창당 수준으로 586 기득권들 싹 다 물러나야 되고 청년 중심으로, 미래 세대 중심으로, 전문가 중심으로 짜야 된다"], ["7.20 합동연설회 연설문(최종)", "686이 786, 886까지 가면 민주당은 망합니다. 686은 아름답게 퇴장하고 청년들이 민주당을 이끌어야 합니다"], ["7.21 서울시의회 정견발표", "권력을 다음 세대에게 넘겨줄 때 완성됩니다 … 가장 위대한 계승, 가장 아름다운 퇴장을, 김보미가 준비해 드리겠습니다"], ["새 성명(7.21) '물러나야 민주당이 산다'", "운동권 경력은 장기집권 면허증이 아닙니다 … 산업화 세대가 민주화 세대에게 권력을 넘겼듯, 이제 민주화 세대가 AI 세대에 권력을 넘겨야 합니다. 박수 칠 때 떠나라"]], "notes": ["통화 지시(7.21): 반드시 오늘 고함 사건에서 시작 → 존경·계승 → 재창당 순서", "'재창당'은 이번 인터뷰 핵심 키워드 — 각 답변에서 최소 1회 반복", "내로남불 3연은 정견발표 원문 그대로 인용 가능"], "warn": "고함 사건 서술은 사실관계(장소·배석자·발언)만 — 감정 표현은 '황당했다' 수준까지. '꼰대'는 7.21 통화 기조에 따라 고함 사건·청년 문맥에서 사용 가능하나, 자기 규정이 아니라 '청년들이 그렇게 부른다' 화법 병행 권장.", "media": "한겨레", "label": "H1"}, {"no": 302, "part": 6, "q": "전당대회 기탁금이 인상됐다가 오늘(21일) 당 선관위가 당대표 8,000만원·최고위원 3,000만원으로 감액을 결정했다. 청년최고위원제는 부결됐다. 어떻게 평가하나. 실제로 당에 청년을 유입시키기 위해 어떤 제도적 장치가 필요한가.", "tags": ["기탁금", "기탁금감액", "투개표비용", "원상복귀", "청년최고위원", "공영제", "청년", "들러리", "계파"], "script": ["오늘 감액 결정부터 말씀드리겠습니다. 여론에 떠밀린 사후 땜질입니다. 물론 안 내리는 것보다는 낫습니다. 그러나 세 가지를 지적하지 않을 수 없습니다. 첫째, 원상복귀가 아닙니다. 대통령께서 '종전 수준으로 되돌리라'고까지 말씀하셨는데, 당대표 8,000만 원·최고위원 3,000만 원은 이재명 대표 시절인 2024년의 4,000만 원·1,500만 원의 정확히 두 배입니다. 절반만 내려놓고 생색을 내는 것입니다. 둘째, 순서가 틀렸습니다. 후보 등록은 이미 지난주에 끝났습니다. 저는 그 기탁금이 없어서 등록 당일 다섯 군데에서 빌렸습니다. 문턱에 걸려 아예 출마를 포기한 청년은 누가 책임집니까. 셋째, 선관위는 '투개표 비용은 후보자가 부담하는 게 맞다'고 합니다. 저는 정반대로 생각합니다. 투개표는 정당 민주주의의 기본 비용입니다. 그 비용을 후보 개인의 지갑에 떠넘기는 순간, 돈 있는 사람만 출마할 수 있는 정당이 됩니다. 비용 분담이 기준이라면 기탁금은 한도 끝도 없이 올라갑니다. 그래서 답은 감액이 아니라 당직선거 공영제입니다.", "이 소동 전체가 보여주는 것이 있습니다. 지금 686 세 분 후보가 청년 공약을 쏟아내고 계시지만, 솔직히 저는 하나도 믿지 않습니다. 지금 당이 하는 것을 보십시오. 청년최고위원제는 부결시키지 않았습니까. 기탁금은 올렸다가 대통령이 나서니까 그제서야 절반만 내리지 않았습니까. 왜 청년과 686에게 기준을 다르게 적용하느냐고 물었더니 돌아온 것은 고함이었습니다. 그런 분들이 내놓는 '2030과 함께하겠다'는 말을 어떻게 믿습니까. 지금까지 입으로는 계속 그렇게 해 왔습니다. 그러나 실제로는 청년들을 이용만 하고 들러리만 세웠습니다. 전준위가 전원일치로 올린 청년최고위원 안을 최고위가 부결시킨 것, 그것이 이 당의 진심입니다.", "청년이 민주당을 떠난 것이 아닙니다. 민주당이 먼저 청년을 떠난 것입니다.", "제도는 명확합니다. 핵심은 '사진 말고 권한'입니다. 첫째, 당직선거 공영제 — 기탁금 장벽 자체를 없애고 당이 선거 비용을 책임지게 하겠습니다. 이재명 대통령이 당대표 시절 도입하려던 것을 제가 완성하겠습니다. 둘째, 청년최고위원제 — 당대표 취임 당일 1호 안건으로 발의해 30일 안에 개정을 완료하겠다고 이미 문서로 약속했고, 임명직 최고위원 두 자리는 전부 청년으로 임명하겠습니다. 셋째, 청년 관련 정책은 당 청년위원회가 결정권을 갖게 하고 청년 예산 10%를 보장하겠습니다. 넷째, 청년취업보장제를 당의 핵심 정책으로 도입하고 풀뿌리부터 크는 공정 경쟁 공천 사다리를 만들겠습니다. 이 정도는 해야 '재창당'입니다."], "quotes": [["당 선관위 발표(7.21, 임호선 부위원장)", "당대표 후보 8천만원, 최고위원 후보 3천만원으로 확정 — 과도하게 부담된다는 지적이 있어 2020~2022년 전당대회 기준으로 정했다 / 청년(및 원외 장애인) 후보 50% 감면 → 청년 최고위원 2,500만→1,500만원 / '투개표 비용은 후보자가 부담하는 게 맞다'"], ["박동완 통화 원워딩(7.21 12:38)", "686 세 분이 청년 공약을 막 내놓고 있는데 하나도 안 믿는다. 지금 당이 하는 거 봐라. 청년최고위원 부결시키지 않았냐, 기탁금 올리지 않았냐. 기준을 다르게 적용하냐고 했더니 그냥 고함지르지 않냐. 입으로는 그렇게 했다. 근데 청년들 이용만 하고 들러리만 세웠다 — 그런 얘기를 꼭 해야죠"], ["7.20 합동연설회 연설문(최종)", "기탁금이라도 줄여 놓았더니 오히려 더 올려버렸습니다. 오죽하면 대통령이 나서서 기탁금 깎아주자고 이야기했겠습니까 … 당직선거 공영제, 저 김보미가 반드시 실현하겠습니다"], ["캠프 확정 멘트", "청년이 민주당을 떠난 것이 아닙니다. 민주당이 먼저 청년을 떠난 것입니다 / 사진 말고 권한"], ["문진석 의원(서울경제 7.20)", "전대 기탁금, 비용 분담이 기준이면 10억도 부족 — '투개표 비용 후보 부담' 논리 반박에 원용 가능"]], "notes": ["수치 확정(7.21 당 중앙당선관위): 당대표 1억→8,000만 / 최고위원 5,000만→3,000만 / 청년 50% 감면 유지(청년 최고위원 2,500만→1,500만) / 원외 장애인 50% 감면 신규 [파이낸셜뉴스 7.21]", "비교 기준: 2024 이재명 대표 시절 당대표 4,000만·최고위원 1,500만 — '여전히 두 배, 원상복귀 아님'이 핵심 반박", "프레임: 감액 자체 폄하보다 '사후 땜질·순서·구조(공영제)' 3단 논리 — 대통령 주문과 같은 방향임을 부각", "'취임 당일 1호 안건·30일 내 개정'은 청년최고위원 공개질의 답변서(7.13) 문서 근거"], "warn": "'당무개입' 프레임으로 이어지면: '대통령 말씀은 당연한 것, 그 당연한 말을 대통령이 해야 할 만큼 지도부가 거꾸로 간 게 문제' 기조 유지. 감액 결정 자체를 조롱하는 톤 금지 — '낫지만 부족하다'.", "media": "한겨레", "label": "H2"}, {"no": 303, "part": 6, "q": "지난 지방선거를 예시로 당의 '불공정 경선' 구조를 핵심 개혁 과제로 들고 나왔다. 당대표가 되면 현행 1인1표제와 경선 구조를 어떻게 바꾸고 싶은가.", "tags": ["1인1표", "가짜1인1표", "유령당원", "강진공천", "유리상자", "선호투표", "득표수공개"], "script": ["핵심부터 말씀드리겠습니다. 지금의 1인1표, 당원주권은 전부 가짜입니다. 686이 기득권을 유지하기 위해 내세우는 명분일 뿐입니다. 유령당원이 천지인데, 당원 명부를 정리하라고 해도 정리하지 않습니다. 오염된 명부 위에서 하는 투표가 무슨 1인1표입니까.", "저는 이것을 이론이 아니라 몸으로 겪었습니다. 지난 강진군수 경선에서 저에게는 당헌·당규에도 없는 새 지침을 만들어 기어이 15퍼센트를 감산했습니다. 전과가 다섯 개 있는 상대 후보는 감산 하나 없이 공천을 받았고, 결과는 무소속에게 참패였습니다. 그리고 저는 제가 몇 표를 얻었는지 아직도 모릅니다. 선거인 수도 득표수도 공개하지 않았기 때문입니다. 전 세계 민주주의 국가에서, 후보가 자기 득표수도 모르는 선거를 하는 정당이 민주당 말고 어디에 있습니까.", "당대표가 되면 세 가지를 바꾸겠습니다. 첫째, 명부부터 정리하겠습니다. 불법 당원·유령 당원·대리 당원 전수조사입니다. 특정 후보 지원을 위한 조직적 유입 의혹까지 나온 마당에, 모두 솎아내고 실명·거주 인증으로 '진짜 1인1표'를 만들겠습니다. 둘째, 싹 다 공개하겠습니다. '유리상자 경선' — 경선 룰은 6개월 전에 확정해 동결하고, 결과는 100% 공개합니다. 제 1호 공약이 경선 데이터 전면 공개입니다. 선호투표제 도입은 환영합니다만, 순위별 득표 데이터 전면 공개로 완성해야 합니다. 셋째, 공천은 충성도가 아니라 실력과 전문성으로, 당원과 주민이 결정하는 상향식으로 바꾸겠습니다. 밀실 공천과 깜깜이 경선을 끝내는 것, 그것이 재창당의 출발입니다."], "quotes": [["박동완 통화 원워딩(7.21 12:38)", "가짜 1인 1표다. 핵심 문장은 — 1인 1표, 당원주권 전부 가짜인데 이거는 686이 기득권을 유지하기 위해서 내세우는 명분일 뿐이다. 유령당원이 천지로 있고 명부 정리하라고 해도 정리도 안 한다. 명단부터 정리해야 되고 그다음에 싹 다 공개해야 되고"], ["박동완 통화 원워딩(7.21 12:38)", "전 세계 민주주의 국가에서 자기가 몇 표 얻었는지도 모르는 선거를 하는 나라가 민주당밖에 더 있냐 — 그게 또 핵심 문장입니다"], ["7.20 합동연설회 연설문(최종)", "당헌·당규에도 없는 새 지침을 만들어 기어이 15퍼센트를 감산했습니다. 전과가 다섯 개나 있는 상대후보는 감산을 하나도 하지 않고 공천을 줬습니다 … 이건 가짜 1인1표입니다"], ["캠프 확정 멘트", "저는 제가 몇 표를 얻었는지 아직도 모릅니다 → 1호 공약 '경선 데이터 전면 공개'"], ["호남 정견발표/성명(7.18~7.21) 원문", "이름도 밝히지 않고 숫자 3개만 보여줍니다. 조작을 했는지 안 했는지 알 길이 없고, 이의를 제기하면 '제명하겠다'는 협박이 들어옵니다"]], "notes": ["답변 뼈대는 통화 지시 그대로: 가짜 1인1표 규정 → 유령당원·명부 → 강진 실증 → 명부 정리·전면 공개", "강진 15% 감산·전과 5개는 사실관계 자료를 손에 들고 말할 것(법적 리스크)", "신천지 의혹은 '의혹이 사실이라면' 조건부 화법 유지"], "warn": "유령당원·신천지 관련 특정인 단정 금지 — '전수조사 요구'까지만.", "media": "한겨레", "label": "H3"}, {"no": 304, "part": 6, "q": "민주당이 송영길·김용 후보의 출마 자격을 예외적으로 인정한 것을 두고 공정성 논란이 제기됐다. 민주당이 원칙을 스스로 훼손한 것 아니냐는 비판도 있는데 어떻게 보나.", "tags": ["송영길김용", "박지현", "공정", "고함사건", "가처분", "레드카드"], "script": ["원칙을 스스로 훼손한 것이 맞습니다. 기준은 하나여야 합니다. 청년 박지현은 4년 전 서류 접수조차 거부당했습니다. 686 송영길은 밤 10시 반 긴급 최고위로 구제됐습니다. 왜 청년과 686에게 절차를 다르게 적용합니까. 청년 박지현은 안 되고 686 송영길은 됩니까. 이게 공정입니까.", "분명히 하고 싶은 것은, 저는 송영길 후보가 잘난 사람인지 못난 사람인지를 지적한 것이 아니라는 점입니다. 손흥민 선수라도 반칙을 하면 레드카드를 받습니다. 입사 면접이 한창 진행되는 중에 특정 면접자에 맞추어 자격 요건을 바꾸는 것 — 제가 지적한 것은 사람이 아니라 그 '과정의 불공정'입니다. 자격 요건이 안 되면 후보 등록 전에 미리 당무위를 열어 논의를 요청하는 것이 순서 아닙니까. 규칙보다 사람이 우선하는 순간 민주주의는 무너집니다. 당헌 위반이 강행된다면 가처분을 포함해 대응할 것입니다.", "이 문제를 지적한 대가가 오늘 아침의 고함이었습니다. 다른 분들도 계시니 별도로 전화로 말씀 나누자고 정중히 부탁드렸지만 호통은 멈추지 않았습니다. '내가 검찰개혁을 외치다 이렇게 고생했는데', '나 이런 사람이야' — 공정을 물었더니 훈장을 꺼내신 것입니다. 그래서 저는 정견발표에서 공개적으로 사과를 요청드렸습니다. 공개적으로 고함치셨으니 공개적으로 사과를 요구한 것입니다. 그러나 끝끝내 사과는 없었습니다. 섭섭하실 수는 있습니다. 그러나 여러 사람 앞에서 고함치며 윽박지르는 것은 인격무시 행위입니다. 저도 당대표 후보입니다. 존중해 주시기 바랍니다."], "quotes": [["박동완 통화 원워딩(7.21 12:38)", "왜 절차를 다르게 적용하냐, 왜 청년들한테 예외를 안 주고 686들은 절차도 무시하고 면접 시작한 다음에 자격이 안 되는 사람에게 자격을 주게 하냐"], ["박지현·송영길 성명(7.17)", "청년 박지현은 안되고, 686 송영길은 됩니까? 이게 공정입니까?"], ["페이스북(7.21)", "손흥민 선수라도 반칙을 하면 레드카드를 받습니다 … 공개적으로 고함치셨으니, 저도 공개적으로 사과를 요구한 것입니다"], ["7.14 국회 소통관 기자회견", "당헌 25조 5항 위반·특례 부칙 — 3대 요구, 가처분 예고"]], "notes": ["고함 사건 상세는 H1에서 먼저 나왔으면 여기서는 '아까 말씀드린 그 고함이 바로 이 문제를 지적한 대가였다'로 연결", "'복당은 신규 입당과 달라 비교 무리' 반론 대비: '같지 않고 더 심각 — 룰 확정 후 맞춤형 개정'(7.18 대책회의)"], "warn": "송영길 개인 인신 비난 금지 — 행위(규칙 변경·고함)만. '뻔뻔함'은 페이스북 게시글 인용 형태로만.", "media": "한겨레", "label": "H4"}, {"no": 305, "part": 6, "q": "이번 전당대회는 '적통 논쟁', '자기 정치' 등 계파 갈등이 주요 이슈가 되고 있다. 국민들은 민생보다 '누가 대통령과 더 가까운가'를 두고 경쟁하는 모습으로 비칠 수 있다는 지적도 나온다. 이번 전당대회 경쟁 양상을 어떻게 평가하나.", "tags": ["적통논쟁", "계파", "친명친청", "김민석", "흥신소정치", "싱어게인", "재집권", "족보", "무당파"], "script": ["지금 전당대회가 친명과 친청의 대결로 가고 있습니다. 바람직하지 않습니다. 싸우려면 과거냐 미래냐를 가지고 싸워야지, 적통 논쟁, 누가 대통령과 더 가깝냐, 묘소에 갔냐 안 갔냐를 가지고 싸우는 것이 말이 됩니까. 국민의 삶은 벼랑 끝인데 말입니다.", "김민석 후보께는 아쉬움을 말씀드리고 싶습니다. 저는 김민석 후보가 적어도 친명·친청 논쟁에 휘말리지 않고 선거를 치르실 줄 알았습니다. 민주당은 그렇게 하지 않으면 미래가 없기 때문입니다. 그런데 스스로를 자꾸 '친명 후보'로 위상을 축소하시는 것 같아 안타깝습니다.", "저 자신이 그 계파 정치의 피해자입니다. 계파에 낄 틈조차 주지 않았던 저를, 이제 와서 온갖 상상으로 계파에 소속시켜 주십니다. 그간의 상처가 떠올라 쓰립니다. 청년에게 계파가 어디 있습니까. 대한민국의 모든 청년은 계파가 없습니다. 18~29세의 절반 가까이가 무당파입니다. 기득권이 장벽을 쳐놓고 청년들은 오지 말라고 해놓고, 이제 와서 '누구 라인이냐'를 따지는 것 자체가 계파 정치입니다. 정치 13년째에 있지도 않은 족보를 발급받아 보기는 처음입니다. 사진 한 장으로 계파를 판정하는 것 — 저는 이것을 '흥신소 정치'라고 부릅니다. 저를 계파 어디에 넣을지 고민하지 마시고, 부디 제 공약을 검증해 주십시오. 저는 계파에 줄 선 적 없습니다. 국민께 줄 서서 여기까지 왔습니다.", "적통이 혈통입니까, 인맥입니까. 민주당의 적통은 계란으로 바위를 쳤던 김대중·노무현의 도전 정신입니다. 저는 그 도전의 적통을 잇겠습니다. 정견발표에서 선배 후보들께 드린 말씀 그대로입니다. 그만 싸우십시오. 힘을 합쳐야 다음 대선에서 이깁니다. 재집권에 실패한다면 다시 계엄입니다. 전당대회는 비전과 실력으로 경쟁해 국민께 '이 후보도 저 후보도 훌륭하다'는 기분 좋은 고민을 드리는, 승자도 패자도 함께 빛나는 싱어게인 같은 자리여야 합니다. 끝까지 살아남아, 쫄지 않고 여러분의 목소리를 전달하겠습니다."], "quotes": [["박동완 통화 원워딩(7.21 12:38)", "친명과 친청의 대결로 가고 있다. 바람직하지 않다. 과거냐 미래냐를 가지고 싸워야지, 적통 논쟁·누가 친하냐·묘소 갔냐 안 갔냐 가지고 싸우는 게 말이 되냐"], ["박동완 통화 원워딩(7.21 12:38)", "나는 김민석 후보가 적어도 친청·친명 논쟁에 휘말리지 않고 선거를 할 줄 알았다. 민주당은 그렇게 하지 않으면 미래가 없기 때문인데, 자기를 자꾸 친명 후보로 위상을 축소하는 것 같다"], ["페이스북 '흥신소 정치' 게시글(후보 등록 직후·전문)", "계파에 낄 틈조차 주지 않았던 저를, 이제 와서 온갖 상상으로 계파에 소속시켜 주십니다. 그간의 상처가 떠올라 쓰립니다. 청년에게 계파가 어디 있습니까? 대한민국의 모든 청년은 계파가 없습니다. 18~29세의 절반 가까이가 무당파입니다. 기득권이 장벽을 쳐놓고 청년들은 오지 말라고 해놓고, 이제 와서 누구 라인이냐를 따지는 것 자체가 계파 정치입니다. 대한민국과 민주당을 말아먹은 것이 계파 정치입니다. 저를 계파 어디에 넣을지 고민하지 마시고, 부디 제 공약을 검증해주십시오. 정치를 시작한 지 13년째, 있지도 않은 족보를 발급받아 보기는 처음이라 놀랍습니다. 지난 의장 시절, 영장도 없이 차량을 털리고, 수개월 경찰조사 끝에 무혐의를 받고도 허위사실을 게재한 언론에 조리돌림당하며 억울해서 죽고 싶었을 때의 심정과 똑같습니다. 그래서 더욱, 후보 등록을 해야겠다고 생각했습니다. 저는 계파에 줄 선 적 없습니다. 국민께 줄 서서 여기까지 왔습니다. 끝까지 살아남아 목소리를 내겠습니다. 지금까지 그랬듯, 쫄지 않고 여러분의 목소리를 전달하겠습니다."], ["7.21 서울시의회 정견발표", "그만 싸우십시오. 친석 친청이니 나눌 때가 아닙니다. 힘을 합쳐야 다음 대선에서 이깁니다. 재집권에 실패한다면 다시 계엄입니다"], ["새 성명(7.21) '무엇을 위해 다투는가'", "원조라는 글자가 안 들어간 가게가 없는 신당동 떡볶이골목이 생각납니다. 내가 김대중과 친했다, 니가 노무현을 배신하지 않았냐 … 언제까지 이런 족보 정치를 계속할 겁니까. 청년들은 686 삼인방의 족보에 아무 관심이 없습니다"]], "notes": ["김민석 비판은 통화 지시 수위 그대로 '아쉬움' 톤 — 공격이 아니라 기대와 실망 프레임", "이해찬 전 총리 배우자 후원회장 건: '고인은 당의 큰 어른, 유족의 선택은 존중' 먼저", "'족보 발급' 대목은 웃음기 없이 — 의장 시절 표적 수사(전 건 무혐의·손배 승소) 서사와 연결하면 '검증된 억울함'으로 힘이 실림", "무당파 수치(18~29세 절반)는 페이스북 게시글 근거 그대로 사용"], "warn": "'자기 정치' 비판이 본인에게 오면: '나는 누구를 위해 나온 후보가 아니다 — 청년의 목소리를 가감 없이 대변하러 나왔다'.", "media": "한겨레", "label": "H5"}, {"no": 306, "part": 6, "q": "차기 여당의 당대표는 어떤 역할을 해야 한다고 보나.", "tags": ["이재명", "재집권", "젊은정당", "임명직최고위원", "AI", "기후위기", "3대메가프로젝트", "지방의원"], "script": ["차기 여당 당대표의 제1 임무는 이재명 정부를 성공시키고 재집권의 토대를 만드는 것입니다. 다만 방법이 중요합니다. 박수만 치는 여당은 대통령을 고립시키고, 할 말 하는 여당이 대통령을 성공시킵니다. 과거에 발목 잡힌 정당이 아니라, 미래 의제를 대통령보다 한발 앞서 준비하는 정당이어야 합니다.", "첫째, 당을 젊은 정당으로 바꿔야 합니다. 청년이 실제로 결정권을 행사하게 해야 합니다. 저는 당대표가 되면 임명직 최고위원 두 자리를 전부 청년으로 임명하겠습니다. 청년 관련 정책은 당 청년위원회가 결정하도록 하겠습니다. 이것이 말이 아닌 권한의 세대교체입니다.", "둘째, 미래 아젠다의 주도자여야 합니다. AI 대전환, 기후위기, 반도체 — 이재명 대통령의 3대 메가프로젝트와 호남 반도체 800조 투자를 당이 온몸으로 뒷받침해 성공시켜야 합니다. 과거의 훈장이 아니라 미래의 설계도를 가진 정당으로 바꾸는 것이 당대표의 일입니다.", "셋째, 공정한 룰의 관리자입니다. 다음 총선 공천이 차기 당대표 손에 있습니다. 경선 룰 6개월 전 확정, 결과 전면 공개, 상향식 공천 — 룰을 세우고 예외를 만들지 않아야 총선을 이깁니다. 넷째, 현장과 중앙을 잇는 다리입니다. 지방의원은 동원의 대상이 아니라 당의 주인입니다. 당 최고 의사결정 단위에 지방의원 몫을 보장하고, 서울시의회를 비롯한 지방의회의 입법 과제를 당론으로 뒷받침하겠습니다. 8년 지방의원의 삶을 산 제가 그 다리가 되겠습니다."], "quotes": [["박동완 통화 원워딩(7.21 12:38)", "당을 젊은 정당으로 바꿔야 된다. 청년들이 결정권을 행사할 수 있도록 해야 된다. 나는 임명직 최고위원 두 명 전부 청년으로 앉힐 생각이다. 청년 관련 정책은 당 청년위원회가 결정하도록 할 생각이다"], ["박동완 통화 원워딩(7.21 12:38)", "AI나 기후 위기라든지 미래 아젠다 — 반도체니 3대 메가 프로젝트 뒷받침해야 되고, 미래 의제를 대통령보다 앞서서 해야 된다"], ["캠프 확정 멘트", "대통령을 가장 잘 돕는 당대표 / 박수만 치는 여당은 대통령을 고립시키고, 할 말 하는 여당이 대통령을 성공시킵니다"], ["7.21 서울시의회 정견발표", "지방의원은 동원의 대상이 아니라 당의 주인입니다 … 현장의 목소리가 국회와 정부에 곧바로 닿도록 제가 다리가 되겠습니다"]], "notes": ["'임명직 최고위원 2석 전원 청년'은 7.21 통화 확정 신규 공약 — 이번 인터뷰에서 처음 공개하는 뉴스포인트로 활용 가능", "유시민 '필연적 실패' 논쟁으로 이어지면: '실패를 예언하러 나온 사람이 아니라 성공시키러 나온 사람'"], "warn": null, "media": "한겨레", "label": "H6"}, {"no": 307, "part": 6, "q": "왜 다른 사람이 아닌 김보미가 당대표가 돼야 하는가.", "tags": ["유일한후보", "계파없음", "신세진사람", "의정성과", "노무현2%", "계란과바위", "청년정당"], "script": ["다른 후보들도 모두 청년 정책을 말합니다. 그런데 하나도 실현되지 않고 있습니다. 수십 년 동안 당의 주인이었으면서 지금까지도 안 해 놓고, 이제 와서 하겠다는 것이 말이 됩니까. 청년 정당은 청년이 만들 수 있습니다. 벼랑 끝 청년의 삶을 직접 살아 본 사람이 만들 수 있습니다.", "그리고 이것을 꼭 말씀드리고 싶습니다. 신세 진 사람, 챙겨줄 사람이 너무 많은 사람은 절대 개혁을 못 합니다. 측근을 챙겨줘야 하는데 청년최고위원에게 줄 자리가 어디 있겠습니까. 민주당의 모든 문제는 실력보다 의리와 인맥을 앞세우는 데서 나옵니다. 신세 진 사람, 챙겨야 할 사람이 많으니 불공정과 반민주가 당헌이 되고 만 것입니다. 저 김보미는 챙겨줄 사람도, 신세 진 사람도 없습니다. 그래서 거침없이, 눈치 보지 않고 개혁할 수 있는 유일한 후보입니다.", "저는 유일한 풀뿌리 평당원 후보이고, 686은 모르는 보통 국민의 삶을 사는 유일한 후보이기도 합니다. 정치 13년, 의정 8년, 전국 최연소 기초의회 의장. 말이 아니라 결과로 증명했습니다. 업무추진비 전면 공개, 사상 최초 일문일답 군정질문, 역대 최대 108억 원 낭비예산 삭감, 전남 최초 육아양육수당, 8년 연속 의정활동비 전액 기탁. 표적 징계와 100여 건의 허위 보도를 겪었지만 수사는 전 건 혐의없음으로 종결됐고 손해배상 소송에서 승소했습니다.", "첫 여론조사 2%로 시작했습니다. 2002년 노무현 후보의 경선 초기 지지율도 바로 2%였습니다. 2%는 절망의 숫자가 아니라 희망이 출발하는 숫자입니다. 저는 약한 계란입니다. 그러나 계란은 생명을 품고 있습니다. 끝까지 바위를 두드려 결국 금을 내겠습니다."], "quotes": [["박동완 통화 원워딩(7.21 12:38)", "본인이, 청년이 청년 정당을 만들 수 있다. 지금까지도 안 해 놓고 이제서 하겠다는 게 말이 되냐"], ["박동완 통화 원워딩(7.21 12:38)", "신세 진 사람이 너무 많아서 챙겨 줄 사람이 너무 많은 사람들은 절대 개혁을 못 한다. 자기 측근 챙겨 줘야 되는데 청년 최고위원한테 줄 자리가 어디 있냐. 김보미는 챙겨 줄 사람도 없고 신세 진 사람도 없다 → 거침없이, 눈치 보지 않고 개혁을 할 수 있다"], ["7.20 합동연설회 연설문(최종)", "신세 진 사람, 챙겨야 할 사람이 많으니 불공정과 반민주가 당헌이 되고 말았습니다. 686 세 후보로는 개혁이 안 됩니다"], ["게시글(7.19)", "2002년 노무현 후보의 초기 지지율이 몇 %였는지 기억하십니까? 바로 2%였습니다"], ["캠프 확정 멘트(클로징)", "저는 약한 계란입니다. 계란은 생명을 품고 있습니다. 끝까지 바위를 두드려 결국 금을 내겠습니다"]], "notes": ["통화 금지 지시: '나밖에, 나 혼자밖에 없다' 식 고립·자만 표현 금지 — '유일한 후보' 프레임까지만", "숫자 3종: 2% / 108억 / 13년·8년 · 나이는 '만 36세' 통일", "마무리 어깨걸이 가능: '자세한 건 김보미닷컴에…'"], "warn": null, "media": "한겨레", "label": "H7"}, {"no": 308, "part": 6, "q": "현행 예비경선 컷오프 제도에 대해 어떻게 평가하나. 만약 최종 3인에 들지 못한다면 당에서 구체적으로 어떤 역할을 할 생각인가.", "tags": ["컷오프", "선호투표", "재창당", "완주", "승복", "세대교체", "중꺾마"], "script": ["다섯 명밖에 출마하지 않았는데 왜 컷오프를 합니까. 당헌에도 컷오프를 '할 수 있다'고 되어 있지, 반드시 3명으로 잘라야 한다고 되어 있지 않습니다. 게다가 선호투표제를 도입했으면 표가 갈릴 걱정도 없는데 왜 자릅니까. 결국 청년에게는 마이크를 쥐여주지 않겠다는 것 아닙니까. 청년 정치를 하겠다면서 청년을 출발선에도 세우지 않겠다는 것입니다. 그래서 저는 컷오프 폐기, 다섯 후보 모두 본선행을 요구하며 서명운동까지 벌였습니다.", "백보 양보해 컷오프를 하더라도 방식이 이래서는 안 됩니다. 후보가 10명씩 나와서 추린다면 최소 2~3주는 선거운동을 보장해야 합니다. 그런데 달랑 동영상 하나 찍어 연설이라 하고, 당원들 앞 대면 연설 한 번, 토론회 한 번 없이 자릅니다. 이런 식의 경선으로는 민주당에 청년이 설 자리가 없습니다. 그러면 2030은 다 떠나고, 총선도 대선도 반드시 집니다. 이것부터 뜯어고쳐야 합니다.", "3인에 들지 못한다면 어떻게 할 것이냐. 저는 꼭 본선에 가겠습니다. 686끼리 하는 경선이 당원들께 무슨 감동이 있겠습니까. 청년 한 명은 세워야 한다고, 당원들께서 김보미를 본선에 보내주실 것으로 믿습니다. 그러나 만약 아쉽게 탈락한다면, 제가 무엇을 할지는 분명합니다. 끝까지 세대교체를 위해 온몸을 바치겠습니다. 민주당이 586 꼰대 정당이라는 소리를 듣는 정당에서, 공정과 청년과 미래가 있는 정당으로 — 재창당 수준으로 다시 태어날 때까지 싸우겠습니다.", "저는 이미 그렇게 살아왔습니다. 강진군수 경선에서 떨어졌을 때도 결과에 승복하고, 선거 때 약속한 공약을 모른 척하지 않고 지역에서 하나하나 실천했습니다. 이번에도 마찬가지입니다. 구체적으로 세 가지입니다. 첫째, 유리상자 경선·당원 명부 전수조사·경선 데이터 전면 공개가 당헌·당규에 반영될 때까지 당 안에서 계속 요구하겠습니다. 둘째, 당내 부당지시·입틀막 제보센터처럼 평당원·청년·지방의원의 목소리를 조직하고 방패가 되겠습니다. 셋째, 저를 지지해 주신 당원·국민들과 함께 다음 청년이 도전할 길을 닦겠습니다. 중요한 것은 꺾이지 않는 마음입니다."], "quotes": [["박동완 통화 원워딩(7.21 12:38)", "5명밖에 출마 안 했는데 왜 컷오프를 합니까. 청년들한테는 마이크를 쥐어 주지 않겠다는 것 아니냐. 당헌에도 '할 수 있다'고 되어 있지 3명으로 잘라야 된다고 되어 있지 않습니다. 컷오프를 하려면 최소한 2~3주는 선거운동을 보장해 줘야지, 달랑 동영상 하나 찍고 연설이랍시고, 토론회 한 번·대면 연설 한 번 없는 경선이 말이 되냐. 2030 다 떠날 거고 총선 대선 반드시 진다"], ["박동완 통화 원워딩(7.21 12:38)", "끝까지 세대교체를 위해서 온몸을 바칠 겁니다. 꼰대 정당에서 공정과 청년과 미래가 있는 정당으로 재창당 수준으로 바뀔 때까지 — '재창당'이라는 말을 써야 돼요. 군수 경선에서는 떨어졌지만 약속한 것을 하고 있다, 마찬가지다. 만약에 아쉽게 탈락한다면 이렇게 이렇게 할 생각이다, 이렇게 해야죠"], ["긴급 서명운동(김보미.com)", "①최고위원회 해체 ②밀실 컷오프 폐기 — 다섯 후보 모두 본선으로 ③청년최고위원제 도입"], ["김보미는(홈페이지·2026 승복)", "경선 결과를 겸허히 받아들입니다 — 억울함을 삼키고 당 후보들의 본선 승리를 도왔습니다"]], "notes": ["통화 지시: 탈락 시 답변은 '추상적 계란-바위'로 끝내지 말고, 앞으로 무슨 활동을 할지 예상 가능하게 구체적으로 — 재창당 키워드 필수", "일정 확정: 예비경선 투표 7.21~23(당대표: 중앙위원 35%·권리당원 35%·국민여론조사 30%), 결과 발표 7.23 — 인터뷰 시점(21일 14:00)엔 결과 없음. '지금 투표가 진행 중입니다. 권리당원 여러분께서 판단해 주실 것'으로 받기", "가처분은 '당헌 위반 강행 시' 조건부 표현 유지"], "warn": "'탈락 전제' 유도에 말리지 말 것 — '꼭 본선에 간다' 먼저, 그다음 가정 답변.", "media": "한겨레", "label": "H8"}, {"no": 309, "part": 6, "media": "한겨레", "label": "H9", "q": "[마무리] 인터뷰 클로징 멘트 — 예시 3개 (상황별 선택)", "tags": ["클로징", "재창당", "계란과바위", "노무현2%", "중꺾마", "김보미닷컴", "호남엔딩", "본경선진출"], "script": ["【예시 1 · 기본형(재창당 + 계란 클로징)】 마지막으로 이 말씀을 드리고 싶습니다. 저는 민주당을 흔들러 나온 사람이 아니라, 살리러 나온 사람입니다. 공정과 청년과 미래가 있는 정당으로, 재창당 수준으로 다시 태어날 때까지 멈추지 않겠습니다. 저는 약한 계란입니다. 그러나 계란은 생명을 품고 있습니다. 끝까지 바위를 두드려 결국 금을 내겠습니다. 김채운 기자님, 그리고 한겨레 독자 여러분, 서른여섯 평당원의 도전을 끝까지 지켜봐 주십시오. 감사합니다.", "【예시 2 · 청년 응원형(2% 서사로 맺을 때)】 끝으로 이 인터뷰를 읽으실 청년들께 한마디만 드리겠습니다. 어제 불합격 통보를 받고 오늘 새로운 입사지원서를 쓰고 계신 분들, 저도 첫 여론조사 2%에서 시작했습니다. 2002년 노무현 후보의 경선 초기 지지율도 바로 2%였습니다. 2%는 절망의 숫자가 아니라 희망이 출발하는 숫자입니다. 우리, 꺾이지 맙시다. 저 김보미가 앞에서 두드리겠습니다. 감사합니다.", "【예시 3 · 오늘 하루 수미상관형(고함 사건으로 시작했을 때)】 오늘 하루를 돌아보면, 아침에는 고함을 들었고, 낮에는 이렇게 제 이야기를 들어주시는 분을 만났습니다. 저는 이것이 민주당의 오늘과 내일이라고 생각합니다. 호통치는 정당에서 경청하는 정당으로 — 그 전환을 제가 해내겠습니다. 오늘 컷오프 결과가 어떻게 나오든, 저 김보미는 끝까지 세대교체를 위해 온몸을 바치겠습니다. 시간 내주셔서 감사합니다. 아, 그리고 더 궁금하신 것은 김보미닷컴에 다 있습니다. 계란으로 바위 깨는 게임도 하나 있고요.", "【예시 4 · 호남 엔딩형(호남 매체·호남 독자 대상일 때)】 민주당이 살아야 호남이 살고, 호남이 살아야 대한민국이 살고, 대한민국이 살아야 청년이 삽니다. 저 김보미를 민주당 당대표 본경선에 꼭 진출시켜 주십시오. 686 세 명으로 하는 경선은 민주당의 몰락을 이끌 뿐입니다. 그런 경선으로는 총선도 대선도 절대 이길 수 없습니다. 가장 현명하신 전남·광주의 힘을 보여주십시오. 서울에서 호남을 이용하려는 정치인이 아니라, 호남에 살며 호남과 운명을 같이할 사람을 꼭 본경선에 올려 주십시오. 저는 약한 계란이지만, 끝까지 바위를 두드려 금을 내겠습니다. 감사합니다."], "quotes": [["캠프 확정 멘트(클로징)", "저는 약한 계란입니다. 계란은 생명을 품고 있습니다. 끝까지 바위를 두드려 결국 금을 내겠습니다 + 김보미닷컴"], ["캠프 확정 멘트(어깨걸이)", "자세한 건 김보미닷컴에 계란 게임 하나 있는데요… (고정 멘트)"], ["박동완 통화 원워딩(7.21 12:38)", "끝까지 세대교체를 위해서 온몸을 바칠 겁니다 … 재창당 수준으로 바뀔 때까지 — '재창당'이라는 말을 써야 돼요"], ["게시글(7.19)", "2%는 끝이 아니라 시작입니다. 2%는 절망의 숫자가 아니라, 희망이 출발하는 숫자입니다"]], "notes": ["예시 3의 김보미닷컴 어깨걸이는 분위기가 좋을 때만 — 딱딱하게 끝난 인터뷰면 생략", "클로징에 '재창당' 키워드 1회 이상 포함(7.21 통화 지시)", "인터뷰가 고함 사건 중심으로 흘렀으면 예시 3(수미상관), 청년·공정 중심이면 예시 2, 무난하면 예시 1", "예시 4(호남 엔딩형)는 광주·전남 매체이거나 호남 독자 비중이 클 때 — '전남·광주의 힘' 직접 호소가 강력"], "warn": "클로징에서 새 논쟁거리(특정인 비판)를 꺼내지 말 것 — 마지막 인상은 '단단함과 희망'으로."}], "ARTICLES": [["오마이뉴스", "\"민주당에 공정이 없다\" 86세대 직격, 당대표 후보 l", ["방송기록", "김어준", "뉴스공장", "확정멘트"], "출연 14건 시간순 기록 + 방송별 발언 일관성 체크(확정 멘트) + 다음 출연 전략 — 뉴스공장 여론 관리 지침 포함"], ["도구", "🔍 나라살림 돋보기 — 우리동네 예산 3초 확인", "https://www.xn--4k0b53xuva.com/narasalim.html", ["나라살림돋보기", "예산"], "243개 지자체+중앙정부 예산 — 실력 증명용 시연 가능"]], "ISSUES": [["🆕 [7.22 오늘] 대통령 지지율 48.4% 하락 · 민주 43.1% vs 국힘 40.0% 초박빙 — '계파 공방 후폭풍'", "리얼미터(7.20 발표): 이재명 대통령 국정 긍정평가 48.4%로 하락, 민주당 43.1%·국민의힘 40.0% 초박빙. 언론들은 전당대회가 정책 경쟁 대신 계파 공방(명청대전·적통논쟁)으로 흐른 후폭풍으로 분석. 당권투쟁 격화에 대통령이 잇단 경고.", "보십시오. 계파 싸움의 대가를 지금 숫자가 보여주고 있습니다. 전당대회가 정책 경쟁이 아니라 족보 경쟁·명청대전으로 흐르니 대통령 지지율이 떨어지고 국민의힘이 코앞까지 쫓아왔습니다. 제가 말씀드렸지 않습니까 — 그만 싸우십시오. 정책이 족보를 이겨야 합니다. 재집권에 실패하면 다시 계엄입니다. 이 와중에 유일하게 정책과 공약으로 경쟁하는 후보가 누구인지 봐 주십시오.", ["지지율하락", "명청대전", "계파", "족보정치", "재집권", "돌발이슈"], "https://www.fnnews.com/news/202607200812212775"], ["🆕 [7.21~22] 정청래 '집토끼' vs 김민석 '명청대전 끝내야' — 본선 구도 공방", "컷오프 국면에서 정청래 후보는 '집토끼(강성 지지층)가 집을 나가면 무망하다'며 결집 호소, 김민석 후보는 '명청대전을 끝내야 한다'며 당청 단합 강조. 송영길 후보는 정청래의 당청 갈등을 공격. 본선은 '정청래 대 비(非)청' 구도 전망.", "집토끼 산토끼 얘기가 아니라, 지금 토끼장이 무너지고 있습니다. 2030이 떠나고 무당층이 절반인데 집토끼만 붙잡으면 총선을 이깁니까? 명청대전을 끝내자는 말엔 동의합니다. 그런데 끝내는 방법은 686끼리 자리를 나누는 게 아니라 세대교체입니다. 계파의 언어(집토끼·적통·명청)가 아니라 미래의 언어(AI·일자리·청년)로 경쟁합시다.", ["집토끼", "명청대전", "세대교체", "무당층", "2030", "돌발이슈"], "https://www.sedaily.com/article/20069701"], ["🆕 [7.22 오늘] 예비경선 마지막 날 — 오늘·내일 3인 확정", "당대표 예비경선 당원투표가 오늘까지 진행(중앙위원 35%·권리당원 35%·국민여론조사 30%), 7.23 국회 의원회관에서 5→3인 결과 발표. 김보미는 원외·최연소 후보로 컷오프 통과가 최대 관문.", "오늘이 고비입니다. 하지만 저는 결과에 연연하지 않습니다. 선호투표제를 도입했으면 컷오프 자체가 필요 없습니다. 표가 갈릴 걱정이 없는데 왜 청년의 입을 막습니까. 3인에 들든 안 들든 저는 8월 17일 대전까지 완주하고, '김보미가 길을 열었다'는 말을 남기겠습니다.", ["예비경선", "컷오프", "선호투표", "완주", "본경선진출", "돌발이슈"], "https://www.fnnews.com/news/202607190601535786"], ["🆕 [7.21 어제] 송영길 후보, 서울시의회 의장실서 고함", "7.21 서울시의회 의장 접견 자리(의장·의원·직원 배석)에서 송영길 후보가 김보미의 페이스북 게시글(출마자격 예외 비판)을 두고 고함. 별도 통화 요청에도 호통 지속. 김보미는 정견발표에서 공개 사과를 요구했으나 사과는 없었음.", "여러 사람 앞에서 고함치며 윽박지르는 건 인격 무시입니다. 저도 당대표 후보입니다. 존중해 주십시오. 공개적으로 고함치셨으니 저도 공개적으로 사과를 요구한 겁니다. 저는 '사람'이 아니라 '과정의 불공정'을 지적했을 뿐입니다. 손흥민도 반칙하면 레드카드를 받습니다.", ["고함사건", "송영길김용", "공정", "레드카드", "돌발이슈"], "https://www.facebook.com/kimbomi1989"], ["🆕 [7.21 어제] 기탁금 감액 확정 — 당대표 8천·최고위 3천", "당 선관위, 당대표 1억→8,000만·최고위원 5,000만→3,000만 확정. 청년 50% 감면 유지(청년 최고위원 2,500만→1,500만). '투개표 비용은 후보자 부담'이라는 입장 유지.", "안 내리는 것보다 낫지만 원상복귀가 아닙니다. 이재명 대표 시절의 정확히 두 배입니다. 게다가 등록은 이미 끝났고, 저는 등록 당일 다섯 군데서 빌렸습니다. 투개표는 정당 민주주의의 기본 비용인데 후보 지갑에 떠넘기면 돈 있는 사람만 나오는 정당이 됩니다. 답은 찔끔 감액이 아니라 당직선거 공영제입니다.", ["기탁금감액", "기탁금", "공영제", "투개표비용", "돌발이슈"], "https://www.fnnews.com/news/202607211232402474"], ["🆕 [7.22 지역] 전남·광주 통합특별시(7.1 출범) — 무안청사 기능 강화 논란", "7.1 통합특별시 출범. 동부·무안·광주 3청사 중 서부권 단체장들이 무안 청사 기능 강화를 요구. 반도체 공장이 광주 군공항 부지로 결정되며 '광주 쏠림·전남 낙후' 우려 확산.", "통합은 한쪽이 커지고 다른 쪽이 작아지면 안 됩니다. '함께 커지는 통합'이어야 합니다. 서부권의 무안 청사 강화 요구는 타당합니다. 농업·수산·해양·섬 정책·균형발전·지방소멸 대응처럼 전남의 미래를 책임지는 기능은 무안 청사에 집중 배치해야 합니다.", ["통합특별시", "무안청사", "균형발전", "지방소멸", "호남", "돌발이슈"], "https://www.xn--4k0b53xuva.com/"], ["🆕 [최근] 여고생 살해사건 계기 — 보완수사권 존폐 재점화", "여고생 살해범 사건 이후 검찰 보완수사권 폐지 존폐 논란 확산. 민주당은 의총에서 결론을 못 냄. 여성단체는 완전 폐지 시 피해자 보호 공백 우려.", "검찰개혁, 안 하자는 게 아니라 완성하자는 겁니다. 칼은 뺏어도 좋지만 선까지 자를 일은 아닙니다. 검·경이 서로 견제해야 정치검찰도 경찰 독주도 막습니다. 무엇보다 피해자 보호 공백은 절대 안 됩니다. 속도보다 방향, 국민 안전이 먼저입니다.", ["보완수사권", "검찰개혁", "피해자보호", "돌발이슈"], "https://www.lawtimes.co.kr/news/articleView.html?idxno=223389"], ["🆕 [최근] 정청래 '개혁법안 27% 처리' — 대통령과 엇박자 논란", "김보미는 무등의아침 대비에서 '정청래 후보가 당대표 시절 정부 요구 개혁법안을 27%밖에 통과시키지 않았다'며 대통령과의 엇박자를 지적. 800조 반도체 '자기정치 이용'·'전북 소외론' 갈라치기 비판과 연결.", "국가 비전이 발표됐으면 온몸을 바쳐 성공시켜야지 자기 선거에 이용하면 안 됩니다. 대통령과 엇박자만 내고 개혁법안도 27%밖에 처리 안 한 분이 무슨 3대 메가프로젝트를 성사시킵니까. 호남 반도체 800조, 제가 하나하나 뒷받침하겠습니다.", ["정청래", "메가프로젝트", "반도체800조", "호남", "책임정치", "돌발이슈"], "https://www.xn--4k0b53xuva.com/vision.html?post=pmrqh15wvgxyr"], ["🆕 [여론] 김민석 22.4 vs 정청래 20.5 오차범위 접전 — 김보미 0.6%(RDD 2.9%)", "여론조사꽃(7.17~18, 전화면접) 당대표 적합도: 김민석 22.4%·정청래 20.5%(접전)·송영길 8.2%·고민정 2.5%·김보미 0.6%·적합인물 없음 38.2%. 별도 RDD 조사에선 김보미 2.9%, 18~29세 남성 6.5%(전체 3위), 진보층 고민정과 3.9% 동률.", "숫자는 작아도 방향은 분명합니다. 무당층에선 '김보미' 아니면 '없음' 둘 중 하나였습니다. 20대 남성 6.5%로 전체 3위입니다. 기존 민주당이 못 데려오던 표를 데려올 외연 확장 카드가 누구인지 데이터가 증명했습니다. 적합인물 '없음' 38%가 바로 세대교체의 갈증입니다.", ["여론조사", "무당층", "2030", "돌발이슈", "김민석", "정청래"], "https://www.xn--4k0b53xuva.com/"], ["기탁금 감액 결정 (7.21 당 선관위)", "중앙당선관위(임호선 부위원장), 당대표 1억→8,000만·최고위원 5,000만→3,000만 확정. 청년 50% 감면 유지(청년 최고위원 2,500만→1,500만), 원외 장애인 50% 감면 신규. '과도 부담 지적에 2020~2022년 기준'·'투개표 비용은 후보자 부담이 맞다'는 입장.", "안 내리는 것보다는 낫습니다. 그러나 원상복귀가 아닙니다. 이재명 대표 시절의 정확히 두 배입니다. 그리고 등록은 이미 끝났습니다 — 저는 등록 당일 다섯 군데서 빌렸습니다. 투개표는 정당 민주주의의 기본 비용입니다. 후보 지갑에 떠넘기면 돈 있는 사람만 출마하는 정당이 됩니다. 답은 찔끔 감액이 아니라 당직선거 공영제입니다.", ["기탁금감액", "투개표비용", "공영제", "기탁금"], "https://www.fnnews.com/news/202607211232402474"], ["송영길 후보 공개 석상 고함 (7.21 서울시의회 의장실)", "의장·의원·의회사무과 직원 배석 접견 자리에서 송영길 후보가 김보미 후보의 페이스북 게시글(출마자격 예외 비판)을 두고 고함. 별도 통화 요청에도 호통 지속. 김 후보는 정견발표에서 공개 사과를 요구했으나 끝내 사과 없음.", "저는 사람이 아니라 '과정의 불공정'을 지적했습니다. 손흥민도 반칙하면 레드카드를 받습니다. 섭섭하실 수는 있지만 여러 사람 앞에서 고함치며 윽박지르는 것은 인격무시 행위입니다. 공개적으로 고함치셨으니 저도 공개적으로 사과를 요구한 것입니다. 저도 당대표 후보입니다. 존중해 주십시오.", ["고함사건", "송영길김용", "공정"], "https://www.facebook.com/kimbomi1989"], ["예비경선 투표 시작 (7.21~23, 5→3인) — 오늘부터 당원투표", "당대표 예비경선: 중앙위원 35%·권리당원 35%·국민여론조사 30%, 결과 발표 7.23 국회 의원회관. 최고위원은 14→8인(중앙위원 50%·권리당원 50%).", "선호투표제를 도입했으면 컷오프는 안 됩니다. 표가 갈릴 걱정이 없는데 왜 자릅니까. 청년의 입을 막는 '청년 컷오프' 하지 말고 5인 모두 본선에서 겨룹시다. 그리고 저는 끝장을 봅니다. 8월 17일 대전까지 완주합니다.", ["컷오프", "선호투표", "완주"], "https://www.fnnews.com/news/202607190601535786"], ["선호투표제 확정 (7.14 최고위→7.15 당무위)", "1인 1표 선호투표제로 본선 진행 확정.", "방향은 환영합니다. 이제 순위별 득표 데이터 전면 공개로 완성하십시오. 공개 못 할 이유가 없지 않습니까. 그리고 선호투표와 컷오프는 양립할 수 없습니다.", ["선호투표", "1인1표", "유리상자"], "https://www.newspim.com/news/view/20260714000314"], ["청년최고위원 분리선출안 최고위 부결", "전준위 전원일치 결의에도 최고위가 부결. 계파 간 '선호투표제와 거래' 의혹 시각.", "거래로 보인다면 그게 계파 정치의 민낯입니다. 청년의 자리가 협상 카드로 쓰인 겁니다. 저는 취임 당일 1호 안건으로 발의해 30일 안에 개정을 완료하겠다고 문서로 약속했습니다.", ["청년최고위원", "계파", "공개질의답변"], "https://www.sedaily.com/article/20067716"], ["송영길·김용 후보자격 예외 인정", "복당 6개월 미달·당비 미납에도 최고위 의결·당무위로 구제. 박지현 사례와 이중잣대 논란 확산.", "청년 박지현은 서류 접수조차 거부당했고, 686 송영길은 밤 10시 반 긴급 최고위로 구제됐습니다. 손흥민도 반칙하면 레드카드를 받습니다. 규칙보다 사람이 우선하는 순간 민주주의는 무너집니다. 당헌 위반 강행 시 가처분을 포함해 대응합니다.", ["송영길김용", "박지현", "공정", "가처분"], "https://www.hankookilbo.com/news/article/A2026071709110001619"], ["기탁금 인상 + 대통령 '원상복귀' 주문", "예비경선 2,000만(청년 50% 감면), 본경선 5,000만으로 인상. 이재명 대통령이 인하 주문 — 일각 '당무개입' 논란.", "저는 그 1,000만 원이 없어서 등록 당일 다섯 군데서 빌렸습니다. 대통령 말씀은 당연한 것이고, 그 당연한 말을 대통령이 해야 할 만큼 지도부가 거꾸로 간 게 문제입니다. 이게 어떻게 당무개입입니까. 당직선거 공영제로 갑시다.", ["기탁금", "공영제", "이재명"], "https://www.xn--4k0b53xuva.com/manifesto.html"], ["이재명 대통령 X 팔로우 화제", "X 계정 개설 하루 만에 대통령이 팔로우 — '낙점설' 해석 유통.", "대통령께서 청년 평당원의 목소리를 지켜봐 주신다면 감사한 일입니다. 하지만 저는 누구의 선택이 아니라 당원의 선택으로 여기까지 왔습니다. 저는 누구의 똘마니도 아닙니다.", ["X팔로우", "낙점", "이재명"], "https://www.khan.co.kr/article/202607171426011/"], ["신천지 조직적 유입 의혹", "특정 후보 지원 목적의 조직 입당 의혹 제기 — 당 차원 대응 없음.", "의혹이 사실이라면 자신의 투표권을 대리인에게 넘긴 명백한 불법 당원입니다. 불법당원 전수조사하고 모두 솎아내고 경선해야 합니다. 단정이 아니라 검증을 요구하는 겁니다.", ["신천지", "유령당원", "1인1표"], "https://www.xn--4k0b53xuva.com/manifesto.html"], ["조국혁신당 합당론", "당 안팎에서 합당 논의 부상.", "거꾸로 여쭙고 싶습니다. 당원이 빠진 합당 논의가 무슨 의미가 있습니까. 욕심보따리부터 내려놓아야 합니다.", ["조국혁신당", "합당"], "https://www.xn--4k0b53xuva.com/"], ["'적통' 논쟁 — 이해찬 전 총리 배우자, 정청래 후원회장", "적통 마케팅 가열 전망.", "고인은 당의 큰 어른이셨고 유족의 선택은 존중합니다. 다만 적통이 혈통입니까, 인맥입니까. 민주당의 적통은 계란으로 바위를 쳤던 김대중·노무현의 도전 정신입니다. 저는 그 도전의 적통을 잇겠습니다.", ["적통논쟁", "정청래", "계파"], "https://www.xn--4k0b53xuva.com/manifesto.html"], ["유시민 '필연적 실패의 길' 발언", "이재명 정부의 검찰개혁 의지 비판.", "쓴소리는 경청해야 합니다. 다만 저는 정부의 실패를 예언하러 나온 사람이 아니라 성공시키러 나온 사람입니다. 계파 싸움으로 발목 잡는 민주당이야말로 필연적 실패의 길입니다. 당을 바꿔야 정부가 성공합니다.", ["유시민", "이재명", "검찰개혁"], "https://www.xn--4k0b53xuva.com/"], ["보완수사권·검찰개혁 '8.17 전 처리' 방침", "당론안: 형소법 196조 삭제+보완수사요구권 유지. 여성단체, 완전 폐지 우려.", "안 하자는 게 아니라 완성하자는 겁니다. 칼은 뺏어도 좋습니다. 그러나 선까지 자를 일은 아닙니다. 검경이 서로 견제하는 제도 — 정치검찰도, 경찰 독주도 안 됩니다. 피해자 보호 공백은 절대 안 됩니다.", ["보완수사권", "검찰개혁"], "https://www.lawtimes.co.kr/news/articleView.html?idxno=223389"], ["3대 메가프로젝트·호남 반도체 800조 vs '전북 소외' 반발", "정청래 후보 '전북 빠졌다·문재인 덕분' 발언 — 지역 갈라치기 논란.", "국가 비전이 발표됐으면 '내가 온몸을 바쳐 성공시키겠다'고 해야지, 자기 선거에 이용하면 안 됩니다. 호남이 대한민국의 두 번째 수도권으로 서도록 대통령과 함께 반드시 성공시키겠습니다. AI 다음은 농업입니다 — 기후위기는 곧 식량위기니까요.", ["메가프로젝트", "호남", "농업", "균형발전"], "https://www.xn--4k0b53xuva.com/vision.html?post=pmrqh15wvgxyr"], ["6.3 지방선거 책임론", "대통령 고지지율에도 패배. 직전 지도부 책임·공천 파행 논란.", "민주 정치는 책임 정치입니다. 반성도 평가도 없이 한 번 더 하겠다는 게 지금 민주당입니다. 다 죽은 국민의힘을 펄펄 날게 만들어 준 책임, 누가 집니까.", ["책임정치", "정청래", "강진공천"], "https://www.pressian.com/pages/articles/2026071617485205196"], ["송파 투표소 사건·청년 참정권 시위", "투표용지 부족 참정권 침해 — 올림픽공원 시위로 확산. 당 차원 응답 부재.", "청년들은 결과를 뒤집자는 게 아니라 왜 과정의 공정이 무너졌는지 묻고 있습니다. 민주당은 아무 답도 하지 않았습니다. 저라면 현장에 가서 먼저 듣겠습니다.", ["참정권", "공정", "청년"], "https://www.xn--4k0b53xuva.com/manifesto.html"], ["2030 무당층 48%·청년 이탈", "18~29세 절반이 무당층. 20대 남성 이탈 심화, 여성도 이탈 조짐.", "청년이 민주당을 떠난 게 아니라 민주당이 먼저 청년을 떠났습니다. 청년의 보수화는 민주당의 기득권 정치가 뿌린 씨앗입니다. 저는 '네 잘못이 아니다'라는 말을 하러 나왔습니다.", ["무당층", "2030", "청년"], "https://www.xn--4k0b53xuva.com/manifesto.html"], ["뉴스공장 출연 후폭풍", "7.17 출연 — 검증형 질문에 고전 평가와 무례 비판 여론 혼재. 생각나누기 127건.", "흠씬 두들겨 맞았습니다. 그러나 꺾이지 않겠습니다. 비판해 주신 분들 말씀도 겸허히 받겠습니다 — 그분들 다수가 민주당을 사랑하는 분들이니까요. ⚠'꼰대' 표현 재사용 금지(캠프 지침), 수용 화법으로.", ["김어준", "뉴스공장", "이생망중꺾마"], "https://www.xn--4k0b53xuva.com/vision.html?post=pmrrfrezv01bl"]], "MEDIAS": ["뉴스바사삭", "광주KBS무등의아침", "바삭한인터뷰", "인사말", "KBS광주TV", "광주KBS", "조선일보", "불교방송", "뉴탐사", "한겨레"], "VOICE": [{"sec": "아름다운 퇴장 ① 존경, 그리고 정중한 세대교체 요청", "kw": ["아름다운퇴장", "세대교체", "86용퇴", "재집권"], "lines": ["저는 김민석·정청래·송영길, 686 선배님들을 존경합니다. 최루탄도 맞고 감옥도 가시며 아름다운 청춘을 민주주의에 바치셨습니다. 제가 비판할 자유도 선배님들이 만들어 주신 민주주의 덕분입니다.", "바로 그렇기에 정중히 세대교체를 요청드립니다. 민주주의는 권력을 얻는 것으로 끝나지 않고, 권력을 다음 세대에게 넘겨줄 때 완성됩니다.", "산업화 세대가 민주화 세대에게 대한민국을 넘겨주었듯, 이제 민주화 세대가 미래세대에게 민주당을 넘겨줄 차례입니다. 밀어내려는 것이 아니라, 청년에게 사랑받는 정당으로 다음 총선에 이겨 재집권하기를 바라기 때문입니다."]}, {"sec": "아름다운 퇴장 ② 민주당은 왜 위기인가 — 반성의 실종", "kw": ["아름다운퇴장", "내로남불", "5무정당", "반성"], "lines": ["위기의 시작은 민주당이 더 이상 반성하지 않기 때문입니다. '내가 틀린 건 아닐까, 국민 마음을 잘못 읽은 건 아닐까'라는 질문이 사라졌습니다. 질문을 멈추는 순간 청년은 떠납니다.", "경청은 없고 연설만 있습니다. '우리가 정의다, 우리가 개혁이다'라는 믿음이 어느새 다른 목소리를 듣지 않는 독선이 되었습니다.", "실력보다 의리, 정책보다 인맥, 원칙보다 예외가 앞서며 '내로남불'이 탄생했습니다. 우리 편 잘못은 감싸고 다른 편은 단죄합니다. 이 이미지를 벗지 못하면 대통령이 아무리 잘해도 총선·대선은 어렵습니다."]}, {"sec": "아름다운 퇴장 ③ 누가 기득권인가", "kw": ["아름다운퇴장", "86용퇴", "계파", "책임정치"], "lines": ["지금 대한민국에서 가장 강한 기득권은 민주당 686입니다. 선배님들이 변한 게 아니라, 너무 오래 권력의 중심에 계셔서 자신도 모르게 기득권이 되신 겁니다.", "기득권은 문제를 안 보려 하고 책임지지 않습니다. 청년이 떠나도, 선거에 져도 책임지는 사람이 없고 아무렇지 않게 다시 당대표에 나옵니다.", "청년은 기회 한 번 잡기가 하늘의 별 따기이고, 공천 한 번 떨어지면 정치를 접어야 합니다. 민주주의를 위해 싸운 그 용기로, 이제는 권력을 내려놓고 청년에게 물려주는 용기를 보여주십시오."]}, {"sec": "아름다운 퇴장 ④ 족보 경쟁을 끝내야 · 힘을 합쳐야", "kw": ["아름다운퇴장", "족보정치", "적통논쟁", "친명친청", "계엄", "재집권"], "lines": ["적통 논쟁, 족보 캐기 그만하십시오. 누가 원조 친명인지, 누가 DJ·노무현과 더 가까웠는지 청년도 국민도 관심 없습니다. 정책이 족보를, 정책이 계파를 이겨야 합니다.", "그만 싸우십시오. 친명·친청 나눌 때가 아닙니다. 둘이 합치는 건 기본이고 모든 민주진보세력이, 합리적 보수까지 끌어와야 다음 대선에서 이깁니다.", "재집권에 실패하면 다시 계엄이고 극우의 천국입니다. 이재명 대통령의 성공도 물거품이 됩니다. 지금 당장 족보 캐기와 비방을 중단해 주십시오."]}, {"sec": "아름다운 퇴장 ⑤ 왜 지금인가 · 가장 아름다운 퇴장", "kw": ["아름다운퇴장", "AI", "세대교체", "화염병짱돌", "뽑고싶은민주당"], "lines": ["민주화 시대엔 짱돌과 화염병, 권력과 싸우는 용기가 무기였습니다. 그러나 AI 시대는 데이터를 이해하는 정치, 기술·산업을 이해하고 세계와 경쟁하는 정치를 요구합니다.", "선배님들의 역사는 기념비가 되어야지, 다음 세대를 차단하는 성벽이 되어선 안 됩니다. 세대교체는 총선 필승·재집권 필승 전략입니다.", "가장 위대한 계승, 가장 아름다운 퇴장을 김보미가 준비해 드리겠습니다. 과거를 자랑하는 정당이 아니라 미래를 만드는 정당을, 청년이 돌아오고 공정이 살아있는 민주당을 반드시 만들겠습니다."]}, {"sec": "첫인사", "kw": ["소개", "출마이유", "계파없음", "세대교체", "공정"], "lines": ["국민 여러분, 당원 여러분! 서른여섯, 평당원 김보미입니다.", "나이는 어리지만 민주당에서 정치를 한 지 13년이 지났습니다. 강진에서 전국 최연소 기초의회 의장도 지냈습니다.", "많은 분들이 묻습니다. '정청래 공격하려 나왔냐, 김민석 도와주려 나왔냐.' 아닙니다. 저는 계파가 없습니다.", "686 기득권 정당 민주당을, 청년도 공정하게 경쟁하는 정당으로 만들겠습니다. 저 김보미가 당대표가 되려고 나왔습니다."]}, {"sec": "세대교체", "kw": ["세대교체", "86용퇴", "화염병짱돌", "AI"], "lines": ["민주당엔 세대교체가 없습니다. 당대표로 유력한 세 분 모두 386입니다.", "AI 3대 강국에 진입하는 대한민국에, 화염병과 짱돌 들고 싸우던 세대가 아직도 민주당의 주인입니다.", "이제 세대교체를 해야 합니다. 686이 786, 886까지 가면 민주당은 망합니다.", "686은 아름답게 퇴장하고, 청년들이 민주당을 이끌어야 합니다."]}, {"sec": "공정", "kw": ["공정", "강진공천", "경선혁신"], "lines": ["민주당에 공정이 없습니다. 지난 강진군수 경선, 정말 불공정의 극치였습니다.", "저에게는 당헌·당규에도 없는 새 지침을 만들어 기어이 15퍼센트를 감산했습니다.", "전과가 다섯 개나 있는 상대 후보는 감산을 하나도 하지 않고 공천을 줬습니다. 결국 무소속에게 참패했습니다. 불공정 경선이 빚은 참사였습니다.", "경선 규칙 전면 혁신하고, 실력으로 정책으로 공정하게 경쟁하는 정당을 반드시 만들겠습니다."]}, {"sec": "민주주의", "kw": ["민주주의", "1인1표", "유령당원", "신천지", "정청래", "득표수공개", "유리상자"], "lines": ["민주당에 민주주의도 없습니다. 정청래 후보는 지난 지방선거에서 가짜·불법 당원을 모았다는 이유로 몇몇 후보자를 징계했습니다.", "그래 놓고 그 가짜 불법 당원들이 민주당 후보를 뽑게 했습니다. 이게 1인 1표입니까? 이건 가짜 1인 1표입니다.", "선거인 수도, 득표수도 공개하지 않았습니다. 당원들이 내가 뽑은 후보가 몇 표를 얻었는지도 모릅니다. 이게 당원 주권입니까? 이건 가짜 당원 주권입니다.", "신천지가 특정 후보를 지원하려 조직적으로 들어왔다는 의혹이 사실이라면, 자신의 투표권을 대리인에게 넘긴 명백한 불법 당원 아닙니까? 불법당원 전수조사해야 합니다.", "경선 룰은 6개월 전에 확정하고 절대 바꾸지 않겠습니다. 불법·유령·대리 당원 모두 정리하고, 경선 결과는 100% 공개하겠습니다."]}, {"sec": "청년", "kw": ["청년", "기탁금", "공영제", "청년결정권", "이재명"], "lines": ["지금 청년들의 삶은 심각합니다. 절망은 필수가 되었고, 희망은 사치가 되었습니다. 그런데 아무도 책임지는 사람이 없습니다.", "지역에선 국회의원이 왕입니다. 자기 말을 듣지 않는 청년은 씨를 말립니다.", "이재명 대통령이 당대표 시절 당직선거 공영제를 도입하려 했습니다. 기탁금이라도 줄여 놓았더니 오히려 더 올려버렸습니다. 오죽하면 대통령이 나서서 기탁금 깎아주자고 했겠습니까? 이게 어떻게 당무개입입니까?", "당직선거 공영제, 저 김보미가 반드시 실현하겠습니다. 청년취업보장제를 민주당 핵심 정책으로 도입하고, 당 청년위원회가 청년 정책 결정권을 갖도록 하겠습니다."]}, {"sec": "반도체·호남", "kw": ["메가프로젝트", "반도체800조", "호남", "균형발전", "정청래", "농업"], "lines": ["이재명 대통령께서 균형발전을 위해 3대 메가프로젝트를 발표했습니다. 호남에는 반도체 800조 투자를 약속했습니다.", "그런데 정청래 후보는 '전북은 소외됐다, 반도체 800조는 문재인 대통령 덕분이다'라고 합니다. 본인이 온몸을 바쳐 성공시키겠다 하지 않고 자기 선거에만 이용하고 있습니다.", "서울 정치인들은 호남의 피눈물을 모릅니다. 그냥 이용할 뿐입니다. 김보미는 다릅니다. 호남에서 살고 있습니다. 호남의 한을, 설움을 온몸으로 겪었습니다.", "호남인 김보미가, 호남이 대한민국의 두 번째 수도권으로 우뚝 서도록 대통령과 함께 3대 메가프로젝트를 반드시 성공시키겠습니다."]}, {"sec": "마무리", "kw": ["유일한후보", "계파없음", "세대교체", "재집권", "뽑고싶은민주당"], "lines": ["민주당의 모든 문제는 실력과 능력보다 의리와 인맥을 앞세우기 때문입니다. 신세 진 사람, 챙겨야 할 사람이 많으니 불공정과 반민주가 당헌이 되고 말았습니다.", "686 세 후보로는 개혁이 안 됩니다. 챙길 사람이 너무 많습니다. 저 김보미는 챙겨줄 사람 한 명도 없습니다. 민주당 개혁을 거침없이 추진할 유일한 후보가 김보미입니다.", "686 세 명으로 하는 경선으로는 총선·대선 절대 이길 수 없습니다. 청년 김보미를 본선에 보내 주십시오.", "정말 뽑고 싶은 민주당, 청년에게 사랑받는 민주당, 저 김보미가 반드시 만들겠습니다. 감사합니다."]}], "SLOGANS": [["뽑고 싶은 민주당, 뽑고 싶은 김보미", ["뽑고싶은민주당", "슬로건"]], ["새로운 시대, 진짜 실력으로 경쟁하는 공정한 민주당", ["공정", "세대교체", "슬로건"]], ["저는 죽어도, 다음 세대는 살아야 하지 않겠습니까", ["청년", "세대교체", "슬로건"]], ["이번 생엔, 계란으로 바위를 깁시다", ["계란과바위", "슬로건"]], ["역사상 가장 가난하지만, 가장 많은 사람이 함께하는 캠프", ["계파없음", "재산", "슬로건"]], ["돈도 없고 빽도 없습니다. 저의 빽도 여러분, 후원자도 여러분, 대변인도 여러분입니다", ["계파없음", "슬로건"]]], "PLEDGES": [["① 유리상자 경선", ["유리상자", "공정", "득표수공개"], "경선 결과 전량 공개·룰 6개월 전 동결 등 공정 회복. 유권자와 후보가 득표수를 아는 '유리상자' 경선."], ["② 진짜 1인 1표", ["1인1표", "유령당원", "선호투표"], "실명·거주 인증, 당원국회 등 당원주권 실질화. 유령·대리 당원 정리로 '가짜 1인1표' 종식."], ["③ 청년 결정권", ["청년결정권", "청년", "청년최고위원"], "청년 예산 10%, 정책 오디션, 청년위원회 정책 결정권, 선출직 청년최고위원."], ["④ 미래 설계 정당", ["AI", "메가프로젝트", "기후위기", "농업"], "미래전략원 설치, AI 대전환 준비. 'AI 다음은 농업' — 기후위기=식량위기 대응."], ["⑤ 성장 사다리 정당", ["공천", "공영제", "균형발전"], "풀뿌리 사다리·공정 경쟁 공천, 당직선거 공영제로 돈 없어도 도전하는 정당."]], "PLEDGES11": [["1", "경선 규칙은 선거 6개월 전에 확정 — '고무줄 규칙' 폐지", ["경선혁신", "공정", "유리상자", "공천"], "당대표·최고위원 선거와 국회의원·지방선거 후보 경선의 주요 규칙을 선거일 6개월 전까지 확정하고, 어떤 경우에도 바꿀 수 없도록 당헌·당규에 못 박는다. 특정인을 심기 위해 만들어 놓은 수많은 예외규정, \"달리 정할 수 있다\"는 단서조항을 모조리 없앤다. 사람에 따라, 지역에 따라 규정이 달라지는 일은 다시는 없을 것."], ["2", "가짜당원·유령당원 정리 — 모든 경선 결과 100% 공개", ["1인1표", "유령당원", "득표수공개", "유리상자", "신천지"], "내가 찍은 후보가 몇 표를 얻었는지도 모르는데 당원주권을 어디 가서 찾겠는가. 이번 전당대회만 해도 선거인명부 열람 기간이 단 하루였다. 당원명부를 행정안전부 주민등록 자료와 대조하고 자발적 가입 여부를 전수 확인해 정비한다. 경선 결과는 득표수까지 후보자와 당원에게 전부 공개한다. 공개하지 못할 경선이라면 공정한 경선이라 말할 수 없다. '당원 500만'? 자격 검증 없는 1인1표는 기득권을 지키기 위한 가짜 민주주의일 뿐."], ["3", "당비 월 1만원 — 이름뿐인 권리당원이 아닌 '진짜 권리당원'의 정당", ["당원주권", "당비", "1인1표"], "민주당 운영비 대부분은 국고보조금·선거보조금이다. 올해 지방선거에서도 258억 원의 선거보조금을 받았다. 그런데 당원들은 30년째 한 달에 1천 원을 낸다. 겨우 1천 원 내고 당원주권 정당이라 우기는 것, 민망하지 않은가. 당비를 월 1만 원으로 하고 6개월 이상 낸 당원만 권리당원으로 인정한다. 공당의 후보 선출권은 아무나 갖지 못하는 권리 — 그 무게에 비하면 월 1만 원은 결코 큰돈이 아니다."], ["4", "토론과 연설로 실력을 겨루는 공천 — 토론 불참 감점", ["토론회", "공천", "공정", "경선혁신"], "억지로 입당원서 받아 놓고 경선 전화 오면 나를 찍어 달라는 경선 — 686 기득권에겐 더없이 행복한 경선이지만 새로 도전하는 청년에겐 철벽같은 칸막이다. 당대표·최고위원은 물론 국회의원·자치단체장 경선까지 충분한 공개토론과 유권자 앞 연설회를 보장한다. 조직 동원이 아니라 실력과 정책으로 겨루는 공천. 정당한 사유 없이 토론에 불참한 후보는 감점 — 민주주의는 토론으로 완성된다. 토론을 피하는 후보에게 민주당의 이름을 맡길 수 없다."], ["5", "선호투표제 항구 제도화 — 예비경선도 충분한 선거운동 보장", ["선호투표", "컷오프", "1인1표", "동영상촬영회"], "이번 전당대회에 처음 도입된 선호투표제를 일회성으로 끝내지 않고 모든 경선에 항구적으로 제도화한다. 1순위는 물론 2순위 지지까지 버리지 않는 것이 진짜 당원주권. 예비경선(컷오프)은 후보가 6명 이상 등록했을 때만 실시하고, 하더라도 2주 이상 선거운동 기간을 보장한다. 청년 진입을 가로막는 5일짜리 예비경선, 후보를 딱 한 번 앉혀 놓고 7분 연설만 시키는 '동영상 촬영회'는 없앤다. 대신 누구나 참석하는 연설회와 후보 간 토론회 최소 3회 이상을 보장한다."], ["6", "기탁금 폐지 — 당직선거 공영제 실시", ["기탁금", "공영제", "청년", "기탁금감액"], "이번 전당대회 기탁금은 당대표 8천만 원, 최고위원 3천만 원. '과하다'는 비판에 2천만 원씩 깎고도 이 액수다. 돈 없는 청년에게 이것은 출마하지 말라는 말과 같다. 기탁금 제도를 완전히 폐지하고 선거비용을 당이 부담하는 당직선거 공영제를 도입한다. 돈도 계파도 없는 청년이 당대표·최고위원·국회의원·지방의원에 도전할 수 있게 한다. 정치는 돈이 아니라 비전과 실력으로 경쟁해야 한다."], ["7", "청년에게 자리가 아니라 권력과 권한 — 청년 기준 45→40세", ["청년결정권", "청년최고위원", "청년", "2030"], "청년 나이 기준을 현행 45세에서 40세로 낮춘다. 8년 만에 부활한 청년최고위원을 일회성 이벤트로 끝내지 않도록 선출직으로 당헌에 명문화하고, 지명직 최고위원 2명도 청년으로 임명한다. 당 청년위원회를 청년정책의 최고 의결기구로 격상하고, 청년위가 결정한 정책은 당이 책임지고 입법하도록 의무화한다. 청년이 민주당을 떠난 것이 아니라 민주당이 먼저 청년을 버렸다. 선거 때만 청년을 앞줄에 세우고 끝나면 돌려보내는 일, 다시는 반복하지 않는다."], ["8", "철밥통 사무처를 역동적인 사무처로", ["사무처개혁", "세대교체", "계파"], "정당은 국민의 삶과 함께 숨 쉬는 조직이고, 국민의 요구를 정책으로 만들어 내는 역동성이 생명이다. 그런데 지금 민주당 사무처는 공무원보다 심한 철밥통 — 징계도, 긴장도, 세대교체도 없다. 5060이 주도하는 관료화된 사무처가 무슨 개혁을 하겠는가. 직무평가와 책임인사를 제도화하고, 관료주의에 물든 조직에 참신한 청년 인재를 대거 수혈한다."], ["9", "국회의원·자치단체장·지방의원 모두 — 같은 지역구 3선 초과 금지", ["3선배제", "세대교체", "공천", "86용퇴"], "연달아 했든 건너뛰어 했든, 같은 지역구에서 합계 세 번을 지냈다면 더는 공천하지 않는다. '동일 지역구 3선 초과 공천 금지'를 당헌·당규에 제도화한다. 민주당 혁신위원회도 이미 제안했던 방안 — 이제는 실행할 때다. 세대교체 없이 2030년 재집권은 어렵다. 스스로 물러날 사람은 없다. 제도로 교체가 이루어질 수밖에 없도록 만드는 것이 유일한 길이다."], ["10", "'검찰 저격수'를 넘어 '국민 삶의 설계자'로 — 미래전환위·7대 미래산업", ["검찰개혁", "메가프로젝트", "AI", "미래전환위", "기후위기"], "검찰개혁과 내란 청산은 반드시 완수해야 한다. 그러나 민주당이 국민에게 내놓을 의제가 그것뿐일 수는 없다. 과거에 복수하는 '복수혈전 민주당'을 미래를 여는 '미래선도 민주당'으로 바꾼다. 대통령과 함께 반도체·AI 데이터센터·피지컬 AI의 3대 메가프로젝트를 반드시 성공시킨다. 당대표 직속 미래전환위원회를 설치하고 AI·반도체·로봇·재생에너지·바이오·양자·우주항공을 7대 미래산업으로 키운다. 최고위원회의가 미래산업과 민생경제를 정례 점검하고, 당 소속 지방정부와 지역별 산업 육성 전략을 직접 챙긴다."], ["11", "16세 당원부터 50년 당원까지 — 정치교육·정책교육 강화", ["당원교육", "청년", "당원주권"], "2022년 정당법 개정으로 16세면 법정대리인 동의 아래 당원이 될 수 있고 18세면 선거에 출마할 수 있다. 그런데 민주당에 16세·18세 당원을 위한 대책이 있는가? 하나도 없다. 20년, 50년 당원 생활을 해도 정책교육 한 번 제대로 받아 본 당원이 없다 — 선거철에 국회의원이 내려와 자기 자랑하는 '교육 아닌 교육'뿐. 지역위원회 단위에서부터 당원교육과 지방자치 참여를 제도화한다. 16세 당원에게는 지방자치·정당 교육을, 18세 당원에게는 선거·정책 교육을. 장수 당원까지 모두 철저한 민주주의 전사로, 정책 전문가로 키운다."]], "SPEECH_PLEDGES" function renderNav(){const n=document.getElementById('nav');n.innerHTML='';NAV.forEach(([k,l])=>{const b=document.createElement('button');b.textContent=l;b.className=view===k?'on':'';b.onclick=()=>{view=k;if(k!=='kw')activeKw=null;render()};n.appendChild(b)})}

// ---------- KEYWORD PANEL ----------
function kwCount(t){return CNT[t]||0}
function renderKwPanel(){
  const box=document.getElementById('kwgroups');box.innerHTML='';
  const all=document.createElement('div');all.className='chips';all.style.marginBottom='10px';
  const ac=document.createElement('span');ac.className='chip all'+(activeKw===null&&view==='kw'?' on':'');ac.textContent='전체 보기';
  ac.onclick=()=>{activeKw=null;view='kw';render()};all.appendChild(ac);box.appendChild(all);
  const filter=document.getElementById('kwsearch').value.trim();
  KWGROUPS.forEach(([gt,ks])=>{
    const shown=ks.filter(k=>kwCount(k)>0 && (!filter||k.includes(filter)));
    if(!shown.length)return;
    const g=document.createElement('div');g.className='kwgroup';
    g.innerHTML='<div class="gt">'+esc(gt)+'</div>';
    const c=document.createElement('div');c.className='chips';
    const hot=gt.indexOf('🆕')>-1||gt.indexOf('🔴')>-1;
    shown.forEach(k=>c.appendChild(chip(k,hot)));
    g.appendChild(c);box.appendChild(g);
  });
  // 전체 키워드(빈도순)
  const grouped=new Set(KWGROUPS.flatMap(g=>g[1]));
  let rest=Object.keys(CNT).filter(k=>!grouped.has(k)&&(!filter||k.includes(filter))).sort((a,b)=>CNT[b]-CNT[a]);
  if(rest.length){
    const g=document.createElement('div');g.className='kwgroup';
    g.innerHTML='<div class="gt">🗂️ 기타 키워드(빈도순)</div>';
    const c=document.createElement('div');c.className='chips';
    (showAllKw?rest:rest.slice(0,24)).forEach(k=>c.appendChild(chip(k)));
    g.appendChild(c);
    if(rest.length>24){const m=document.createElement('span');m.className='morekw';m.textContent=showAllKw?'▲ 접기':('▼ 나머지 '+(rest.length-24)+'개 더 보기');m.onclick=()=>{showAllKw=!showAllKw;renderKwPanel()};g.appendChild(m)}
    box.appendChild(g);
  }
}
function chip(k,hot){const el=document.createElement('span');el.className='chip'+(hot?' hot':'')+(activeKw===k?' on':'');el.innerHTML=esc(k)+'<span class="n">'+kwCount(k)+'</span>';el.onclick=()=>{activeKw=k;view='kw';render()};return el}

// ---------- MATCHERS ----------
function voiceMatch(k){return VOICE.filter(v=>v.kw.includes(k))}
function dataMatch(k){return DATA.filter(d=>(d.tags||[]).includes(k))}
function issueMatch(k){return ISSUES.filter(i=>i[3].includes(k))}
function refMatch(k){return REFS.filter(r=>r[3].includes(k))}
function artMatch(k){return ARTICLES.filter(a=>(a[1]+' '+a[3]).includes(k))}
function textHit(d){if(!q)return true;const hay=(d.q+' '+(d.script||[]).join(' ')+' '+(d.quotes||[]).map(x=>x[1]).join(' ')+' '+(d.tags||[]).join(' ')+' '+(d.notes||[]).join(' ')).toLowerCase();return hay.includes(q.toLowerCase())}

// ---------- CARD RENDER ----------
function cardHTML(d,open){
  const live=d.media==='광주KBS무등의아침';
  let quotes=(d.quotes||[]).map(([s,t])=>'<div class="quote">&ldquo;'+hl(t)+'&rdquo;<b>— '+esc(s)+'</b></div>').join('');
  let script=(d.script||[]).map(p=>'<p>'+hl(p)+'</p>').join('');
  let tags=(d.tags||[]).map(t=>'<span class="t" data-k="'+esc(t)+'">#'+esc(t)+'</span>').join('');
  return '<div class="card'+(open?' open':'')+'" data-no="'+d.no+'">'+
    '<div class="qhead"><span class="mtag'+(live?' live':'')+'">'+esc(d.media)+'</span>'+
    '<span class="qtxt">'+hl(d.q)+'</span>'+
    '<span class="editbtn" data-no="'+d.no+'" title="이 질문·답변 편집">✏️</span>'+
    '<span class="arrow">▶</span></div>'+
    '<div class="body">'+
    (quotes?'<div class="lbl b">🗣️ 김보미 핵심 워딩</div>'+quotes:'')+
    (script?'<div class="lbl g">💬 답변 스크립트</div><div class="script">'+script+'</div>':'')+
    (d.warn?'<div class="warn">⚠️ '+hl(d.warn)+'</div>':'')+
    (d.notes&&d.notes.length?'<div class="note">📝 '+d.notes.map(hl).join(' / ')+'</div>':'')+
    (tags?'<div class="tagrow">'+tags+'</div>':'')+
    '</div></div>';
}
function issueHTML(i){
  const [title,ctx,resp,tags,url]=i;
  return '<div class="card open"><div class="qhead"><span class="mtag" style="background:#8a3d00">이슈</span><span class="qtxt">'+hl(title)+'</span></div>'+
    '<div class="body"><div class="note">'+hl(ctx)+'</div>'+
    '<div class="lbl b">🗣️ 김보미 대응 멘트</div><div class="quote">&ldquo;'+hl(resp)+'&rdquo;</div>'+
    (url?'<div style="margin-top:7px"><a href="'+url+'" target="_blank">🔗 근거 보기</a></div>':'')+
    '<div class="tagrow">'+tags.map(t=>'<span class="t" data-k="'+esc(t)+'">#'+esc(t)+'</span>').join('')+'</div></div></div>';
}
function refHTML(r){const[cat,title,url,kw,summ]=r;return '<a class="artlink" href="'+url+'" target="_blank"><span class="m">'+esc(cat)+'</span><div class="tt">'+hl(title)+'</div><div class="ss">'+hl(summ)+'</div></a>'}
function artHTML(a){const[m,title,url,summ]=a;return '<a class="artlink" href="'+url+'" target="_blank"><span class="m">'+esc(m)+'</span><div class="tt">'+hl(title)+'</div><div class="ss">'+hl(summ)+'</div></a>'}
function voiceHTML(v){return '<div class="card open"><div class="qhead"><span class="mtag" style="background:var(--green)">정견연설</span><span class="qtxt">'+esc(v.sec)+'</span></div><div class="body"><div class="script">'+v.lines.map(l=>'<p>'+hl(l)+'</p>').join('')+'</div><div class="tagrow">'+v.kw.map(t=>'<span class="t" data-k="'+esc(t)+'">#'+esc(t)+'</span>').join('')+'</div></div></div>'}

// ---------- VIEWS ----------
function viewKw(){
  const m=document.getElementById('main');
  if(!activeKw&&!q){
    let html=heroHTML();
    html+='<div class="sec-h">🗂️ 지금까지 준비한 전체 질문지 총취합 <span class="count">'+DATA.length+'건 — 삭제 없이 전부 보존</span></div>';
    MEDIAS.forEach(md=>{
      const cards=DATA.filter(d=>d.media===md);
      if(!cards.length)return;
      html+='<div class="sec-h" style="font-size:13.5px;border-bottom-style:dashed">📁 '+esc(md)+' <span class="count">'+cards.length+'문항</span></div>';
      html+=cards.map(d=>cardHTML(d,false)).join('');
    });
    m.innerHTML=html;bindCards();bindTags();return;
  }
  let html='';
  if(activeKw){html+='<div class="hero"><h2>#'+esc(activeKw)+'</h2><p>이 키워드와 관련된 김보미 발언·답변·이슈·글·기사를 모았습니다. 아래 카드를 눌러 펼쳐보세요.</p></div>'}
  else{html+='<div class="hint">🔎 "'+esc(q)+'" 검색 결과입니다.</div>'}
  const vs=activeKw?voiceMatch(activeKw).filter(textHit):VOICE.filter(v=>v.lines.join(' ').toLowerCase().includes(q.toLowerCase()));
  const ds=(activeKw?dataMatch(activeKw):DATA).filter(textHit);
  const iss=(activeKw?issueMatch(activeKw):ISSUES).filter(i=>!q||(i.join(' ').toLowerCase().includes(q.toLowerCase())));
  const rf=(activeKw?refMatch(activeKw):REFS).filter(r=>!q||(r.join(' ').toLowerCase().includes(q.toLowerCase())));
  const ar=(activeKw?artMatch(activeKw):ARTICLES).filter(a=>!q||(a.join(' ').toLowerCase().includes(q.toLowerCase())));
  const total=vs.length+ds.length+iss.length+rf.length+ar.length;
  if(!total){m.innerHTML=html+'<div class="empty">해당 키워드로 찾은 내용이 없습니다.</div>';return}
  if(vs.length){html+='<div class="sec-h">🎤 정견연설 속 목소리</div>'+vs.map(voiceHTML).join('')}
  if(ds.length){html+='<div class="sec-h">💡 예상 질문 & 답변 스크립트 <span class="count">'+ds.length+'건</span></div>'+ds.map(d=>cardHTML(d,ds.length<=3)).join('')}
  if(iss.length){html+='<div class="sec-h">⚡ 이슈 대응 카드 <span class="count">'+iss.length+'건</span></div>'+iss.map(issueHTML).join('')}
  if(rf.length){html+='<div class="sec-h">📌 관련 글·성명·공약 <span class="count">'+rf.length+'건</span></div>'+rf.map(refHTML).join('')}
  if(ar.length){html+='<div class="sec-h">📰 관련 기사 <span class="count">'+ar.length+'건</span></div>'+ar.map(artHTML).join('')}
  m.innerHTML=html;bindCards();bindTags();
}

// ---------- 편집기 ----------
function openEditor(no){
  const d=DATA.find(x=>x.no===no); if(!d) return; closeEditor();
  const ov=document.createElement('div'); ov.className='editov'; ov.id='editov';
  const quStr=(d.quotes||[]).map(x=>x[0]+' :: '+x[1]).join('\n');
  ov.innerHTML='<div class="editbox">'+
    '<h3>✏️ 질문·답변 편집 <span>'+esc(d.media)+'</span></h3>'+
    '<label>질문</label><textarea id="e_q" rows="2">'+esc(d.q)+'</textarea>'+
    '<label>답변 스크립트 (한 줄 = 한 문단)</label><textarea id="e_s" rows="8">'+esc((d.script||[]).join('\n'))+'</textarea>'+
    '<label>핵심 워딩 (한 줄 = "화자 :: 인용")</label><textarea id="e_qu" rows="4">'+esc(quStr)+'</textarea>'+
    '<label>주의사항(선택)</label><textarea id="e_w" rows="2">'+esc(d.warn||'')+'</textarea>'+
    '<div class="ebtns"><button class="save" id="e_save">💾 저장</button><button class="cancel" id="e_cancel">취소</button>'+
    '<span class="ehint">저장은 이 브라우저에 보관됩니다. 라이브 사이트 반영은 상단 「편집본 내보내기」로 파일을 받아 교체하세요.</span></div>'+
    '</div>';
  document.body.appendChild(ov);
  ov.onclick=(e)=>{if(e.target===ov)closeEditor()};
  document.getElementById('e_cancel').onclick=closeEditor;
  document.getElementById('e_save').onclick=()=>saveEditor(no);
}
function closeEditor(){const o=document.getElementById('editov');if(o)o.remove()}
function saveEditor(no){
  const d=DATA.find(x=>x.no===no); if(!d) return;
  d.q=document.getElementById('e_q').value.trim();
  d.script=document.getElementById('e_s').value.split('\n').map(s=>s.trim()).filter(Boolean);
  d.quotes=document.getElementById('e_qu').value.split('\n').map(s=>s.trim()).filter(Boolean).map(l=>{const i=l.indexOf('::');return i>-1?[l.slice(0,i).trim(),l.slice(i+2).trim()]:['김보미',l]});
  const w=document.getElementById('e_w').value.trim(); d.warn=w||null;
  persistEdits(); closeEditor();
  const n=document.getElementById('editnotice'); if(n)n.style.display='inline-flex';
  render();
}
function exportEdited(){
  document.getElementById('__payload').textContent=JSON.stringify(P).replace(/<\//g,'<\\/');
  const html='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
  const b=new Blob([html],{type:'text/html;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='index.html'; a.click();
}
function resetEdits(){if(confirm('이 브라우저에 저장한 편집 내용을 모두 초기화할까요?')){localStorage.removeItem(LSKEY);location.reload();}}
function bindTags(){document.querySelectorAll('.t[data-k],.pill[data-k]').forEach(el=>el.onclick=(e)=>{e.stopPropagation();activeKw=el.dataset.k;view='kw';q='';document.getElementById('kwsearch').value='';render()})}

function render(){
  renderNav();renderKwPanel();
  if(view==='kw')viewKw();
  else if(view==='timeline')viewTimeline();
  else if(view==='live')viewLive();
  else if(view==='newsba')viewNewsba();
  else if(view==='greet')viewGreet();
  else if(view==='pledge11')viewPledge11();
  else if(view==='speech')viewSpeech();
  else if(view==='about')viewAbout();
  window.scrollTo(0,0);
}
document.getElementById('kwsearch').addEventListener('input',e=>{q=e.target.value.trim(); activeKw=null; if(view!=='timeline')view='kw'; render()});
document.getElementById('btn-export').onclick=exportEdited;
document.getElementById('btn-reset').onclick=resetEdits;
if(localStorage.getItem(LSKEY)){const n=document.getElementById('editnotice');if(n)n.style.display='inline-flex';}
render();
</script>
</body></html>
